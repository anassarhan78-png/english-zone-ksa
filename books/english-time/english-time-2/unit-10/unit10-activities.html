<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 10 Extra Activities - At the Clinic</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1e5f8e, #0d3b55); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; border-radius: 45px; padding: 20px 30px; }
        h1 { color: #ff8c42; text-align: center; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .card { background: #fef7e0; border-radius: 35px; padding: 20px; border: 1px solid #ffcf9a; }
        .card h2 { background: #ff8c42; display: inline-block; padding: 5px 20px; border-radius: 40px; color: white; font-size: 1.3rem; }
        button { background: #ff8c42; border: none; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; margin: 5px; }
        input, select { padding: 8px; border-radius: 30px; border: 1px solid #ccc; margin: 5px; }
        .correct-feedback { background: #c8e6d9; border-left: 6px solid #2e7d64; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .wrong-feedback { background: #ffe0e0; border-left: 6px solid #d9534f; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .drag-word { background: #2c7da0; color: white; padding: 10px 20px; border-radius: 40px; cursor: grab; display: inline-block; margin: 5px; }
        .drop-zone { border: 2px dashed #ff8c42; border-radius: 20px; padding: 12px; min-width: 120px; text-align: center; background: #fff5e6; display: inline-block; margin: 6px; }
        .crossword-grid { display: grid; grid-template-columns: repeat(6, 45px); gap: 4px; justify-content: center; background: #f0f0f0; padding: 15px; border-radius: 20px; }
        .crossword-grid input { width: 45px; height: 45px; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <h1>📘 English Time 2 - Unit 10 🎲 Extra Activities</h1>
    <div class="activity-grid">
        <!-- 1. Drag & Drop: Illness words to icons -->
        <div class="card">
            <h2>🤒 Drag & Drop Illnesses</h2>
            <div id="dragDropIllnessArea"></div>
            <button id="checkIllnessDrag">Check All</button>
            <div id="illnessDragResult"></div>
        </div>

        <!-- 2. Crossword Puzzle (illness words) -->
        <div class="card">
            <h2>🔠 Crossword Puzzle</h2>
            <div id="crosswordIllness"></div>
            <div id="crosswordCluesIllness" style="margin-top:10px; font-size:0.8rem;"></div>
            <button id="checkCrosswordIllness">Check Crossword</button>
            <div id="crosswordIllnessResult"></div>
        </div>

        <!-- 3. Unscramble illness words -->
        <div class="card">
            <h2>🔀 Unscramble</h2>
            <div id="scrambleWord" style="font-size:1.8rem; background:#fff0d6; padding:12px; border-radius:30px;"></div>
            <input type="text" id="scrambleInput"><button id="checkScramble">Check</button><button id="newScramble">New</button>
            <div id="scrambleResult"></div><button id="speakScramble">🔊 Speak</button>
        </div>

        <!-- 4. Match has/doesn't have sentences -->
        <div class="card">
            <h2>✅ Has / Doesn't Have Match</h2>
            <div id="hasMatchQuestion"></div>
            <select id="hasMatchSelect"></select>
            <button id="checkHasMatch">Check</button>
            <div id="hasMatchResult"></div>
            <button id="newHasMatch">New</button>
        </div>

        <!-- 5. Complete the sentence (has/doesn't have) -->
        <div class="card">
            <h2>✍️ Complete the Sentence</h2>
            <div id="fillIllnessSentence"></div>
            <input type="text" id="fillIllnessInput" placeholder="has or doesn't have">
            <button id="checkFillIllness">Check</button>
            <button id="newFillIllness">Next</button>
            <div id="fillIllnessResult"></div>
        </div>

        <!-- 6. Label the illnesses (icons) -->
        <div class="card">
            <h2>🏷️ Label the Illnesses</h2>
            <div id="labelIllnessContainer"></div>
            <div id="illnessWordsBank"></div>
            <button id="checkIllnessLabels">Check</button>
            <div id="illnessLabelResult"></div>
        </div>
    </div>
</div>

<script>
    const illnesses = ["stomachache", "rash", "sore throat", "fever", "cold", "cough"];
    const icons = { stomachache:"🤢", rash:"🟥", "sore throat":"😷", fever:"🌡️", cold:"🤧", cough:"😮‍💨" };
    function speak(t) { let u = new SpeechSynthesisUtterance(t); u.lang="en-US"; speechSynthesis.cancel(); speechSynthesis.speak(u); }

    // 1. Drag & Drop
    function initDragDropIllness() {
        let container = document.getElementById('dragDropIllnessArea');
        container.innerHTML = '<div><strong>Drag word to matching icon</strong></div><div style="display:flex; flex-wrap:wrap; gap:15px; margin:10px 0;">';
        let shuffled = [...illnesses].sort(() => Math.random() - 0.5);
        shuffled.forEach(i => {
            let span = document.createElement('span');
            span.innerText = i;
            span.setAttribute('draggable', 'true');
            span.classList.add('drag-word');
            span.ondragstart = (e) => { e.dataTransfer.setData('text/plain', i); };
            container.appendChild(span);
        });
        container.innerHTML += '</div><div style="display:flex; flex-wrap:wrap; gap:20px; margin-top:20px;">';
        illnesses.forEach(i => {
            let zone = document.createElement('div');
            zone.classList.add('drop-zone');
            zone.setAttribute('data-expected', i);
            zone.innerHTML = `<div style="font-size:2rem;">${icons[i]}</div><span class="drop-label">???</span>`;
            zone.ondragover = (e) => e.preventDefault();
            zone.ondrop = (e) => {
                e.preventDefault();
                let dragged = e.dataTransfer.getData('text/plain');
                let expected = zone.getAttribute('data-expected');
                if (dragged === expected) {
                    zone.querySelector('.drop-label').innerText = dragged;
                    zone.style.background = '#c8e6d9';
                } else {
                    alert(`Wrong match! ${dragged} is not ${expected}`);
                }
            };
            container.appendChild(zone);
        });
        container.innerHTML += '</div>';
    }
    document.getElementById('checkIllnessDrag').onclick = () => {
        let allOk = true;
        document.querySelectorAll('#dragDropIllnessArea .drop-zone').forEach(zone => {
            let label = zone.querySelector('.drop-label').innerText;
            let expected = zone.getAttribute('data-expected');
            if (label !== expected) allOk = false;
        });
        document.getElementById('illnessDragResult').innerHTML = allOk ? "<div class='correct-feedback'>🎉 Perfect! Illnesses matched correctly.</div>" : "<div class='wrong-feedback'>⚠️ Some matches are missing or wrong.</div>";
    };
    initDragDropIllness();

    // 2. Crossword
    function buildIllnessCrossword() {
        let gridHtml = '<div class="crossword-grid">';
        let predefined = [
            ['C','O','U','G','H',''],
            ['','','','','O','L'],
            ['F','E','V','E','R',''],
            ['','','','','A','S'],
            ['C','O','L','D','',''],
            ['','','','','','H']
        ];
        for(let i=0;i<6;i++){
            for(let j=0;j<6;j++){
                let val = predefined[i][j] ? predefined[i][j] : '';
                let readonly = val ? 'readonly' : '';
                gridHtml += `<input type="text" maxlength="1" id="illCell_${i}_${j}" value="${val}" style="text-transform:uppercase" ${readonly}>`;
            }
            gridHtml += `<div style="width:100%"></div>`;
        }
        gridHtml += '</div>';
        document.getElementById('crosswordIllness').innerHTML = gridHtml;
        let clues = `<strong>Clues:</strong> Across: Row0: a throat sound (COUGH), Row2: high temperature (FEVER), Row4: common sickness (COLD). Down: Col5: a red skin condition (RASH).`;
        document.getElementById('crosswordCluesIllness').innerHTML = clues;
    }
    document.getElementById('checkCrosswordIllness').onclick = () => {
        document.getElementById('crosswordIllnessResult').innerHTML = "<div class='correct-feedback'>✅ Check your answers with the clues. Great puzzle solving!</div>";
    };
    buildIllnessCrossword();

    // 3. Unscramble
    let currentScramble = "";
    function getScrambled(w) { let arr = w.split(''); for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr.join(''); }
    function updateScramble() { currentScramble = illnesses[Math.floor(Math.random()*illnesses.length)]; document.getElementById("scrambleWord").innerText = getScrambled(currentScramble); document.getElementById("scrambleInput").value=""; document.getElementById("scrambleResult").innerHTML=""; }
    document.getElementById("checkScramble").onclick = () => { let ans = document.getElementById("scrambleInput").value.trim().toLowerCase(); if(ans === currentScramble) document.getElementById("scrambleResult").innerHTML="<div class='correct-feedback'>✅ Correct</div>"; else document.getElementById("scrambleResult").innerHTML=`<div class='wrong-feedback'>❌ Wrong: ${currentScramble}</div>`; };
    document.getElementById("newScramble").onclick = updateScramble;
    document.getElementById("speakScramble").onclick = () => speak(currentScramble);
    updateScramble();

    // 4. Has/Doesn't have match
    const hasItems = [
        { sentence: "He has a stomachache.", answer: "positive" },
        { sentence: "She doesn't have a rash.", answer: "negative" },
        { sentence: "She has a cold.", answer: "positive" },
        { sentence: "He doesn't have a cough.", answer: "negative" }
    ];
    let currentHas = null;
    function updateHasMatch() {
        currentHas = hasItems[Math.floor(Math.random() * hasItems.length)];
        document.getElementById("hasMatchQuestion").innerHTML = `<div style="font-size:1.3rem;">${currentHas.sentence}</div><br>Positive or negative?`;
        let select = document.getElementById("hasMatchSelect");
        select.innerHTML = "";
        let opts = ["positive", "negative"];
        opts.forEach(opt => {
            let o = document.createElement("option");
            o.value = opt;
            o.innerText = opt;
            select.appendChild(o);
        });
        document.getElementById("hasMatchResult").innerHTML = "";
    }
    document.getElementById("checkHasMatch").onclick = () => {
        let selected = document.getElementById("hasMatchSelect").value;
        if (selected === currentHas.answer) {
            document.getElementById("hasMatchResult").innerHTML = "<div class='correct-feedback'>✅ Correct!</div>";
        } else {
            document.getElementById("hasMatchResult").innerHTML = `<div class='wrong-feedback'>❌ Wrong. The sentence is ${currentHas.answer}.</div>`;
        }
    };
    document.getElementById("newHasMatch").onclick = updateHasMatch;
    updateHasMatch();

    // 5. Fill blank (has/doesn't have)
    const fillIllnessBlanks = [
        { sentence: "He ______ a fever.", answer: "has" },
        { sentence: "She ______ a sore throat.", answer: "doesn't have" },
        { sentence: "He ______ a cold.", answer: "has" },
        { sentence: "She ______ a cough.", answer: "doesn't have" }
    ];
    let currentIllnessBlank = null;
    function updateFillIllness() {
        currentIllnessBlank = fillIllnessBlanks[Math.floor(Math.random() * fillIllnessBlanks.length)];
        document.getElementById("fillIllnessSentence").innerHTML = `<div style="font-size:1.3rem;">${currentIllnessBlank.sentence}</div>`;
        document.getElementById("fillIllnessInput").value = "";
        document.getElementById("fillIllnessResult").innerHTML = "";
    }
    document.getElementById("checkFillIllness").onclick = () => {
        let ans = document.getElementById("fillIllnessInput").value.trim().toLowerCase();
        if (ans === currentIllnessBlank.answer) {
            document.getElementById("fillIllnessResult").innerHTML = "<div class='correct-feedback'>✅ Correct!</div>";
        } else {
            document.getElementById("fillIllnessResult").innerHTML = `<div class='wrong-feedback'>❌ Wrong. Correct: ${currentIllnessBlank.answer}</div>`;
        }
    };
    document.getElementById("newFillIllness").onclick = updateFillIllness;
    updateFillIllness();

    // 6. Label illnesses
    function buildLabelIllness() {
        let container = document.getElementById('labelIllnessContainer');
        container.innerHTML = "";
        let shuffled = [...illnesses].sort(() => Math.random() - 0.5);
        shuffled.forEach((i, idx) => {
            let div = document.createElement('div');
            div.style.textAlign = "center";
            div.style.display = "inline-block";
            div.style.margin = "10px";
            div.innerHTML = `<div style="font-size:2rem;">${icons[i]}</div><input type="text" id="illLabel_${idx}" placeholder="Word">`;
            container.appendChild(div);
        });
        let bank = document.getElementById('illnessWordsBank');
        bank.innerHTML = "";
        let shuffledWords = [...illnesses].sort(() => Math.random() - 0.5);
        shuffledWords.forEach(w => {
            let btn = document.createElement('button');
            btn.innerText = w;
            btn.onclick = () => {
                let firstEmpty = document.querySelector('#labelIllnessContainer input[value=""]');
                if (firstEmpty) firstEmpty.value = w;
                else alert("All fields filled? Use clear or edit.");
            };
            bank.appendChild(btn);
        });
    }
    document.getElementById('checkIllnessLabels').onclick = () => {
        let allGood = true;
        let inputs = document.querySelectorAll('#labelIllnessContainer input');
        let expected = [...illnesses];
        inputs.forEach((inp, idx) => {
            if (inp.value.toLowerCase().trim() !== expected[idx]) allGood = false;
        });
        document.getElementById('illnessLabelResult').innerHTML = allGood ? "<div class='correct-feedback'>🏷️ All illnesses labeled correctly!</div>" : "<div class='wrong-feedback'>Some labels are wrong. Use the word bank.</div>";
    };
    buildLabelIllness();
</script>
</body>
</html>
