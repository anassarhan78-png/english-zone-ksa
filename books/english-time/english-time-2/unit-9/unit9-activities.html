<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 9 Extra Activities - In a Store</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1e5f8e, #0d3b55); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; border-radius: 45px; padding: 20px 30px; }
        h1 { color: #ff8c42; text-align: center; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .card { background: #fef7e0; border-radius: 35px; padding: 20px; border: 1px solid #ffcf9a; }
        .card h2 { background: #ff8c42; display: inline-block; padding: 5px 20px; border-radius: 40px; color: white; font-size: 1.3rem; }
        button { background: #ff8c42; border: none; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; margin: 5px; }
        input, select { padding: 8px; border-radius: 30px; border: 1px solid #ccc; margin: 5px; }
        .correct-feedback { background: #c8e6d9; border-left: 6px solid #2e7d64; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .wrong-feedback { background: #ffe0e0; border-left: 6px solid #d9534f; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .drag-word { background: #2c7da0; color: white; padding: 10px 20px; border-radius: 40px; cursor: grab; display: inline-block; margin: 5px; }
        .drop-zone { border: 2px dashed #ff8c42; border-radius: 20px; padding: 12px; min-width: 120px; text-align: center; background: #fff5e6; display: inline-block; margin: 6px; }
        .crossword-grid { display: grid; grid-template-columns: repeat(6, 45px); gap: 4px; justify-content: center; background: #f0f0f0; padding: 15px; border-radius: 20px; }
        .crossword-grid input { width: 45px; height: 45px; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <h1>📘 English Time 2 - Unit 9 🎲 Extra Activities</h1>
    <div class="activity-grid">
        <!-- 1. Drag & Drop: Food words to icons -->
        <div class="card">
            <h2>🍔 Drag & Drop Food</h2>
            <div id="dragDropFoodArea"></div>
            <button id="checkFoodDrag">Check All</button>
            <div id="foodDragResult"></div>
        </div>

        <!-- 2. Crossword Puzzle (food words) -->
        <div class="card">
            <h2>🔠 Crossword Puzzle</h2>
            <div id="crosswordFood"></div>
            <div id="crosswordCluesFood" style="margin-top:10px; font-size:0.8rem;"></div>
            <button id="checkCrosswordFood">Check Crossword</button>
            <div id="crosswordFoodResult"></div>
        </div>

        <!-- 3. Unscramble food words -->
        <div class="card">
            <h2>🔀 Unscramble</h2>
            <div id="scrambleWord" style="font-size:1.8rem; background:#fff0d6; padding:12px; border-radius:30px;"></div>
            <input type="text" id="scrambleInput"><button id="checkScramble">Check</button><button id="newScramble">New</button>
            <div id="scrambleResult"></div><button id="speakScramble">🔊 Speak</button>
        </div>

        <!-- 4. Match have/don't have sentences -->
        <div class="card">
            <h2>✅ Have / Don't Have Match</h2>
            <div id="haveMatchQuestion"></div>
            <select id="haveMatchSelect"></select>
            <button id="checkHaveMatch">Check</button>
            <div id="haveMatchResult"></div>
            <button id="newHaveMatch">New</button>
        </div>

        <!-- 5. Write the missing word (have/don't have) -->
        <div class="card">
            <h2>✍️ Complete the Sentence</h2>
            <div id="fillBlankSentence"></div>
            <input type="text" id="fillBlankInput" placeholder="have or don't have">
            <button id="checkFillBlank">Check</button>
            <button id="newFillBlank">Next</button>
            <div id="fillBlankResult"></div>
        </div>

        <!-- 6. Label the food items (icons) -->
        <div class="card">
            <h2>🏷️ Label the Food</h2>
            <div id="labelFoodContainer"></div>
            <div id="foodWordsBank"></div>
            <button id="checkFoodLabels">Check</button>
            <div id="foodLabelResult"></div>
        </div>
    </div>
</div>

<script>
    const foods = ["candy", "juice", "soda pop", "ice cream", "popcorn", "chips"];
    const icons = { candy:"🍬", juice:"🧃", "soda pop":"🥤", "ice cream":"🍦", popcorn:"🍿", chips:"🍟" };
    function speak(t) { let u = new SpeechSynthesisUtterance(t); u.lang="en-US"; speechSynthesis.cancel(); speechSynthesis.speak(u); }

    // 1. Drag & Drop
    function initDragDropFood() {
        let container = document.getElementById('dragDropFoodArea');
        container.innerHTML = '<div><strong>Drag word to matching icon</strong></div><div style="display:flex; flex-wrap:wrap; gap:15px; margin:10px 0;">';
        let shuffled = [...foods].sort(() => Math.random() - 0.5);
        shuffled.forEach(f => {
            let span = document.createElement('span');
            span.innerText = f;
            span.setAttribute('draggable', 'true');
            span.classList.add('drag-word');
            span.ondragstart = (e) => { e.dataTransfer.setData('text/plain', f); };
            container.appendChild(span);
        });
        container.innerHTML += '</div><div style="display:flex; flex-wrap:wrap; gap:20px; margin-top:20px;">';
        foods.forEach(f => {
            let zone = document.createElement('div');
            zone.classList.add('drop-zone');
            zone.setAttribute('data-expected', f);
            zone.innerHTML = `<div style="font-size:2rem;">${icons[f]}</div><span class="drop-label">???</span>`;
            zone.ondragover = (e) => e.preventDefault();
            zone.ondrop = (e) => {
                e.preventDefault();
                let dragged = e.dataTransfer.getData('text/plain');
                let expected = zone.getAttribute('data-expected');
                if (dragged === expected) {
                    zone.querySelector('.drop-label').innerText = dragged;
                    zone.style.background = '#c8e6d9';
                } else {
                    alert(`Wrong match! ${dragged} is not ${expected}`);
                }
            };
            container.appendChild(zone);
        });
        container.innerHTML += '</div>';
    }
    document.getElementById('checkFoodDrag').onclick = () => {
        let allOk = true;
        document.querySelectorAll('#dragDropFoodArea .drop-zone').forEach(zone => {
            let label = zone.querySelector('.drop-label').innerText;
            let expected = zone.getAttribute('data-expected');
            if (label !== expected) allOk = false;
        });
        document.getElementById('foodDragResult').innerHTML = allOk ? "<div class='correct-feedback'>🎉 Perfect! Food matched correctly.</div>" : "<div class='wrong-feedback'>⚠️ Some matches are missing or wrong.</div>";
    };
    initDragDropFood();

    // 2. Crossword
    function buildFoodCrossword() {
        let gridHtml = '<div class="crossword-grid">';
        let predefined = [
            ['C','A','N','D','Y',''],
            ['','','','','I','C'],
            ['P','O','P','C','O','R'],
            ['','','','','N','N'],
            ['C','H','I','P','S',''],
            ['','','','','','']
        ];
        for(let i=0;i<6;i++){
            for(let j=0;j<6;j++){
                let val = predefined[i][j] ? predefined[i][j] : '';
                let readonly = val ? 'readonly' : '';
                gridHtml += `<input type="text" maxlength="1" id="foodCell_${i}_${j}" value="${val}" style="text-transform:uppercase" ${readonly}>`;
            }
            gridHtml += `<div style="width:100%"></div>`;
        }
        gridHtml += '</div>';
        document.getElementById('crosswordFood').innerHTML = gridHtml;
        let clues = `<strong>Clues:</strong> Across: Row0: sweet treat (CANDY), Row2: movie snack (POPCORN), Row4: salty snack (CHIPS). Down: Col5: frozen dessert (ICECREAM).`;
        document.getElementById('crosswordCluesFood').innerHTML = clues;
    }
    document.getElementById('checkCrosswordFood').onclick = () => {
        document.getElementById('crosswordFoodResult').innerHTML = "<div class='correct-feedback'>✅ Check your answers with the clues. Great puzzle solving!</div>";
    };
    buildFoodCrossword();

    // 3. Unscramble
    let currentScramble = "";
    function getScrambled(w) { let arr = w.split(''); for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr.join(''); }
    function updateScramble() { currentScramble = foods[Math.floor(Math.random()*foods.length)]; document.getElementById("scrambleWord").innerText = getScrambled(currentScramble); document.getElementById("scrambleInput").value=""; document.getElementById("scrambleResult").innerHTML=""; }
    document.getElementById("checkScramble").onclick = () => { let ans = document.getElementById("scrambleInput").value.trim().toLowerCase(); if(ans === currentScramble) document.getElementById("scrambleResult").innerHTML="<div class='correct-feedback'>✅ Correct</div>"; else document.getElementById("scrambleResult").innerHTML=`<div class='wrong-feedback'>❌ Wrong: ${currentScramble}</div>`; };
    document.getElementById("newScramble").onclick = updateScramble;
    document.getElementById("speakScramble").onclick = () => speak(currentScramble);
    updateScramble();

    // 4. Have/Don't have match
    const haveItems = [
        { sentence: "You have popcorn.", answer: "positive" },
        { sentence: "You don't have chips.", answer: "negative" },
        { sentence: "We have juice.", answer: "positive" },
        { sentence: "They don't have soda pop.", answer: "negative" }
    ];
    let currentHave = null;
    function updateHaveMatch() {
        currentHave = haveItems[Math.floor(Math.random() * haveItems.length)];
        document.getElementById("haveMatchQuestion").innerHTML = `<div style="font-size:1.3rem;">${currentHave.sentence}</div><br>Positive or negative?`;
        let select = document.getElementById("haveMatchSelect");
        select.innerHTML = "";
        let opts = ["positive", "negative"];
        opts.forEach(opt => {
            let o = document.createElement("option");
            o.value = opt;
            o.innerText = opt;
            select.appendChild(o);
        });
        document.getElementById("haveMatchResult").innerHTML = "";
    }
    document.getElementById("checkHaveMatch").onclick = () => {
        let selected = document.getElementById("haveMatchSelect").value;
        if (selected === currentHave.answer) {
            document.getElementById("haveMatchResult").innerHTML = "<div class='correct-feedback'>✅ Correct!</div>";
        } else {
            document.getElementById("haveMatchResult").innerHTML = `<div class='wrong-feedback'>❌ Wrong. The sentence is ${currentHave.answer}.</div>`;
        }
    };
    document.getElementById("newHaveMatch").onclick = updateHaveMatch;
    updateHaveMatch();

    // 5. Fill blank (have/don't have)
    const fillBlanks = [
        { sentence: "I ______ candy.", answer: "have" },
        { sentence: "We ______ juice.", answer: "don't have" },
        { sentence: "They ______ popcorn.", answer: "have" },
        { sentence: "You ______ chips.", answer: "don't have" }
    ];
    let currentBlank = null;
    function updateFillBlank() {
        currentBlank = fillBlanks[Math.floor(Math.random() * fillBlanks.length)];
        document.getElementById("fillBlankSentence").innerHTML = `<div style="font-size:1.3rem;">${currentBlank.sentence}</div>`;
        document.getElementById("fillBlankInput").value = "";
        document.getElementById("fillBlankResult").innerHTML = "";
    }
    document.getElementById("checkFillBlank").onclick = () => {
        let ans = document.getElementById("fillBlankInput").value.trim().toLowerCase();
        if (ans === currentBlank.answer) {
            document.getElementById("fillBlankResult").innerHTML = "<div class='correct-feedback'>✅ Correct!</div>";
        } else {
            document.getElementById("fillBlankResult").innerHTML = `<div class='wrong-feedback'>❌ Wrong. Correct: ${currentBlank.answer}</div>`;
        }
    };
    document.getElementById("newFillBlank").onclick = updateFillBlank;
    updateFillBlank();

    // 6. Label food
    function buildLabelFood() {
        let container = document.getElementById('labelFoodContainer');
        container.innerHTML = "";
        let shuffled = [...foods].sort(() => Math.random() - 0.5);
        shuffled.forEach((f, idx) => {
            let div = document.createElement('div');
            div.style.textAlign = "center";
            div.style.display = "inline-block";
            div.style.margin = "10px";
            div.innerHTML = `<div style="font-size:2rem;">${icons[f]}</div><input type="text" id="foodLabel_${idx}" placeholder="Word">`;
            container.appendChild(div);
        });
        let bank = document.getElementById('foodWordsBank');
        bank.innerHTML = "";
        let shuffledWords = [...foods].sort(() => Math.random() - 0.5);
        shuffledWords.forEach(w => {
            let btn = document.createElement('button');
            btn.innerText = w;
            btn.onclick = () => {
                let firstEmpty = document.querySelector('#labelFoodContainer input[value=""]');
                if (firstEmpty) firstEmpty.value = w;
                else alert("All fields filled? Use clear or edit.");
            };
            bank.appendChild(btn);
        });
    }
    document.getElementById('checkFoodLabels').onclick = () => {
        let allGood = true;
        let inputs = document.querySelectorAll('#labelFoodContainer input');
        let expected = [...foods];
        inputs.forEach((inp, idx) => {
            if (inp.value.toLowerCase().trim() !== expected[idx]) allGood = false;
        });
        document.getElementById('foodLabelResult').innerHTML = allGood ? "<div class='correct-feedback'>🏷️ All food items labeled correctly!</div>" : "<div class='wrong-feedback'>Some labels are wrong. Use the word bank.</div>";
    };
    buildLabelFood();
</script>
</body>
</html>
