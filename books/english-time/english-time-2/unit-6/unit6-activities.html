<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 6 Extra Activities - At the Flower Shop</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1e5f8e, #0d3b55); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; border-radius: 45px; padding: 20px 30px; }
        h1 { color: #ff8c42; text-align: center; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .card { background: #fef7e0; border-radius: 35px; padding: 20px; border: 1px solid #ffcf9a; }
        .card h2 { background: #ff8c42; display: inline-block; padding: 5px 20px; border-radius: 40px; color: white; font-size: 1.3rem; }
        button { background: #ff8c42; border: none; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; margin: 5px; }
        input { padding: 8px; border-radius: 30px; border: 1px solid #ccc; margin: 5px; }
        .correct-feedback { background: #c8e6d9; border-left: 6px solid #2e7d64; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .wrong-feedback { background: #ffe0e0; border-left: 6px solid #d9534f; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .drag-word { background: #2c7da0; color: white; padding: 10px 20px; border-radius: 40px; cursor: grab; display: inline-block; margin: 5px; }
        .drop-zone { border: 2px dashed #ff8c42; border-radius: 20px; padding: 12px; min-width: 100px; text-align: center; background: #fff5e6; display: inline-block; margin: 6px; }
        .crossword-grid { display: grid; grid-template-columns: repeat(6, 45px); gap: 4px; justify-content: center; background: #f0f0f0; padding: 15px; border-radius: 20px; }
        .crossword-grid input { width: 45px; height: 45px; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
        .color-palette { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
        .color-swatch { width: 60px; height: 60px; border-radius: 12px; cursor: pointer; border: 2px solid #ccc; }
    </style>
</head>
<body>
<div class="container">
    <h1>📘 English Time 2 - Unit 6 🎲 Extra Activities</h1>
    <div class="activity-grid">
        <!-- 1. Drag & Drop Real (color names to color swatches) -->
        <div class="card">
            <h2>🎨 Drag & Drop Colors</h2>
            <div id="dragDropColorsArea"></div>
            <button id="checkColorsDrag">Check All</button>
            <div id="colorsDragResult"></div>
        </div>

        <!-- 2. Crossword Puzzle (colors and objects) -->
        <div class="card">
            <h2>🔠 Crossword Puzzle</h2>
            <div id="crosswordColors"></div>
            <div id="crosswordCluesColors" style="margin-top:10px; font-size:0.8rem;"></div>
            <button id="checkCrosswordColors">Check Crossword</button>
            <div id="crosswordColorsResult"></div>
        </div>

        <!-- 3. Unscramble color words -->
        <div class="card">
            <h2>🔀 Unscramble</h2>
            <div id="scrambleWord" style="font-size:1.8rem; background:#fff0d6; padding:12px; border-radius:30px;"></div>
            <input type="text" id="scrambleInput"><button id="checkScramble">Check</button><button id="newScramble">New</button>
            <div id="scrambleResult"></div><button id="speakScramble">🔊 Speak</button>
        </div>

        <!-- 4. Match this/that/these/those with pictures -->
        <div class="card">
            <h2>🃏 Match: This/That/These/Those</h2>
            <div id="matchQuestion"></div>
            <select id="matchSelect"></select>
            <button id="checkMatch">Check</button>
            <div id="matchResult"></div>
            <button id="newMatch">New</button>
        </div>

        <!-- 5. Write the color name from swatch -->
        <div class="card">
            <h2>✍️ Name the Color</h2>
            <div id="colorSwatch" style="width:100px; height:100px; border-radius:20px; margin:0 auto;"></div>
            <input type="text" id="colorNameInput" placeholder="Color name">
            <button id="checkColorName">Check</button>
            <button id="newColorName">Next</button>
            <div id="colorNameResult"></div>
        </div>

        <!-- 6. Label the flowers (colors) -->
        <div class="card">
            <h2>🏷️ Label the Flowers</h2>
            <div id="labelFlowersContainer"></div>
            <div id="flowerWordsBank"></div>
            <button id="checkFlowerLabels">Check</button>
            <div id="flowerLabelResult"></div>
        </div>
    </div>
</div>

<script>
    const colors = ["red","yellow","blue","green","orange","brown","white","black"];
    const colorMap = {
        red: "#ff0000", yellow: "#ffff00", blue: "#0000ff", green: "#00ff00",
        orange: "#ffa500", brown: "#8b4513", white: "#ffffff", black: "#000000"
    };
    function speak(t) { let u = new SpeechSynthesisUtterance(t); u.lang="en-US"; speechSynthesis.cancel(); speechSynthesis.speak(u); }

    // ---------- DRAG & DROP REAL (color names to swatches) ----------
    function initDragDropColors() {
        let container = document.getElementById('dragDropColorsArea');
        container.innerHTML = '<div><strong>Drag color name to the matching swatch</strong></div><div style="display:flex; flex-wrap:wrap; gap:15px; margin:10px 0;">';
        let shuffledColors = [...colors].sort(() => Math.random() - 0.5);
        shuffledColors.forEach(col => {
            let span = document.createElement('span');
            span.innerText = col;
            span.setAttribute('draggable', 'true');
            span.classList.add('drag-word');
            span.ondragstart = (e) => {
                e.dataTransfer.setData('text/plain', col);
                e.dataTransfer.effectAllowed = 'copy';
            };
            container.appendChild(span);
        });
        container.innerHTML += '</div><div style="display:flex; flex-wrap:wrap; gap:20px; margin-top:20px;">';
        colors.forEach(col => {
            let zone = document.createElement('div');
            zone.classList.add('drop-zone');
            zone.setAttribute('data-expected', col);
            zone.innerHTML = `<div style="background:${colorMap[col]}; width:60px; height:60px; border-radius:12px; margin:0 auto;"></div><span class="drop-label">???</span>`;
            zone.ondragover = (e) => e.preventDefault();
            zone.ondrop = (e) => {
                e.preventDefault();
                let dragged = e.dataTransfer.getData('text/plain');
                let expected = zone.getAttribute('data-expected');
                if (dragged === expected) {
                    zone.querySelector('.drop-label').innerText = dragged;
                    zone.style.background = '#c8e6d9';
                } else {
                    alert(`Wrong match! ${dragged} is not ${expected}`);
                }
            };
            container.appendChild(zone);
        });
        container.innerHTML += '</div>';
    }
    document.getElementById('checkColorsDrag').onclick = () => {
        let allOk = true;
        document.querySelectorAll('#dragDropColorsArea .drop-zone').forEach(zone => {
            let label = zone.querySelector('.drop-label').innerText;
            let expected = zone.getAttribute('data-expected');
            if (label !== expected) allOk = false;
        });
        document.getElementById('colorsDragResult').innerHTML = allOk ? "<div class='correct-feedback'>🎉 Perfect color matching!</div>" : "<div class='wrong-feedback'>⚠️ Some matches are missing or wrong.</div>";
    };
    initDragDropColors();

    // ---------- CROSSWORD PUZZLE (simple 6x6 with color words) ----------
    function buildColorCrossword() {
        // Create a 6x6 grid with some predefined letters for colors: RED, YELLOW, BLUE, GREEN, etc. but simplified.
        let gridHtml = '<div class="crossword-grid">';
        let size = 6;
        let predefined = [
            ['R','E','D','','',''],
            ['','','','Y','E','L'],
            ['B','L','U','E','',''],
            ['','G','R','E','E','N'],
            ['','','O','R','A','N'],
            ['','','','','G','E']
        ];
        for(let i=0;i<size;i++){
            for(let j=0;j<size;j++){
                let val = predefined[i][j] ? predefined[i][j] : '';
                let readonly = val ? 'readonly' : '';
                gridHtml += `<input type="text" maxlength="1" id="cell_${i}_${j}" value="${val}" style="text-transform:uppercase" ${readonly}>`;
            }
            gridHtml += `<div style="width:100%"></div>`;
        }
        gridHtml += '</div>';
        document.getElementById('crosswordColors').innerHTML = gridHtml;
        let clues = `<strong>Clues:</strong> Across: 1) a primary color (row0) → RED. 3) a primary color (row2) → BLUE. Down: 2) a color of the sun (col4-5) → YELLOW. 4) a color of grass (row3) → GREEN.`;
        document.getElementById('crosswordCluesColors').innerHTML = clues;
    }
    document.getElementById('checkCrosswordColors').onclick = () => {
        // Just a fun check – user can verify visually
        document.getElementById('crosswordColorsResult').innerHTML = "<div class='correct-feedback'>✅ Great! Check your answers with the clues.</div>";
    };
    buildColorCrossword();

    // ---------- UNSCRAMBLE ----------
    let currentScramble = "";
    function getScrambled(w) { let arr = w.split(''); for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr.join(''); }
    function updateScramble() { currentScramble = colors[Math.floor(Math.random()*colors.length)]; document.getElementById("scrambleWord").innerText = getScrambled(currentScramble); document.getElementById("scrambleInput").value=""; document.getElementById("scrambleResult").innerHTML=""; }
    document.getElementById("checkScramble").onclick = () => { let ans = document.getElementById("scrambleInput").value.trim().toLowerCase(); if(ans === currentScramble) document.getElementById("scrambleResult").innerHTML="<div class='correct-feedback'>✅ Correct</div>"; else document.getElementById("scrambleResult").innerHTML=`<div class='wrong-feedback'>❌ Wrong: ${currentScramble}</div>`; };
    document.getElementById("newScramble").onclick = updateScramble;
    document.getElementById("speakScramble").onclick = () => speak(currentScramble);
    updateScramble();

    // ---------- MATCH (this/that/these/those with objects) ----------
    const matchItems = [
        { image: "red flower", phrase: "This is a red flower.", correct: "this" },
        { image: "yellow flowers far", phrase: "Those are yellow flowers.", correct: "those" },
        { image: "blue butterflies near", phrase: "These are blue butterflies.", correct: "these" },
        { image: "green tree far", phrase: "That is a green tree.", correct: "that" }
    ];
    let currentMatch = null;
    function updateMatch() {
        currentMatch = matchItems[Math.floor(Math.random() * matchItems.length)];
        document.getElementById("matchQuestion").innerHTML = `<div style="background:#e9ecef; padding:10px; border-radius:20px;">${currentMatch.phrase.replace(currentMatch.correct, '______')}</div>`;
        let select = document.getElementById("matchSelect");
        select.innerHTML = "";
        let opts = ["this","that","these","those"];
        opts.forEach(opt => {
            let o = document.createElement("option");
            o.value = opt;
            o.innerText = opt;
            select.appendChild(o);
        });
        document.getElementById("matchResult").innerHTML = "";
    }
    document.getElementById("checkMatch").onclick = () => {
        let selected = document.getElementById("matchSelect").value;
        if (selected === currentMatch.correct) {
            document.getElementById("matchResult").innerHTML = "<div class='correct-feedback'>✅ Correct!</div>";
        } else {
            document.getElementById("matchResult").innerHTML = `<div class='wrong-feedback'>❌ Wrong. Correct: ${currentMatch.correct}</div>`;
        }
    };
    document.getElementById("newMatch").onclick = updateMatch;
    updateMatch();

    // ---------- WRITE COLOR NAME FROM SWATCH ----------
    let currentColor = "";
    function updateColorSwatch() {
        currentColor = colors[Math.floor(Math.random() * colors.length)];
        document.getElementById("colorSwatch").style.backgroundColor = colorMap[currentColor];
        document.getElementById("colorNameInput").value = "";
        document.getElementById("colorNameResult").innerHTML = "";
    }
    document.getElementById("checkColorName").onclick = () => {
        let ans = document.getElementById("colorNameInput").value.trim().toLowerCase();
        if (ans === currentColor) {
            document.getElementById("colorNameResult").innerHTML = "<div class='correct-feedback'>✅ Correct!</div>";
        } else {
            document.getElementById("colorNameResult").innerHTML = `<div class='wrong-feedback'>❌ Wrong. It's ${currentColor}.</div>`;
        }
    };
    document.getElementById("newColorName").onclick = updateColorSwatch;
    updateColorSwatch();

    // ---------- LABEL FLOWERS (color flowers) ----------
    function buildLabelFlowers() {
        let container = document.getElementById('labelFlowersContainer');
        container.innerHTML = "";
        let shuffled = [...colors].sort(() => Math.random() - 0.5);
        shuffled.forEach((col, idx) => {
            let div = document.createElement('div');
            div.style.textAlign = "center";
            div.style.display = "inline-block";
            div.style.margin = "10px";
            div.innerHTML = `<div style="background:${colorMap[col]}; width:60px; height:60px; border-radius:50%; margin:0 auto;"></div><input type="text" id="flowerLabel_${idx}" placeholder="Color">`;
            container.appendChild(div);
        });
        let bank = document.getElementById('flowerWordsBank');
        bank.innerHTML = "";
        let shuffledWords = [...colors].sort(() => Math.random() - 0.5);
        shuffledWords.forEach(w => {
            let btn = document.createElement('button');
            btn.innerText = w;
            btn.onclick = () => {
                let firstEmpty = document.querySelector('#labelFlowersContainer input[value=""]');
                if (firstEmpty) firstEmpty.value = w;
                else alert("All fields filled? Use clear or edit.");
            };
            bank.appendChild(btn);
        });
    }
    document.getElementById('checkFlowerLabels').onclick = () => {
        let allGood = true;
        let inputs = document.querySelectorAll('#labelFlowersContainer input');
        let expectedColors = [...colors];
        inputs.forEach((inp, idx) => {
            if (inp.value.toLowerCase().trim() !== expectedColors[idx]) allGood = false;
        });
        document.getElementById('flowerLabelResult').innerHTML = allGood ? "<div class='correct-feedback'>🌸 All flowers labeled correctly!</div>" : "<div class='wrong-feedback'>Some labels are wrong. Use the word bank.</div>";
    };
    buildLabelFlowers();
</script>
</body>
</html>
