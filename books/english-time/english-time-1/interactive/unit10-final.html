<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unit 10 - Dictation Games</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#eef2ff;padding:20px}
        .container{max-width:1200px;margin:auto;background:white;border-radius:48px;padding:25px}
        h1{color:#d45a1e;text-align:center}
        .game-selector{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:20px 0}
        .game-btn{background:#e2e8f0;border:none;padding:10px 20px;border-radius:40px;cursor:pointer;font-weight:bold}
        .game-btn.active{background:#f59e0b;color:white}
        .game-panel{display:none;margin-top:20px}
        .game-panel.active{display:block}
        .word-card{background:#fffaf0;border-radius:24px;padding:15px;margin:15px 0;text-align:center}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}
        button{background:#3b82f6;color:white;border:none;padding:8px 16px;border-radius:30px;cursor:pointer}
        input,select{padding:8px;border-radius:30px;border:1px solid #ccc;margin:5px}
        .correct{background:#d1fae5}
        .wrong{background:#fee2e2}
        .hangman-word{font-size:2rem;letter-spacing:10px;font-family:monospace}
        .message{font-weight:bold;margin:10px 0}
    </style>
</head>
<body>
<div class="container">
    <h1>🎮 Unit 10 - Dictation Games</h1>
    <div class="game-selector">
        <button class="game-btn" data-game="hangman">🪢 Hangman</button>
        <button class="game-btn" data-game="missing">🔤 Missing Letter</button>
        <button class="game-btn" data-game="match">🃏 Match</button>
        <button class="game-btn" data-game="gap">📝 Fill Gap</button>
        <button class="game-btn" data-game="classic">🎧 Classic Dictation</button>
    </div>

    <div id="hangman" class="game-panel"><h2>🪢 Hangman</h2><div class="hangman-word" id="hangmanWord">_ _ _ _ _</div><div id="hangmanMessage" class="message"></div><input type="text" id="hangmanLetter" maxlength="1" placeholder="Guess a letter"><button id="hangmanGuess">Guess</button><button id="hangmanReset">New Word</button><p>Wrong guesses: <span id="wrongLetters"></span></p></div>
    <div id="missing" class="game-panel"><h2>🔤 Missing Letter</h2><div id="missingGrid" class="grid"></div><button id="checkMissing">Check Answers</button><div id="missingResult"></div></div>
    <div id="match" class="game-panel"><h2>🃏 Match</h2><div id="matchGrid"></div><button id="checkMatch">Check Matches</button><div id="matchResult"></div></div>
    <div id="gap" class="game-panel"><h2>📝 Fill Gap</h2><div id="gapGrid"></div><button id="checkGap">Check Answers</button><div id="gapResult"></div></div>
    <div id="classic" class="game-panel"><h2>🎧 Classic Dictation</h2><div id="classicGrid" class="grid"></div><button id="checkClassic">Check All</button><div id="classicResult"></div></div>
</div>
<script>
    const words = ["doctor","nurse","police officer","teacher","mail carrier","firefighter"];
    const sentences = __SENTENCES__;
    const gapAnswers = ["firefighter","doctor","teacher","mail carrier","police officer"];
    const base = "https://raw.githubusercontent.com/anassarhan78-png/english-zone-ksa/main/books/english-time/english-time-1/images/";
    const images = {};
    JSON.parse(words).forEach(w => { images[w] = w.toLowerCase().replace(/ /g, '-') + ".jpg"; });
    const wordArray = JSON.parse(words);
    const sentArray = JSON.parse(sentences);
    const ansArray = JSON.parse(gapAnswers);
    // Hangman
    let currentWord = "", guessed = [], wrong = [];
    function initHangman() { currentWord = wordArray[Math.floor(Math.random()*wordArray.length)].toLowerCase(); guessed=[]; wrong=[]; updateHang(); }
    function updateHang() {
        let disp = currentWord.split("").map(l=>guessed.includes(l)?l:"_").join(" ");
        document.getElementById("hangmanWord").innerText = disp;
        document.getElementById("wrongLetters").innerText = wrong.join(", ");
        if(disp.replace(/ /g,"")===currentWord) document.getElementById("hangmanMessage").innerHTML = "🎉 You won!";
        else if(wrong.length>=6) document.getElementById("hangmanMessage").innerHTML = "💀 Game over! Word was "+currentWord;
        else document.getElementById("hangmanMessage").innerHTML = "";
    }
    document.getElementById("hangmanGuess")?.addEventListener("click",()=>{
        let l=document.getElementById("hangmanLetter").value.toLowerCase(); if(!l) return;
        if(guessed.includes(l)||wrong.includes(l)) return;
        if(currentWord.includes(l)) guessed.push(l); else wrong.push(l);
        updateHang(); document.getElementById("hangmanLetter").value="";
    });
    document.getElementById("hangmanReset")?.addEventListener("click",initHangman);
    initHangman();
    // Missing letter
    let missingItems=[];
    function loadMissing(){
        let cont=document.getElementById("missingGrid"); cont.innerHTML="";
        missingItems=[];
        wordArray.forEach((w,i)=>{
            let idx=Math.floor(Math.random()*w.length);
            let disp=w.substring(0,idx)+"_"+w.substring(idx+1);
            missingItems.push({disp:disp,correct:w[idx]});
            let div=document.createElement("div"); div.className="word-card";
            div.innerHTML="<p>"+disp+"</p><input type='text' id='miss-"+i+"' maxlength='1'>";
            cont.appendChild(div);
        });
    }
    document.getElementById("checkMissing")?.addEventListener("click",()=>{
        let score=0;
        missingItems.forEach((item,i)=>{
            let inp=document.getElementById("miss-"+i);
            if(inp && inp.value.toLowerCase()===item.correct){score++; inp.classList.add("correct");}
            else if(inp) inp.classList.add("wrong");
        });
        document.getElementById("missingResult").innerHTML="Score: "+score+"/"+missingItems.length;
    });
    loadMissing();
    // Match
    function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}
    function loadMatch(){
        let cont=document.getElementById("matchGrid");
        let shuffledWords=shuffle([...wordArray]);
        let shuffledImages=shuffle([...wordArray]);
        cont.innerHTML='<div class="grid">';
        shuffledWords.forEach((w,i)=>{
            cont.innerHTML+='<div class="word-card"><strong>'+w+'</strong><select id="match-'+i+'"><option value="">Select</option>'+shuffledImages.map(img=>'<option value="'+img+'">'+img+'</option>').join('')+'</select></div>';
        });
        cont.innerHTML+='</div>';
    }
    document.getElementById("checkMatch")?.addEventListener("click",()=>{
        let score=0;
        for(let i=0;i<wordArray.length;i++){
            let sel=document.getElementById("match-"+i);
            if(sel && sel.value===wordArray[i]) score++;
        }
        document.getElementById("matchResult").innerHTML="Matched: "+score+"/"+wordArray.length;
    });
    loadMatch();
    // Fill gap
    function loadGap(){
        let cont=document.getElementById("gapGrid"); cont.innerHTML="";
        sentArray.forEach((s,i)=>{
            let div=document.createElement("div"); div.className="word-card";
            div.innerHTML="<p>"+s+"</p><input type='text' id='gap-"+i+"' placeholder='Answer'>";
            cont.appendChild(div);
        });
    }
    document.getElementById("checkGap")?.addEventListener("click",()=>{
        let score=0;
        for(let i=0;i<ansArray.length;i++){
            let inp=document.getElementById("gap-"+i);
            if(inp && inp.value.trim().toLowerCase()===ansArray[i].toLowerCase()){score++; inp.classList.add("correct");}
            else if(inp) inp.classList.add("wrong");
        }
        document.getElementById("gapResult").innerHTML="Score: "+score+"/"+ansArray.length;
    });
    loadGap();
    // Classic dictation
    function speakWord(w){
        let u=new SpeechSynthesisUtterance(w);
        u.lang="en-US"; u.rate=0.8;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
    }
    function loadClassic(){
        let cont=document.getElementById("classicGrid"); cont.innerHTML="";
        wordArray.forEach((w,i)=>{
            let imgSrc=base+images[w];
            let div=document.createElement("div"); div.className="word-card";
            div.innerHTML='<img src="'+imgSrc+'" style="max-width:80px;border-radius:16px" onerror="this.style.display=\'none\'"><button class="speak-btn" data-word="'+w+'">🔊 Speak</button><input type="text" id="classic-'+i+'" placeholder="Type word">';
            cont.appendChild(div);
        });
        document.querySelectorAll(".speak-btn").forEach(btn=>btn.addEventListener("click",()=>speakWord(btn.getAttribute("data-word"))));
    }
    document.getElementById("checkClassic")?.addEventListener("click",()=>{
        let score=0;
        wordArray.forEach((w,i)=>{
            let inp=document.getElementById("classic-"+i);
            if(inp && inp.value.trim().toLowerCase()===w.toLowerCase()){score++; inp.classList.add("correct");}
            else if(inp) inp.classList.add("wrong");
        });
        document.getElementById("classicResult").innerHTML="Score: "+score+"/"+wordArray.length;
    });
    loadClassic();
    // Switcher
    let panels=["hangman","missing","match","gap","classic"];
    document.querySelectorAll(".game-btn").forEach(btn=>{
        btn.addEventListener("click",()=>{
            panels.forEach(p=>document.getElementById(p).classList.remove("active"));
            document.getElementById(btn.dataset.game).classList.add("active");
            document.querySelectorAll(".game-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
        });
    });
    document.querySelector(".game-btn").click();
</script>
</body>
</html>
