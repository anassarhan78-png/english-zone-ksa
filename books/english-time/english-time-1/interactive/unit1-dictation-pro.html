<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dictation PRO - Unit 1</title>

<style>
body {
    font-family: Arial;
    background: #eef2ff;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
}

.word-box {
    margin: 20px 0;
}

input {
    padding: 10px;
    width: 80%;
    border-radius: 30px;
    border: 1px solid #ccc;
    text-align: center;
}

button {
    padding: 10px 20px;
    margin: 8px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: #6366f1;
    color: white;
}

.correct { background: #bbf7d0; }
.wrong { background: #fecaca; }

.hint {
    font-size: 14px;
    color: #555;
}
</style>
</head>

<body>

<div class="container">
    <h2>🎧 Listen & Type</h2>
    <p>Click 🔊 to hear the word, then type it.</p>

    <div class="word-box">
        <button onclick="speak()">🔊 Play</button>
        <button onclick="hint()">💡 Hint</button>
        <br>
        <input id="answer" placeholder="Type what you hear...">
    </div>

    <button onclick="check()">✅ Check</button>
    <button onclick="next()">➡️ Next</button>

    <p id="feedback"></p>
    <p class="hint" id="hintText"></p>
</div>

<script>
const words = ["house", "street", "park", "school", "store"];
let index = 0;
let current = words[index];

function speak() {
    const utterance = new SpeechSynthesisUtterance(current);
    utterance.lang = "en-US";
    speechSynthesis.speak(utterance);
}

function check() {
    const input = document.getElementById("answer");
    const val = input.value.trim().toLowerCase();
    const feedback = document.getElementById("feedback");

    if (val === current) {
        feedback.innerHTML = "✅ Correct!";
        input.className = "correct";
    } else {
        feedback.innerHTML = "❌ Try again!";
        input.className = "wrong";
    }
}

function hint() {
    const hintText = document.getElementById("hintText");
    hintText.innerHTML = "Starts with: " + current.charAt(0);
}

function next() {
    index++;
    if (index >= words.length) {
        alert("🎉 Finished!");
        return;
    }

    current = words[index];
    document.getElementById("answer").value = "";
    document.getElementById("feedback").innerHTML = "";
    document.getElementById("hintText").innerHTML = "";
    document.getElementById("answer").className = "";
}
</script>

</body>
</html>
