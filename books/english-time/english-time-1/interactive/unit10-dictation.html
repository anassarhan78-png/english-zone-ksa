<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>🎨 Dictation تفاعلي - الوحدة 10</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #f5f7fa, #c3cfe2); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 48px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        h1 { background: linear-gradient(90deg, #f59e0b, #ef4444); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; }
        .word-box { background: #fef9c3; border-radius: 32px; padding: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .word { background: white; border-radius: 60px; padding: 8px 20px; font-weight: bold; }
        .draw-area { background: #fff7ed; border-radius: 24px; padding: 20px; margin: 15px 0; border: 2px dashed #f97316; }
        canvas { background: white; border-radius: 16px; display: block; margin: 10px auto; cursor: crosshair; }
        .sentence-input { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .sentence-input label { font-weight: bold; width: 120px; }
        input { flex: 1; padding: 8px 12px; border-radius: 40px; border: 1px solid #ccc; }
        button { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; margin: 5px; }
        .result { background: #fef3c7; padding: 15px; border-radius: 28px; margin-top: 20px; text-align: center; font-weight: bold; }
        .clear-btn { background: #6b7280; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎨 Face Dictation - الوحدة 10</h1>
    <div class="word-box"><div class="word">👦 Boy</div><div class="word">👧 Girl</div><div class="word">👨 Man</div><div class="word">👩 Woman</div><div class="word">🤝 Friend</div></div>
    <div id="exercises"></div>
    <div style="text-align:center"><button id="checkBtn">✅ تحقق</button><button id="clearBtn" class="clear-btn">🧽 مسح</button></div>
    <div id="result" class="result"></div>
</div>
<script>
const exercises = [
    { sentence: "I am a boy.", expected: "i am a boy", drawHint: "👦" },
    { sentence: "You are a girl.", expected: "you are a girl", drawHint: "👧" },
    { sentence: "He is a man.", expected: "he is a man", drawHint: "👨" },
    { sentence: "She is a woman.", expected: "she is a woman", drawHint: "👩" },
    { sentence: "You are my friend.", expected: "you are my friend", drawHint: "❤️" }
];
const container = document.getElementById('exercises');
exercises.forEach((ex, idx) => {
    const div = document.createElement('div');
    div.className = 'draw-area';
    div.innerHTML = `<div style="display:flex; justify-content:space-between"><span style="font-size:1.5rem">${ex.drawHint}</span><span>${ex.sentence}</span></div>
        <canvas id="canvas-${idx}" width="300" height="150" style="width:100%; max-width:300px; height:auto; background:white; border:1px solid #ccc;"></canvas>
        <div class="sentence-input"><label>📝 اكتب الجملة:</label><input type="text" id="input-${idx}" placeholder="مثال: I am a boy"></div>`;
    container.appendChild(div);
});
function initCanvas(id) {
    const canvas = document.getElementById(id);
    const ctx = canvas.getContext('2d');
    let drawing = false;
    const start = (e) => { drawing = true; ctx.beginPath(); getCoords(e, (x,y)=>{ctx.moveTo(x,y); ctx.lineTo(x,y); ctx.stroke();}); };
    const draw = (e) => { if(!drawing) return; getCoords(e, (x,y)=>{ctx.lineTo(x,y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x,y);}); };
    const stop = () => { drawing = false; ctx.beginPath(); };
    const getCoords = (e, callback) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if(e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; e.preventDefault(); }
        else { clientX = e.clientX; clientY = e.clientY; }
        callback((clientX - rect.left)*scaleX, (clientY - rect.top)*scaleY);
    };
    canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseup', stop); canvas.addEventListener('mouseleave', stop);
    canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', draw); canvas.addEventListener('touchend', stop);
    ctx.fillStyle = 'white'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
}
for(let i=0;i<exercises.length;i++) initCanvas();
document.getElementById('clearBtn').onclick = () => {
    for(let i=0;i<exercises.length;i++) {
        const c = document.getElementById(), ctx = c.getContext('2d');
        ctx.fillStyle='white'; ctx.fillRect(0,0,c.width,c.height); ctx.beginPath();
    }
};
document.getElementById('checkBtn').onclick = () => {
    let score=0;
    for(let i=0;i<exercises.length;i++) {
        const inp = document.getElementById();
        if(inp.value.trim().toLowerCase().replace(/\.$/, '') === exercises[i].expected) { score++; inp.style.backgroundColor='#d1fae5'; }
        else inp.style.backgroundColor='#fee2e2';
    }
    document.getElementById('result').innerHTML = `🎉 نتيجتك: ${score} من ${exercises.length} ✅ ${score===exercises.length ? '🏆 ممتاز!' : '📖 حاول مرة أخرى'}`;
};
</script>
</body>
</html>
