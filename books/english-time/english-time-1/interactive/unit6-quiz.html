<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Unit 6: In Gym Class</title>
    <style>
        body{font-family:Arial;background:#eef2ff;padding:20px}
        .container{max-width:700px;margin:auto;background:white;border-radius:40px;padding:25px}
        h1{color:#d45a1e}
        .question{background:#fef9c3;padding:15px;border-radius:24px;margin:15px 0}
        button{background:#10b981;color:white;border:none;padding:10px 20px;border-radius:30px;cursor:pointer}
        .result{background:#e0e7ff;padding:15px;border-radius:24px;margin-top:20px}
    </style>
</head>
<body>
<div class="container">
    <h1>❓ Quiz - Unit 6: In Gym Class</h1>
    <div class="question">1. When you need water, you are _______. <br> <input type='radio' name='q1' value='hungry'> hungry 
<input type='radio' name='q1' value='thirsty'> thirsty 
<input type='radio' name='q1' value='cold'> cold </div>
    <div class="question">2. Complete: "I feel _______ when I play." <br><input type="text" id="q2" placeholder="Your answer"></div>
    <div class="question">3. Choose: "Are you cold? (yes/no)" <br> <input type='radio' name='q3' value='yes'> yes 
<input type='radio' name='q3' value='no'> no </div>
    <button onclick="checkQuiz()">Submit</button>
    <div id="result" class="result"></div>
</div>
<script>
    function checkQuiz() {
        let score = 0;
        let q1 = document.querySelector('input[name="q1"]:checked');
        if(q1 && q1.value === "thirsty") score++;
        let q2 = document.getElementById('q2').value.trim().toLowerCase();
        if(q2 === "happy") score++;
        let q3 = document.querySelector('input[name="q3"]:checked');
        if(q3 && q3.value === "no") score++;
        document.getElementById('result').innerHTML = `You got ${score}/3 correct. ${score===3 ? "Perfect!" : "Try again."}`;
    }
</script>
</body>
</html>
