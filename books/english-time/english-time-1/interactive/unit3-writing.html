<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>✍️ Writing تفاعلي - الوحدة '</unit>'</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #e0e7ff, #fce7f3); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 48px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        h1 { background: linear-gradient(90deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; }
        .topic { background: #f3e8ff; border-radius: 32px; padding: 20px; margin: 20px 0; }
        textarea { width: 100%; padding: 15px; border-radius: 24px; border: 2px solid #cbd5e1; font-family: inherit; font-size: 1rem; resize: vertical; margin: 10px 0; }
        button { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; margin: 5px; }
        .checklist { background: #fef9c3; padding: 20px; border-radius: 28px; margin-top: 20px; }
        .result { background: #dbeafe; padding: 15px; border-radius: 28px; margin-top: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>✍️ Writing Challenge - الوحدة ${unit}</h1>
    <div class="topic">
        <h3>📝 موضوع الكتابة:</h3>
        <p>اكتب 3-5 جمل عن موضوع الوحدة (مثلاً: المدرسة، الحي، الطبيعة). استخدم المفردات الجديدة.</p>
    </div>
    <textarea id="writingArea" rows="8" placeholder="اكتب نصك هنا..."></textarea>
    <button id="checkBtn">✅ تقييم ذاتي</button>
    <div class="checklist">
        <h3>📋 قائمة المراجعة</h3>
        <label><input type="checkbox" id="chk1"> استخدمت 3 جمل على الأقل</label><br>
        <label><input type="checkbox" id="chk2"> استخدمت كلمات الوحدة بشكل صحيح</label><br>
        <label><input type="checkbox" id="chk3"> بدأت الجمل بحروف كبيرة وأنهيتها بنقاط</label><br>
        <label><input type="checkbox" id="chk4"> الجمل مفهومة ومرتبة</label>
    </div>
    <div id="result" class="result"></div>
</div>
<script>
    document.getElementById('checkBtn').onclick = () => {
        let score = 0;
        if(document.getElementById('chk1').checked) score++;
        if(document.getElementById('chk2').checked) score++;
        if(document.getElementById('chk3').checked) score++;
        if(document.getElementById('chk4').checked) score++;
        const text = document.getElementById('writingArea').value.trim();
        if(text.split(/[.?!]\s/).length >= 3) score++;
        document.getElementById('result').innerHTML = `🎉 نقاطك: ${score} من 5 ${score===5 ? 'أحسنت! 🏆' : 'حاول تحسين النقاط المتبقية'}`;
    };
</script>
</body>
</html>
