<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 1 Dictation</title>
    <script type="importmap">
        {
            "imports": {
                "@edge-tts/universal": "https://esm.sh/@edge-tts/universal@1.4.0"
            }
        }
    </script>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f7ff; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 30px; padding: 20px; }
        h1 { text-align: center; color: #d45a1e; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }
        .card { background: #fffaf0; border-radius: 25px; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .image-area { height: 120px; display: flex; align-items: center; justify-content: center; }
        img { max-width: 100px; max-height: 100px; border-radius: 15px; }
        .fallback { font-size: 3rem; }
        .word { font-size: 1.2rem; font-weight: bold; margin: 10px 0; }
        button { background: #3b82f6; border: none; color: white; padding: 6px 12px; border-radius: 30px; cursor: pointer; margin: 5px; }
        input { width: 90%; padding: 8px; margin: 8px 0; border-radius: 30px; border: 1px solid #ccc; text-align: center; }
        .correct { background: #d1fae5; border-color: green; }
        .wrong { background: #fee2e2; border-color: red; }
        .check-btn { background: #10b981; font-size: 1.1rem; padding: 10px 20px; display: block; margin: 20px auto; }
        .result { background: #e0e7ff; padding: 15px; border-radius: 25px; text-align: center; margin-top: 20px; }
        .info { background: #fef3c7; padding: 10px; border-radius: 20px; margin-bottom: 20px; text-align: center; font-size: 0.9rem; }
        a { color: #1e40af; }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Unit 1: Hello, I'm Annie</h1>
    <div class="info">
        🖼️ الصور المطلوبة في مجلد <code>books/english-time/english-time-1/images/</code><br>
        <strong>annie.jpg, ted.jpg, digger.jpg, boy.jpg, girl.jpg, dog.jpg</strong><br>
        👉 <a href="https://github.com/anassarhan78-png/english-zone-ksa/tree/main/books/english-time/english-time-1/images" target="_blank">افتح مجلد الصور على GitHub للتأكد من الأسماء والامتداد</a>
    </div>
    <div class="grid" id="grid"></div>
    <button id="checkBtn" class="check-btn">✅ Check All Answers</button>
    <div id="result" class="result">✨ Press the button ✨</div>
</div>
<script type="module">
    import { EdgeTTS } from '@edge-tts/universal';
    const words = [
        { word: "Annie", emoji: "👧", img: "annie.jpg" },
        { word: "Ted", emoji: "👦", img: "ted.jpg" },
        { word: "Digger", emoji: "🐶", img: "digger.jpg" },
        { word: "boy", emoji: "👦", img: "boy.jpg" },
        { word: "girl", emoji: "👧", img: "girl.jpg" },
        { word: "dog", emoji: "🐕", img: "dog.jpg" }
    ];
    const grid = document.getElementById('grid');
    const base = "../images/";
    const cacheBuster = new Date().getTime();

    async function speak(word, btn) {
        const original = btn.innerHTML;
        btn.innerHTML = "⏳...";
        btn.disabled = true;
        try {
            const tts = new EdgeTTS();
            const result = await tts.synthesize(word, "en-US-JennyNeural");
            const audio = new Audio(URL.createObjectURL(result.audio));
            audio.play();
        } catch(e) { console.error(e); }
        btn.innerHTML = original;
        btn.disabled = false;
    }

    words.forEach((w, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        const imgUrl = `${base}${w.img}?v=${cacheBuster}`;
        card.innerHTML = `
            <div class="image-area">
                <img src="${imgUrl}" alt="${w.word}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'fallback\\'>${w.emoji}</div><div style=\\'font-size:0.7rem;\\'>⚠️ ${w.img} not found</div>';">
            </div>
            <div class="word">${w.word}</div>
            <button class="speak" data-word="${w.word}">🔊 Speak</button>
            <input id="in-${idx}" placeholder="Type '${w.word}'">
        `;
        grid.appendChild(card);
    });

    document.querySelectorAll('.speak').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            speak(btn.getAttribute('data-word'), btn);
        });
    });

    document.getElementById('checkBtn').onclick = () => {
        let score = 0;
        words.forEach((w, i) => {
            const inp = document.getElementById(`in-${i}`);
            if (inp.value.trim().toLowerCase() === w.word.toLowerCase()) {
                score++;
                inp.classList.add('correct');
                inp.classList.remove('wrong');
            } else {
                inp.classList.add('wrong');
                inp.classList.remove('correct');
            }
        });
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = score === words.length ? `🎉 Perfect! ${score}/${words.length} 🏆` : `📊 Score: ${score}/${words.length}. Try again.`;
    };
</script>
</body>
</html>
