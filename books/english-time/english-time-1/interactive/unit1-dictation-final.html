<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 1 Dictation</title>
    <script type="importmap">
        {
            "imports": {
                "@edge-tts/universal": "https://esm.sh/@edge-tts/universal@1.4.0"
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f7ff; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 40px; padding: 25px; }
        h1 { text-align: center; color: #d45a1e; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin: 20px 0; }
        .card { background: #fffaf0; border-radius: 28px; padding: 15px; text-align: center; }
        .emoji { font-size: 3rem; }
        .word { font-size: 1.3rem; font-weight: bold; margin: 10px 0; }
        .image-box { min-height: 110px; display: flex; justify-content: center; align-items: center; }
        .image-box img { max-width: 100px; max-height: 100px; border-radius: 20px; }
        button { background: #3b82f6; border: none; color: white; padding: 6px 12px; border-radius: 40px; cursor: pointer; margin: 5px; }
        input { width: 90%; padding: 8px; margin: 8px 0; border-radius: 60px; border: 2px solid #e2e8f0; text-align: center; }
        .correct { background: #d1fae5; border-color: #10b981; }
        .wrong { background: #fee2e2; border-color: #ef4444; }
        .check-btn { background: #10b981; font-size: 1.1rem; padding: 10px 24px; display: block; margin: 20px auto; }
        .result { background: #e0e7ff; padding: 15px; border-radius: 28px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Unit 1: Hello, I'm Annie</h1>
    <div class="grid" id="grid"></div>
    <button id="checkBtn" class="check-btn">✅ Check All Answers</button>
    <div id="result" class="result">✨ Press the button ✨</div>
</div>
<script type="module">
    import { EdgeTTS } from '@edge-tts/universal';
    const words = [
        { word: "Annie", emoji: "👧", img: "annie.jpg" },
        { word: "Ted", emoji: "👦", img: "ted.jpg" },
        { word: "Digger", emoji: "🐶", img: "digger.jpg" },
        { word: "boy", emoji: "👦", img: "boy.jpg" },
        { word: "girl", emoji: "👧", img: "girl.jpg" },
        { word: "dog", emoji: "🐕", img: "dog.jpg" }
    ];
    const grid = document.getElementById('grid');
    const base = "../images/";
    const cacheBuster = Date.now();

    async function speak(word, btn) {
        const orig = btn.innerHTML;
        btn.innerHTML = "⏳...";
        btn.disabled = true;
        try {
            const tts = new EdgeTTS();
            const res = await tts.synthesize(word, "en-US-JennyNeural");
            new Audio(URL.createObjectURL(res.audio)).play();
        } catch(e) { console.error(e); }
        btn.innerHTML = orig;
        btn.disabled = false;
    }

    words.forEach((w, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        const imgSrc = `${base}${w.img}?v=${cacheBuster}`;
        card.innerHTML = `
            <div class="emoji">${w.emoji}</div>
            <div class="word">${w.word}</div>
            <div class="image-box"><img src="${imgSrc}" onerror="this.onerror=null; this.parentElement.innerHTML='<div style=\\'font-size:2rem;\\'>${w.emoji}</div>'"></div>
            <button class="speak" data-word="${w.word}">🔊 Speak</button>
            <input id="in-${i}" placeholder="Type '${w.word}'">
        `;
        grid.appendChild(card);
    });

    document.querySelectorAll('.speak').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            speak(btn.getAttribute('data-word'), btn);
        });
    });

    document.getElementById('checkBtn').onclick = () => {
        let score = 0;
        words.forEach((w, i) => {
            const inp = document.getElementById(`in-${i}`);
            if (inp.value.trim().toLowerCase() === w.word.toLowerCase()) {
                score++;
                inp.classList.add('correct');
                inp.classList.remove('wrong');
            } else {
                inp.classList.add('wrong');
                inp.classList.remove('correct');
            }
        });
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = score === words.length ? `🎉 Perfect! ${score}/${words.length} 🏆` : `📊 Score: ${score}/${words.length}. Try again.`;
    };
</script>
</body>
</html>
