<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 1 - Dictation with Pictures</title>
    <script type="importmap">
        {
            "imports": {
                "@edge-tts/universal": "https://esm.sh/@edge-tts/universal@1.4.0"
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f0f7ff;
            margin: 0;
            padding: 20px;
            direction: ltr;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #d45a1e; }
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }
        .word-card {
            background: #fffaf0;
            border-radius: 28px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .word-emoji {
            font-size: 3rem;
            display: block;
        }
        .word-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: #1e3a8a;
            margin: 10px 0;
        }
        .image-container {
            margin: 10px auto;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .image-container img {
            max-width: 100px;
            max-height: 100px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        button {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            margin: 5px;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 60px;
            border: 2px solid #e2e8f0;
            text-align: center;
            font-size: 1rem;
        }
        .correct { background: #d1fae5; border-color: #10b981; }
        .wrong { background: #fee2e2; border-color: #ef4444; }
        .check-btn {
            background: #10b981;
            font-size: 1.1rem;
            padding: 10px 24px;
            display: block;
            margin: 20px auto;
        }
        .result {
            background: #e0e7ff;
            padding: 15px;
            border-radius: 28px;
            text-align: center;
            font-weight: bold;
            margin-top: 20px;
        }
        .info-note {
            background: #fef3c7;
            padding: 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Unit 1: Hello, I'm Annie</h1>
    <div class="info-note" id="imageStatus">
        ⏳ جاري تحميل الصور...
    </div>
    <div class="word-grid" id="wordsGrid"></div>
    <button id="checkAll" class="check-btn">✅ Check All Answers</button>
    <div id="resultArea" class="result">✨ Press the button to check your spelling ✨</div>
</div>

<script type="module">
    import { EdgeTTS } from '@edge-tts/universal';

    const words = [
        { word: "Annie", emoji: "👧", img: "annie.jpg" },
        { word: "Ted", emoji: "👦", img: "ted.jpg" },
        { word: "Digger", emoji: "🐶", img: "digger.jpg" },
        { word: "boy", emoji: "👦", img: "boy.jpg" },
        { word: "girl", emoji: "👧", img: "girl.jpg" },
        { word: "dog", emoji: "🐕", img: "dog.jpg" }
    ];

    const grid = document.getElementById('wordsGrid');
    const imageBase = "../images/";
    let imagesLoaded = 0;

    async function speakWord(word, buttonElement) {
        if (!buttonElement) return;
        const originalText = buttonElement.innerHTML;
        buttonElement.innerHTML = "⏳ ...";
        buttonElement.disabled = true;
        try {
            const tts = new EdgeTTS();
            const result = await tts.synthesize(word, "en-US-JennyNeural");
            const audio = new Audio(URL.createObjectURL(result.audio));
            audio.play();
            audio.onended = () => {
                buttonElement.innerHTML = originalText;
                buttonElement.disabled = false;
            };
        } catch (error) {
            console.error(error);
            buttonElement.innerHTML = "❌ Error";
            setTimeout(() => {
                buttonElement.innerHTML = originalText;
                buttonElement.disabled = false;
            }, 1500);
        }
    }

    words.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerHTML = `
            <div class="word-emoji">${item.emoji}</div>
            <div class="word-text">${item.word}</div>
            <div class="image-container">
                <img src="${imageBase}${item.img}" alt="${item.word}" onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='<div style=\\'font-size:2rem;\\'>${item.emoji}</div><div style=\\'font-size:0.7rem; color:#999;\\'>⚠️ صورة مفقودة</div>';">
            </div>
            <button class="speak-btn" data-word="${item.word}">🔊 Speak</button>
            <input type="text" id="input-${idx}" placeholder="Type '${item.word}'" autocomplete="off">
        `;
        grid.appendChild(card);
        
        // Check image load status
        const img = card.querySelector('img');
        if (img) {
            img.onload = () => {
                imagesLoaded++;
                document.getElementById('imageStatus').innerHTML = `✅ تم تحميل ${imagesLoaded} من ${words.length} صورة.`;
            };
            img.onerror = () => {
                imagesLoaded++;
                document.getElementById('imageStatus').innerHTML = `⚠️ ${imagesLoaded} من ${words.length} - بعض الصور غير موجودة (الملفات المطلوبة: ${words.map(w=>w.img).join(', ')})`;
            };
        }
    });

    // attach speak events after DOM is ready
    setTimeout(() => {
        document.querySelectorAll('.speak-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const word = btn.getAttribute('data-word');
                speakWord(word, btn);
            });
        });
    }, 100);

    document.getElementById('checkAll').addEventListener('click', () => {
        let score = 0;
        const total = words.length;
        for (let i = 0; i < total; i++) {
            const input = document.getElementById(`input-${i}`);
            const userAnswer = input.value.trim().toLowerCase();
            const correct = words[i].word.toLowerCase();
            if (userAnswer === correct) {
                score++;
                input.classList.add('correct');
                input.classList.remove('wrong');
            } else {
                input.classList.add('wrong');
                input.classList.remove('correct');
            }
        }
        const resultDiv = document.getElementById('resultArea');
        if (score === total) {
            resultDiv.innerHTML = `🎉 Perfect! ${score}/${total} — Excellent! 🏆`;
        } else {
            resultDiv.innerHTML = `📊 Your score: ${score}/${total}. Try again!`;
        }
    });
</script>
</body>
</html>
