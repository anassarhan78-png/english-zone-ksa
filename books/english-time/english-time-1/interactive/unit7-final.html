<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unit 7 Dictation</title>
    <style>
        *{box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#eef2ff;margin:0;padding:20px}
        .container{max-width:1000px;margin:auto;background:white;border-radius:40px;padding:20px}
        h1{text-align:center;color:#d45a1e}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin:20px 0}
        .card{background:#fffaf0;border-radius:24px;padding:15px;text-align:center;border:1px solid #f0e0c0}
        .emoji{font-size:2.5rem}
        .word{font-size:1.2rem;font-weight:bold;margin:8px 0}
        .image-area{min-height:100px;margin:8px 0;display:flex;justify-content:center;align-items:center}
        .image-area img{max-width:80px;max-height:80px;border-radius:16px}
        button{background:#3b82f6;border:none;color:white;padding:6px 12px;border-radius:30px;cursor:pointer;margin:5px}
        input{width:90%;padding:8px;margin:8px 0;border-radius:30px;border:1px solid #ccc;text-align:center}
        .correct{background:#d1fae5;border-color:#10b981}
        .wrong{background:#fee2e2;border-color:#ef4444}
        .check-btn{background:#10b981;font-size:1rem;padding:10px 20px;display:block;margin:20px auto}
        .result{background:#e0e7ff;padding:12px;border-radius:28px;text-align:center;margin-top:20px}
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Unit 7 Dictation</h1>
    <div class="grid" id="grid"></div>
    <button id="checkAll" class="check-btn">✅ Check All Answers</button>
    <div id="result" class="result">✨ Press the button ✨</div>
</div>
<script>
    const base = "https://raw.githubusercontent.com/anassarhan78-png/english-zone-ksa/main/books/english-time/english-time-1/images/";
    const words = ["burgers","salad","rice","fish","spaghetti","pizza"];
    const emojiMap = {
        "Annie":"👧","Ted":"👦","Digger":"🐶","boy":"👦","girl":"👧","dog":"🐕",
        "tree":"🌳","butterfly":"🦋","cloud":"☁️","flower":"🌻","bird":"🐦","lake":"🌊",
        "cow":"🐄","horse":"🐴","chicken":"🐔","goat":"🐐","sheep":"🐑","duck":"🦆",
        "ruler":"📏","book":"📚","pencil":"✏️","pencil case":"📦","pen":"🖊️","eraser":"🧼",
        "one":"1️⃣","two":"2️⃣","three":"3️⃣","four":"4️⃣","five":"5️⃣","six":"6️⃣","seven":"7️⃣","eight":"8️⃣","nine":"9️⃣","ten":"🔟","eleven":"1️⃣1️⃣","twelve":"1️⃣2️⃣",
        "happy":"😊","sad":"😢","cold":"❄️","hot":"🔥","thirsty":"💧","hungry":"🍔",
        "burgers":"🍔","salad":"🥗","rice":"🍚","fish":"🐟","spaghetti":"🍝","pizza":"🍕",
        "apples":"🍎","oranges":"🍊","bananas":"🍌","cucumbers":"🥒","potatoes":"🥔","carrots":"🥕",
        "tall":"📏","short":"📐","fat":"🐷","thin":"🧵","young":"🐣","old":"🐢",
        "doctor":"👨‍⚕️","nurse":"👩‍⚕️","police officer":"👮","teacher":"👩‍🏫","mail carrier":"📮","firefighter":"🚒"
    };
    const grid = document.getElementById('grid');
    function speak(word, btn) {
        if (!window.speechSynthesis) return;
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.8;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }
    words.forEach((w, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        const imgFile = w.toLowerCase().replace(/ /g, '-') + '.jpg';
        const imgUrl = base + imgFile;
        const emoji = emojiMap[w] || '📝';
        card.innerHTML = `
            <div class="emoji">${emoji}</div>
            <div class="word">${w}</div>
            <div class="image-area">
                <img src="${imgUrl}" onerror="this.onerror=null; this.parentElement.innerHTML='<div style=\\'font-size:2rem;\'>${emoji}</div><div style=\\'font-size:0.7rem;\'>⚠️ missing</div>'">
            </div>
            <button class="speakBtn" data-word="${w}">🔊 Speak</button>
            <input type="text" id="input-${idx}" placeholder="Type '${w}'">
        `;
        grid.appendChild(card);
    });
    document.querySelectorAll('.speakBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            speak(btn.getAttribute('data-word'), btn);
        });
    });
    document.getElementById('checkAll').onclick = () => {
        let score = 0;
        words.forEach((w, i) => {
            const inp = document.getElementById('input-'+i);
            if (inp.value.trim().toLowerCase() === w.toLowerCase()) {
                score++;
                inp.classList.add('correct');
                inp.classList.remove('wrong');
            } else {
                inp.classList.add('wrong');
                inp.classList.remove('correct');
            }
        });
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = score === words.length ? `🎉 Perfect! ${score}/${words.length} 🏆` : `📊 Score: ${score}/${words.length}. Try again!`;
    };
</script>
</body>
</html>
