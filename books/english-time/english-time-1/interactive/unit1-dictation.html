<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Dictation - Unit 1: In the Neighborhood</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 32px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1e3a8a; text-align: center; }
        .word-card { background: #fef9c3; border-radius: 20px; padding: 15px; margin: 20px 0; border-right: 5px solid #f59e0b; }
        canvas { background: white; border: 2px solid #cbd5e1; border-radius: 12px; display: block; margin: 10px 0; cursor: crosshair; width: 100%; max-width: 280px; height: auto; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 40px; border: 1px solid #cbd5e1; font-size: 1rem; }
        button { background: #10b981; color: white; border: none; padding: 10px 24px; border-radius: 40px; font-size: 1rem; cursor: pointer; margin-top: 15px; }
        button:hover { background: #059669; }
        .correct { background: #d1fae5; border-color: #10b981; }
        .wrong { background: #fee2e2; border-color: #ef4444; }
        .result { background: #e0e7ff; padding: 15px; border-radius: 28px; margin-top: 20px; text-align: center; font-weight: bold; }
        @media (max-width: 600px) { .container { padding: 15px; } }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Unit 1: In the Neighborhood</h1>
    <p>🎨 Draw a simple picture for each word, then type the word correctly.</p>
    <div id="tasks"></div>
    <button id="checkBtn">✅ Check My Answers</button>
    <div id="result" class="result"></div>
</div>
<script>
    const words = ["house", "street", "park", "school", "store"];
    const container = document.getElementById('tasks');
    words.forEach((word, idx) => {
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerHTML = `
            <p><strong>✏️ Draw:</strong> ${word}</p>
            <canvas id="canvas-${idx}" width="280" height="140" style="width:100%; max-width:280px; height:auto; border:1px solid #aaa;"></canvas>
            <p><strong>📝 Write the word:</strong></p>
            <input type="text" id="input-${idx}" placeholder="Type '${word}' here">
        `;
        container.appendChild(card);
    });
    // Initialize drawing for each canvas
    for (let i = 0; i < words.length; i++) {
        const canvas = document.getElementById(`canvas-${i}`);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        let drawing = false;
        const startDraw = () => drawing = true;
        const endDraw = () => drawing = false;
        const draw = (e) => {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            ctx.fillStyle = '#000';
            ctx.fillRect(x, y, 3, 3);
        };
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseleave', endDraw);
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchend', endDraw);
        canvas.addEventListener('touchmove', draw);
    }
    document.getElementById('checkBtn').addEventListener('click', () => {
        let score = 0;
        for (let i = 0; i < words.length; i++) {
            const inputField = document.getElementById(`input-${i}`);
            const userAnswer = inputField.value.trim().toLowerCase();
            if (userAnswer === words[i]) {
                score++;
                inputField.classList.add('correct');
                inputField.classList.remove('wrong');
            } else {
                inputField.classList.add('wrong');
                inputField.classList.remove('correct');
            }
        }
        const resultDiv = document.getElementById('result');
        if (score === words.length) {
            resultDiv.innerHTML = `🎉 Perfect! ${score}/${words.length} - Excellent work! 🏆`;
        } else {
            resultDiv.innerHTML = `📊 Your score: ${score}/${words.length}. Try again, review the words.`;
        }
    });
</script>
</body>
</html>
