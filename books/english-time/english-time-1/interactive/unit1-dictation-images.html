<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unit 1 Dictation - Annie, Ted & Digger with Pictures</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff7e6;
            margin: 0;
            padding: 20px;
            direction: ltr;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            border-radius: 48px;
            padding: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #d45a1e;
            text-align: center;
        }
        .greetings {
            background: #fce4d6;
            border-radius: 32px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }
        .card {
            background: #fffaf0;
            border-radius: 28px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .card img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin: 10px auto;
            display: block;
            background: #f0f0f0;
            border-radius: 20px;
        }
        .card input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
            border-radius: 40px;
            border: 1px solid #ccc;
            text-align: center;
        }
        button {
            background: #f4a261;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin: 5px;
        }
        .check-btn {
            background: #2a9d8f;
            font-size: 1.1rem;
            padding: 12px 28px;
        }
        .correct { background: #d1fae5; border-color: #10b981; }
        .wrong { background: #fee2e2; border-color: #ef4444; }
        .result {
            background: #e9f5f2;
            padding: 15px;
            border-radius: 28px;
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
        }
        .grammar {
            background: #e2eafc;
            border-radius: 28px;
            padding: 12px;
            margin: 20px 0;
        }
        @media (max-width: 700px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Unit 1: Hello, I'm Annie!</h1>
    <div class="greetings">
        <p>🎤 <strong>Good morning! / Hello! / How are you? → I'm fine, thank you.</strong></p>
    </div>
    <div class="grammar">
        <p>📘 <strong>Grammar: I am / You are</strong><br>
        ✔ I am Annie. &nbsp;&nbsp; ✔ You are Ted. &nbsp;&nbsp; ✔ I am a boy. &nbsp;&nbsp; ✔ You are a girl.</p>
    </div>
    <div class="grid" id="wordsGrid"></div>
    <div style="text-align:center;">
        <button id="checkAll" class="check-btn">✅ Check All Answers</button>
    </div>
    <div id="resultArea" class="result">✨ Press the button to check your spelling ✨</div>
</div>

<script>
    // الكلمات مع أسماء الصور (ضع صورك في مجلد images بنفس الاسم)
    const items = [
        { word: "Annie", img: "annie.jpg", hint: "👧" },
        { word: "Ted", img: "ted.jpg", hint: "👦" },
        { word: "Digger", img: "digger.jpg", hint: "🐶" },
        { word: "boy", img: "boy.jpg", hint: "👦" },
        { word: "girl", img: "girl.jpg", hint: "👧" },
        { word: "dog", img: "dog.jpg", hint: "🐕" }
    ];

    const grid = document.getElementById('wordsGrid');
    items.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        // محاولة تحميل الصورة، إذا لم توجد تظهر الـ emoji كبديل
        const imgSrc = `../images/${item.img}`;
        card.innerHTML = `
            <div style="font-size: 1.2rem; font-weight:bold;">${item.hint} ${item.word}</div>
            <img src="${imgSrc}" alt="${item.word}" onerror="this.onerror=null; this.parentElement.innerHTML='<div style=\'font-size:3rem;\'>${item.hint}</div>'">
            <input type="text" id="input-${idx}" placeholder="Type '${item.word}'" autocomplete="off">
        `;
        grid.appendChild(card);
    });

    document.getElementById('checkAll').addEventListener('click', () => {
        let score = 0;
        const total = items.length;
        for (let i = 0; i < total; i++) {
            const input = document.getElementById(`input-${i}`);
            const userAnswer = input.value.trim().toLowerCase();
            const correct = items[i].word.toLowerCase();
            if (userAnswer === correct) {
                score++;
                input.classList.add('correct');
                input.classList.remove('wrong');
            } else {
                input.classList.add('wrong');
                input.classList.remove('correct');
            }
        }
        const resultDiv = document.getElementById('resultArea');
        if (score === total) {
            resultDiv.innerHTML = `🎉🏆 Perfect! ${score}/${total} — Great job, champion! 🏆🎉`;
        } else {
            resultDiv.innerHTML = `📊 Your score: ${score}/${total}. ${score > total/2 ? '👍 Good! Keep practicing the spelling.' : '📖 Listen and write again. Use the grammar: I am / You are.'}`;
        }
    });
</script>
</body>
</html>
