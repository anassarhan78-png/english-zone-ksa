<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Picture Dictation - Unit 1: Neighborhood</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #e0f2fe 0%, #bae6fd 100%);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 48px;
            padding: 25px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #075985;
            font-size: 2rem;
            margin-top: 0;
        }
        .sub {
            text-align: center;
            color: #0369a1;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin: 20px 0;
        }
        .card {
            background: #fefce8;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 10px 15px -5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            text-align: center;
        }
        .card:hover {
            transform: scale(1.02);
        }
        .image-placeholder {
            background: #f1f5f9;
            border-radius: 28px;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 5rem;
            text-align: center;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .real-image {
            max-width: 100%;
            max-height: 120px;
            object-fit: contain;
        }
        .word-badge {
            background: #fde047;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 40px;
            font-weight: bold;
            margin: 10px 0;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 60px;
            border: 2px solid #cbd5e1;
            font-size: 1rem;
            text-align: center;
            font-weight: bold;
        }
        button {
            background: #0f172a;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            margin: 5px;
        }
        .speak {
            background: #0284c7;
        }
        .speak:hover {
            background: #0369a1;
        }
        .global-check {
            background: #10b981;
            padding: 12px 28px;
            font-size: 1.2rem;
            margin-top: 20px;
            display: inline-block;
        }
        .result {
            background: #e6f7f0;
            padding: 15px;
            border-radius: 40px;
            margin-top: 30px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .correct {
            background: #bbf7d0;
            border-color: #15803d;
        }
        .wrong {
            background: #fecaca;
            border-color: #b91c1c;
        }
        footer {
            text-align: center;
            margin-top: 25px;
            color: #475569;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📸 Unit 1: In the Neighborhood</h1>
    <div class="sub">🔊 Listen to the word, see the picture, then type it correctly!</div>
    <div class="grid" id="cardsGrid"></div>
    <div style="text-align: center;">
        <button id="checkAll" class="global-check">✅ CHECK ALL ANSWERS</button>
    </div>
    <div id="resultMessage" class="result">✨ Click the button to see your score ✨</div>
    <footer>🎧 Press the speaker button to hear the pronunciation | 🖼️ Real pictures help you memorize</footer>
</div>

<script>
    // الكلمات مع صور حقيقية من CDN (صور مجانية عالية الجودة)
    const items = [
        { word: "house", image: "https://cdn-icons-png.flaticon.com/512/25/25694.png", emoji: "🏠" },
        { word: "street", image: "https://cdn-icons-png.flaticon.com/512/118/118848.png", emoji: "🛣️" },
        { word: "park", image: "https://cdn-icons-png.flaticon.com/512/1404/1404947.png", emoji: "🌳" },
        { word: "school", image: "https://cdn-icons-png.flaticon.com/512/2991/2991103.png", emoji: "🏫" },
        { word: "store", image: "https://cdn-icons-png.flaticon.com/512/1050/1050717.png", emoji: "🏪" }
    ];

    const grid = document.getElementById('cardsGrid');
    const inputRefs = [];

    items.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        
        // صورة حقيقية مع fallback إيموجي
        const imgDiv = document.createElement('div');
        imgDiv.className = 'image-placeholder';
        const img = document.createElement('img');
        img.src = item.image;
        img.alt = item.word;
        img.className = 'real-image';
        img.onerror = function() { this.style.display = 'none'; imgDiv.innerHTML = `<span style="font-size:4rem;">${item.emoji}</span>`; };
        imgDiv.appendChild(img);
        
        const badge = document.createElement('div');
        badge.className = 'word-badge';
        badge.innerText = `📖 ${item.word.toUpperCase()}`;
        
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = `Type: ${item.word}`;
        input.id = `input-${idx}`;
        input.autocomplete = 'off';
        
        const speakBtn = document.createElement('button');
        speakBtn.innerHTML = '🔊 Listen';
        speakBtn.className = 'speak';
        speakBtn.onclick = () => {
            const utterance = new SpeechSynthesisUtterance(item.word);
            utterance.lang = 'en-US';
            utterance.rate = 0.7;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        };
        
        card.appendChild(imgDiv);
        card.appendChild(badge);
        card.appendChild(input);
        card.appendChild(speakBtn);
        grid.appendChild(card);
        
        inputRefs.push({ input, word: item.word, idx });
    });

    // زر التصحيح الشامل
    document.getElementById('checkAll').addEventListener('click', () => {
        let score = 0;
        const total = inputRefs.length;
        inputRefs.forEach((ref) => {
            const userVal = ref.input.value.trim().toLowerCase();
            if (userVal === ref.word) {
                score++;
                ref.input.classList.add('correct');
                ref.input.classList.remove('wrong');
            } else {
                ref.input.classList.add('wrong');
                ref.input.classList.remove('correct');
            }
        });
        const resultDiv = document.getElementById('resultMessage');
        if (score === total) {
            resultDiv.innerHTML = `🎉🏆 PERFECT! ${score}/${total} — You are a Neighborhood Champion! 🏆🎉<br>⭐ Amazing spelling! ⭐`;
        } else {
            resultDiv.innerHTML = `📊 Your score: ${score}/${total}. ${score >= total/2 ? '👍 Good! Listen and try again.' : '🔁 Review the pictures and use the speaker button.'}`;
        }
    });
</script>
</body>
</html>
