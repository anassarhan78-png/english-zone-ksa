<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unit 7 - Dictation Games</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Arial,sans-serif;background:#eef2ff;padding:20px}
        .container{max-width:1200px;margin:auto;background:white;border-radius:48px;padding:25px}
        h1{color:#d45a1e;text-align:center}
        .game-selector{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:20px 0}
        .game-btn{background:#e2e8f0;border:none;padding:10px 20px;border-radius:40px;cursor:pointer;font-weight:bold}
        .game-btn.active{background:#f59e0b;color:white}
        .game-panel{display:none;margin-top:20px}
        .game-panel.active{display:block}
        .word-card{background:#fffaf0;border-radius:24px;padding:15px;margin:15px 0;text-align:center}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}
        button{background:#3b82f6;color:white;border:none;padding:8px 16px;border-radius:30px;cursor:pointer}
        input,select{padding:8px;border-radius:30px;border:1px solid #ccc;margin:5px}
        .correct{background:#d1fae5}
        .wrong{background:#fee2e2}
        .hangman-word{font-size:2rem;letter-spacing:10px;font-family:monospace}
        .message{font-weight:bold;margin:10px 0}
    </style>
</head>
<body>
<div class="container">
    <h1>🎮 Unit 7: Dictation Games</h1>
    <div class="game-selector">
        <button class="game-btn" data-game="hangman">🪢 Hangman</button>
        <button class="game-btn" data-game="missing">🔤 Missing Letter</button>
        <button class="game-btn" data-game="match">🃏 Match</button>
        <button class="game-btn" data-game="gap">📝 Fill the Gap</button>
        <button class="game-btn" data-game="classic">🎧 Classic Dictation</button>
    </div>

    <div id="hangman" class="game-panel">
        <h2>🪢 Hangman</h2>
        <div class="hangman-word" id="hangmanWord">_ _ _ _ _</div>
        <div id="hangmanMessage" class="message"></div>
        <input type="text" id="hangmanLetter" maxlength="1" placeholder="Guess a letter">
        <button id="hangmanGuess">Guess</button>
        <button id="hangmanReset">New Word</button>
        <p>Wrong guesses: <span id="wrongLetters"></span></p>
    </div>

    <div id="missing" class="game-panel">
        <h2>🔤 Fill in the Missing Letter</h2>
        <div id="missingGrid" class="grid"></div>
        <button id="checkMissing">Check Answers</button>
        <div id="missingResult"></div>
    </div>

    <div id="match" class="game-panel">
        <h2>🃏 Match the Word with the Picture</h2>
        <div id="matchGrid"></div>
        <button id="checkMatch">Check Matches</button>
        <div id="matchResult"></div>
    </div>

    <div id="gap" class="game-panel">
        <h2>📝 Fill the Gap</h2>
        <div id="gapGrid"></div>
        <button id="checkGap">Check Answers</button>
        <div id="gapResult"></div>
    </div>

    <div id="classic" class="game-panel">
        <h2>🎧 Classic Dictation (Listen & Write)</h2>
        <div id="classicGrid" class="grid"></div>
        <button id="checkClassic">Check All</button>
        <div id="classicResult"></div>
    </div>
</div>

<script>
    const words = "burgers","salad","rice","fish","spaghetti","pizza";
    const sentences = SENTENCELIST;
    const gapAnswers = "pizza","Salad","Spaghetti","Rice","burgers";
    const base = "https://raw.githubusercontent.com/anassarhan78-png/english-zone-ksa/main/books/english-time/english-time-1/images/";
    const images = {};
    words.forEach(w => { images[w] = w.toLowerCase().replace(/ /g, '-') + '.jpg'; });

    // Hangman (same as before, but with safe strings)
    let currentWord = "", guessedLetters = [], wrongGuesses = [];
    function initHangman() {
        currentWord = words[Math.floor(Math.random() * words.length)].toLowerCase();
        guessedLetters = []; wrongGuesses = [];
        updateHangmanDisplay();
    }
    function updateHangmanDisplay() {
        let display = currentWord.split('').map(l => guessedLetters.includes(l) ? l : '_').join(' ');
        document.getElementById('hangmanWord').innerText = display;
        document.getElementById('wrongLetters').innerText = wrongGuesses.join(', ');
        if (display.replace(/ /g, '') === currentWord) {
            document.getElementById('hangmanMessage').innerHTML = "🎉 You won! Great job!";
        } else if (wrongGuesses.length >= 6) {
            document.getElementById('hangmanMessage').innerHTML = "Game over! The word was " + currentWord + ".";
        }
    }
    document.getElementById('hangmanGuess')?.addEventListener('click', () => {
        let letter = document.getElementById('hangmanLetter').value.toLowerCase();
        if (!letter) return;
        if (guessedLetters.includes(letter) || wrongGuesses.includes(letter)) return;
        if (currentWord.includes(letter)) guessedLetters.push(letter);
        else wrongGuesses.push(letter);
        updateHangmanDisplay();
        document.getElementById('hangmanLetter').value = '';
    });
    document.getElementById('hangmanReset')?.addEventListener('click', initHangman);
    initHangman();

    // Missing Letter
    function getMissingWord(word) {
        let idx = Math.floor(Math.random() * word.length);
        return { display: word.substring(0, idx) + '_' + word.substring(idx+1), correct: word[idx] };
    }
    let missingItems = [];
    function loadMissing() {
        const container = document.getElementById('missingGrid');
        container.innerHTML = '';
        missingItems = [];
        words.forEach((w, idx) => {
            let miss = getMissingWord(w);
            missingItems.push(miss);
            let div = document.createElement('div');
            div.className = 'word-card';
            div.innerHTML = `<p>${miss.display}</p><input type="text" id="miss-${idx}" placeholder="?" maxlength="1">`;
            container.appendChild(div);
        });
    }
    document.getElementById('checkMissing')?.addEventListener('click', () => {
        let score = 0;
        missingItems.forEach((item, idx) => {
            let inp = document.getElementById(`miss-${idx}`);
            if (inp && inp.value.toLowerCase() === item.correct) { score++; inp.classList.add('correct'); }
            else if (inp) inp.classList.add('wrong');
        });
        document.getElementById('missingResult').innerHTML = `Score: ${score}/${missingItems.length}`;
    });
    loadMissing();

    // Match
    let matchWords = [...words];
    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
    function loadMatch() {
        const container = document.getElementById('matchGrid');
        let shuffledWords = shuffle([...matchWords]);
        let shuffledImages = shuffle([...matchWords]);
        container.innerHTML = '<div class="grid">';
        shuffledWords.forEach((w, idx) => {
            container.innerHTML += `<div class="word-card"><strong>${w}</strong><select id="match-${idx}"><option value="">Select</option>${shuffledImages.map(img => `<option value="${img}">${img}</option>`).join('')}</select></div>`;
        });
        container.innerHTML += '</div>';
    }
    document.getElementById('checkMatch')?.addEventListener('click', () => {
        let score = 0;
        for (let i=0; i<matchWords.length; i++) {
            let sel = document.getElementById(`match-${i}`);
            if (sel && sel.value === matchWords[i]) score++;
        }
        document.getElementById('matchResult').innerHTML = `Matched correctly: ${score}/${matchWords.length}`;
    });
    loadMatch();

    // Fill Gap
    function loadGap() {
        const container = document.getElementById('gapGrid');
        container.innerHTML = '';
        sentences.forEach((s, idx) => {
            let div = document.createElement('div');
            div.className = 'word-card';
            div.innerHTML = `<p>${s}</p><input type="text" id="gap-${idx}" placeholder="Your answer">`;
            container.appendChild(div);
        });
    }
    document.getElementById('checkGap')?.addEventListener('click', () => {
        let score = 0;
        for (let i=0; i<gapAnswers.length; i++) {
            let inp = document.getElementById(`gap-${i}`);
            if (inp && inp.value.trim().toLowerCase() === gapAnswers[i].toLowerCase()) { score++; inp.classList.add('correct'); }
            else if (inp) inp.classList.add('wrong');
        }
        document.getElementById('gapResult').innerHTML = `Score: ${score}/${gapAnswers.length}`;
    });
    loadGap();

    // Classic Dictation
    function speakWord(word) {
        let utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US';
        utterance.rate = 0.8;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }
    function loadClassic() {
        const container = document.getElementById('classicGrid');
        container.innerHTML = '';
        words.forEach((w, idx) => {
            let div = document.createElement('div');
            div.className = 'word-card';
            let imgSrc = base + images[w];
            div.innerHTML = `<img src="${imgSrc}" style="max-width:80px;border-radius:16px" onerror="this.style.display='none'"><button class="speak-btn" data-word="${w}">🔊 Speak</button><input type="text" id="classic-${idx}" placeholder="Type the word">`;
            container.appendChild(div);
        });
        document.querySelectorAll('.speak-btn').forEach(btn => {
            btn.addEventListener('click', () => speakWord(btn.getAttribute('data-word')));
        });
    }
    document.getElementById('checkClassic')?.addEventListener('click', () => {
        let score = 0;
        words.forEach((w, idx) => {
            let inp = document.getElementById(`classic-${idx}`);
            if (inp && inp.value.trim().toLowerCase() === w.toLowerCase()) { score++; inp.classList.add('correct'); }
            else if (inp) inp.classList.add('wrong');
        });
        document.getElementById('classicResult').innerHTML = `Score: ${score}/${words.length}`;
    });
    loadClassic();

    // Game switcher
    const panels = ['hangman','missing','match','gap','classic'];
    document.querySelectorAll('.game-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            panels.forEach(p => document.getElementById(p).classList.remove('active'));
            document.getElementById(btn.dataset.game).classList.add('active');
            document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });
    document.querySelector('.game-btn').click();
</script>
</body>
</html>
