<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🌈 Unit 1 - Creative Dictation Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Neue', 'Comic Neue', 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(145deg, #f9eec1 0%, #f4d58c 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        /* الحاوية الرئيسية */
        .magic-container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 70px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,255,0.8);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* الهيدر المرح */
        .fun-header {
            background: linear-gradient(135deg, #ff9a3c, #d45a1e);
            padding: 30px 20px;
            text-align: center;
            color: white;
            text-shadow: 3px 3px 0 #b34100;
        }
        .fun-header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .fun-header p {
            font-size: 1.2rem;
            background: #ffe6b3;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
            color: #a23d00;
            margin-top: 10px;
        }

        /* أزرار اختيار اللعبة */
        .game-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding: 25px 20px 10px;
            background: #fff2df;
        }
        .game-tab {
            background: #f5e2c1;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            color: #6b3a00;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .game-tab.active {
            background: #f59e0b;
            color: white;
            transform: scale(1.02);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .game-tab:hover {
            background: #ffb347;
            color: white;
        }

        /* منطقة اللعبة */
        .game-panel {
            display: none;
            padding: 30px;
            animation: fadeIn 0.3s ease;
        }
        .game-panel.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* بطاقات الألعاب */
        .game-card {
            background: #fffaf2;
            border-radius: 48px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 2px solid #ffe1a0;
        }
        .game-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #c2410c;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }
        .word-card {
            background: white;
            border-radius: 32px;
            padding: 20px 12px;
            text-align: center;
            transition: all 0.2s;
            border: 2px solid #ffe0a3;
        }
        .word-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }
        .word-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin: 0 auto 12px;
            display: block;
            background: #fef7e0;
            border-radius: 30px;
            padding: 8px;
        }
        button {
            background: #ffa500;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s;
            color: white;
            margin: 5px;
        }
        button:active {
            transform: scale(0.96);
        }
        input, select {
            padding: 10px 16px;
            border-radius: 60px;
            border: 2px solid #ffe0a3;
            font-size: 1rem;
            text-align: center;
        }
        .correct {
            background: #d1fae5;
            border-color: #10b981;
        }
        .wrong {
            background: #fee2e2;
            border-color: #ef4444;
        }
        .hangman-word {
            font-size: 2.5rem;
            letter-spacing: 15px;
            font-family: monospace;
            font-weight: bold;
            background: #fef3c7;
            padding: 15px;
            border-radius: 50px;
            display: inline-block;
        }
        .message {
            font-weight: bold;
            color: #b45309;
        }
        .action-btn {
            background: #10b981;
            font-size: 1.1rem;
            padding: 12px 28px;
            margin-top: 15px;
        }
        .result-box {
            background: #fff0d6;
            padding: 15px;
            border-radius: 40px;
            margin-top: 20px;
            font-weight: bold;
        }
        footer {
            background: #ffefd6;
            text-align: center;
            padding: 15px;
            font-size: 0.8rem;
            color: #8b5a2b;
        }
    </style>
</head>
<body>
<div class="magic-container">
    <div class="fun-header">
        <h1>🎮 Unit 1: In the Neighborhood 🏘️</h1>
        <p>✨ Play, listen, spell, and have fun! ✨</p>
    </div>
    <div class="game-tabs">
        <button class="game-tab active" data-game="hangman">🪢 Hangman</button>
        <button class="game-tab" data-game="missing">🔤 Missing Letter</button>
        <button class="game-tab" data-game="match">🃏 Match</button>
        <button class="game-tab" data-game="gap">📝 Fill Gap</button>
        <button class="game-tab" data-game="classic">🎧 Listen & Write</button>
    </div>

    <!-- HANGMAN -->
    <div id="hangman" class="game-panel active">
        <div class="game-card">
            <div class="game-title">🪢 Hangman Challenge</div>
            <div class="hangman-word" id="hangmanWord">_ _ _ _ _</div>
            <div id="hangmanMessage" class="message"></div>
            <input type="text" id="hangmanLetter" maxlength="1" placeholder="🔤 Guess a letter" style="width:80px; text-align:center">
            <button id="hangmanGuess">Guess</button>
            <button id="hangmanReset">🔄 New Word</button>
            <p>❌ Wrong guesses: <span id="wrongLetters" style="font-weight:bold; color:#dc2626"></span></p>
        </div>
    </div>

    <!-- MISSING LETTER -->
    <div id="missing" class="game-panel">
        <div class="game-card">
            <div class="game-title">🔤 Fill the Missing Letter</div>
            <div class="grid-3" id="missingGrid"></div>
            <button id="checkMissing" class="action-btn">✅ Check My Answers</button>
            <div id="missingResult" class="result-box"></div>
        </div>
    </div>

    <!-- MATCH -->
    <div id="match" class="game-panel">
        <div class="game-card">
            <div class="game-title">🃏 Match Word with Picture</div>
            <div id="matchGrid"></div>
            <button id="checkMatch" class="action-btn">✅ Check My Matches</button>
            <div id="matchResult" class="result-box"></div>
        </div>
    </div>

    <!-- FILL THE GAP -->
    <div id="gap" class="game-panel">
        <div class="game-card">
            <div class="game-title">📝 Complete the Sentence</div>
            <div id="gapGrid"></div>
            <button id="checkGap" class="action-btn">✅ Check My Answers</button>
            <div id="gapResult" class="result-box"></div>
        </div>
    </div>

    <!-- CLASSIC DICTATION -->
    <div id="classic" class="game-panel">
        <div class="game-card">
            <div class="game-title">🎧 Listen & Write (Classic Dictation)</div>
            <div class="grid-3" id="classicGrid"></div>
            <button id="checkClassic" class="action-btn">✅ Check All</button>
            <div id="classicResult" class="result-box"></div>
        </div>
    </div>
    <footer>🎈 Use the pictures to help you! Click "Speak" to hear the word.</footer>
</div>

<script>
    const words = ["Annie", "Ted", "Digger", "boy", "girl", "dog"];
    const base = "https://raw.githubusercontent.com/anassarhan78-png/english-zone-ksa/main/books/english-time/english-time-1/images/";
    const images = {
        "Annie": "annie.jpg", "Ted": "ted.jpg", "Digger": "digger.jpg",
        "boy": "boy.jpg", "girl": "girl.jpg", "dog": "dog.jpg"
    };

    // ---------- HANGMAN ----------
    let currentWord = "", guessedLetters = [], wrongGuesses = [];
    function initHangman() {
        currentWord = words[Math.floor(Math.random() * words.length)].toLowerCase();
        guessedLetters = []; wrongGuesses = [];
        updateHangmanDisplay();
    }
    function updateHangmanDisplay() {
        let display = currentWord.split('').map(l => guessedLetters.includes(l) ? l : '_').join(' ');
        document.getElementById('hangmanWord').innerText = display;
        document.getElementById('wrongLetters').innerText = wrongGuesses.join(', ');
        if (display.replace(/ /g, '') === currentWord)
            document.getElementById('hangmanMessage').innerHTML = "🎉🎉🎉 You won! Amazing! 🎉🎉🎉";
        else if (wrongGuesses.length >= 6)
            document.getElementById('hangmanMessage').innerHTML = `💀 Oh no! The word was "${currentWord}". Try again!`;
        else
            document.getElementById('hangmanMessage').innerHTML = "";
    }
    document.getElementById('hangmanGuess').onclick = () => {
        let letter = document.getElementById('hangmanLetter').value.toLowerCase();
        if (!letter) return;
        if (guessedLetters.includes(letter) || wrongGuesses.includes(letter)) return;
        if (currentWord.includes(letter)) guessedLetters.push(letter);
        else wrongGuesses.push(letter);
        updateHangmanDisplay();
        document.getElementById('hangmanLetter').value = '';
    };
    document.getElementById('hangmanReset').onclick = initHangman;
    initHangman();

    // ---------- MISSING LETTER ----------
    function getMissingWord(word) {
        let idx = Math.floor(Math.random() * word.length);
        return { display: word.substring(0, idx) + '_' + word.substring(idx+1), correct: word[idx], full: word };
    }
    let missingItems = [];
    function loadMissing() {
        const container = document.getElementById('missingGrid');
        container.innerHTML = '';
        missingItems = [];
        words.forEach((w, idx) => {
            let miss = getMissingWord(w);
            missingItems.push(miss);
            let div = document.createElement('div');
            div.className = 'word-card';
            div.innerHTML = `<img src="${base}${images[w]}" class="word-img" onerror="this.style.display='none'"><p>${miss.display}</p><input type="text" id="miss-${idx}" placeholder="?" maxlength="1" style="width:70px">`;
            container.appendChild(div);
        });
    }
    document.getElementById('checkMissing').onclick = () => {
        let score = 0;
        missingItems.forEach((item, idx) => {
            let inp = document.getElementById(`miss-${idx}`);
            if (inp.value.toLowerCase() === item.correct) { score++; inp.classList.add('correct'); }
            else inp.classList.add('wrong');
        });
        document.getElementById('missingResult').innerHTML = `🎯 Score: ${score}/${missingItems.length}`;
    };
    loadMissing();

    // ---------- MATCH ----------
    let matchWords = [...words];
    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
    function loadMatch() {
        const container = document.getElementById('matchGrid');
        let shuffledWords = shuffle([...matchWords]);
        let shuffledImages = shuffle([...matchWords]);
        container.innerHTML = '<div class="grid-3">';
        shuffledWords.forEach((w, idx) => {
            container.innerHTML += `<div class="word-card"><img src="${base}${images[w]}" class="word-img" onerror="this.style.display='none'"><strong>${w}</strong><select id="match-${idx}" style="margin-top:10px"><option value="">👉 Match picture</option>${shuffledImages.map(img => `<option value="${img}">${img}</option>`).join('')}</select></div>`;
        });
        container.innerHTML += '</div>';
    }
    document.getElementById('checkMatch').onclick = () => {
        let score = 0;
        for (let i=0; i<matchWords.length; i++) {
            let sel = document.getElementById(`match-${i}`);
            if (sel && sel.value === matchWords[i]) score++;
        }
        document.getElementById('matchResult').innerHTML = `🎯 Correct matches: ${score}/${matchWords.length}`;
    };
    loadMatch();

    // ---------- FILL THE GAP ----------
    const sentences = [
        "My name is ______. (Annie/Ted)",
        "______ is a dog. (Digger/Annie)",
        "I am a ______. (boy/girl)",
        "You are a ______. (girl/boy)",
        "Good ______, teacher. (morning/night)"
    ];
    const gapAnswers = ["Annie", "Digger", "boy", "girl", "morning"];
    function loadGap() {
        const container = document.getElementById('gapGrid');
        container.innerHTML = '';
        sentences.forEach((s, idx) => {
            let div = document.createElement('div');
            div.className = 'word-card';
            div.innerHTML = `<p>${s}</p><input type="text" id="gap-${idx}" placeholder="Your answer">`;
            container.appendChild(div);
        });
    }
    document.getElementById('checkGap').onclick = () => {
        let score = 0;
        for (let i=0; i<gapAnswers.length; i++) {
            let inp = document.getElementById(`gap-${i}`);
            if (inp.value.trim().toLowerCase() === gapAnswers[i].toLowerCase()) { score++; inp.classList.add('correct'); }
            else inp.classList.add('wrong');
        }
        document.getElementById('gapResult').innerHTML = `🎯 Score: ${score}/${gapAnswers.length}`;
    };
    loadGap();

    // ---------- CLASSIC DICTATION ----------
    function speakWord(word) {
        let utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-US'; utterance.rate = 0.8;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }
    function loadClassic() {
        const container = document.getElementById('classicGrid');
        container.innerHTML = '';
        words.forEach((w, idx) => {
            let div = document.createElement('div');
            div.className = 'word-card';
            div.innerHTML = `<img src="${base}${images[w]}" class="word-img" onerror="this.style.display='none'"><button class="speak-btn" data-word="${w}">🔊 Speak</button><input type="text" id="classic-${idx}" placeholder="Type the word">`;
            container.appendChild(div);
        });
        document.querySelectorAll('.speak-btn').forEach(btn => btn.onclick = () => speakWord(btn.dataset.word));
    }
    document.getElementById('checkClassic').onclick = () => {
        let score = 0;
        words.forEach((w, idx) => {
            let inp = document.getElementById(`classic-${idx}`);
            if (inp.value.trim().toLowerCase() === w.toLowerCase()) { score++; inp.classList.add('correct'); }
            else inp.classList.add('wrong');
        });
        document.getElementById('classicResult').innerHTML = `🎯 Score: ${score}/${words.length}`;
    };
    loadClassic();

    // SWITCH GAMES
    const panels = ['hangman','missing','match','gap','classic'];
    document.querySelectorAll('.game-tab').forEach(btn => {
        btn.onclick = () => {
            panels.forEach(p => document.getElementById(p).classList.remove('active'));
            document.getElementById(btn.dataset.game).classList.add('active');
            document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
    });
</script>
</body>
</html>
