<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unit 1 - Quiz</title>
    <style>
        body{font-family:Arial,sans-serif;background:#eef2ff;padding:20px}
        .container{max-width:700px;margin:auto;background:white;border-radius:48px;padding:25px}
        h1{color:#d45a1e;text-align:center}
        .question{background:#fef9c3;padding:15px;border-radius:24px;margin:15px 0}
        button{background:#10b981;color:white;border:none;padding:10px 20px;border-radius:30px;cursor:pointer}
        .result{background:#e0e7ff;padding:15px;border-radius:24px;margin-top:20px;text-align:center}
    </style>
</head>
<body>
<div class="container">
    <h1>❓ Unit 1 - Quiz</h1>
    <div class="question">1. What is the dog's name? <br><input type="radio" name="q1" value="Annie"> Annie <input type="radio" name="q1" value="Ted"> Ted <input type="radio" name="q1" value="Digger"> Digger</div>
    <div class="question">2. Complete: "Good ______, Teacher." <br><input type="text" id="q2" placeholder="Your answer"></div>
    <div class="question">3. Choose: "I _______ Annie." <br><input type="radio" name="q3" value="am"> am <input type="radio" name="q3" value="is"> is <input type="radio" name="q3" value="are"> are</div>
    <button onclick="checkQuiz()">Submit</button>
    <div id="result" class="result"></div>
</div>
<script>
    function checkQuiz() {
        let score = 0;
        let q1 = document.querySelector('input[name="q1"]:checked');
        if(q1 && q1.value === "Digger") score++;
        let q2 = document.getElementById('q2').value.trim().toLowerCase();
        if(q2 === "morning") score++;
        let q3 = document.querySelector('input[name="q3"]:checked');
        if(q3 && q3.value === "am") score++;
        document.getElementById('result').innerHTML = `You got ${score}/3 correct. ${score===3 ? "Perfect! 🎉" : "Try again."}`;
    }
</script>
</body>
</html>
