<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🐄 Farm Mystery Quiz - Unit 3</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #fef9e4; margin: 0; padding: 20px; direction: ltr; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 48px; padding: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        h1 { color: #b45309; text-align: center; }
        .question-block { background: #fffbeb; border-radius: 28px; padding: 20px; margin: 20px 0; border-right: 8px solid #f59e0b; }
        .options { display: flex; gap: 20px; margin: 10px 0; }
        .options label { margin-left: 15px; }
        input[type="text"] { width: 80%; padding: 8px 15px; border-radius: 40px; border: 1px solid #fcd34d; font-size: 1rem; }
        button { background: #d97706; color: white; border: none; padding: 12px 28px; border-radius: 40px; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }
        button:hover { background: #b45309; }
        .result { background: #fef3c7; padding: 15px; border-radius: 28px; margin-top: 20px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        .correct-answer { background: #d1fae5; border-color: #10b981; }
        .wrong-answer { background: #fee2e2; border-color: #ef4444; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>🐄 Unit 3: The Farm Mystery Quiz 🕵️</h1>
    <div id="quiz"></div>
    <button id="checkBtn">✅ Check My Answers</button>
    <div id="result" class="result"></div>
</div>
<script>
    // الأسئلة والبيانات
    const questions = [
        {
            type: "choice",
            text: "1. ( ______ ) is a chicken in my hand. 📍",
            options: ["This", "That"],
            correct: "This"
        },
        {
            type: "choice",
            text: "2. ( ______ ) is a horse far away. ☁️",
            options: ["This", "That"],
            correct: "That"
        },
        {
            type: "fill",
            text: "3. What is this? (It is a ______) 🐄",
            correct: "cow"
        },
        {
            type: "fill",
            text: "4. What is that? (It is a ______) 🐈",
            correct: "cat"
        },
        {
            type: "fill",
            text: "5. It is ______ goat. (a / an)",
            correct: "a"
        },
        {
            type: "fill",
            text: "6. That ______ a horse. (is / am)",
            correct: "is"
        },
        {
            type: "fill",
            text: "7. I like the ______. (cat / pencil)",
            correct: "cat"
        }
    ];

    const container = document.getElementById('quiz');
    questions.forEach((q, idx) => {
        const div = document.createElement('div');
        div.className = 'question-block';
        if (q.type === 'choice') {
            div.innerHTML = `<p><strong>${q.text}</strong></p><div class="options">`;
            q.options.forEach(opt => {
                div.innerHTML += `<label><input type="radio" name="q${idx}" value="${opt}"> ${opt}</label>`;
            });
            div.innerHTML += `</div>`;
        } else if (q.type === 'fill') {
            div.innerHTML = `<p><strong>${q.text}</strong></p>
                             <input type="text" id="fill${idx}" placeholder="Type your answer">`;
        }
        container.appendChild(div);
    });

    document.getElementById('checkBtn').addEventListener('click', () => {
        let score = 0;
        let total = questions.length;

        // تصحيح الأسئلة
        // السؤال 1 (choice)
        const q1 = document.querySelector('input[name="q0"]:checked');
        if (q1 && q1.value === questions[0].correct) score++;
        // السؤال 2 (choice)
        const q2 = document.querySelector('input[name="q1"]:checked');
        if (q2 && q2.value === questions[1].correct) score++;
        // الأسئلة fill (3-7)
        for (let i = 2; i <= 6; i++) {
            const input = document.getElementById(`fill${i}`);
            if (input) {
                const userAnswer = input.value.trim().toLowerCase();
                // إزالة علامات الترقيم أو المسافات الزائدة
                const cleanAnswer = userAnswer.replace(/[^a-z]/g, '');
                const correctAnswer = questions[i].correct.toLowerCase();
                if (cleanAnswer === correctAnswer) {
                    score++;
                    input.classList.add('correct-answer');
                    input.classList.remove('wrong-answer');
                } else {
                    input.classList.add('wrong-answer');
                    input.classList.remove('correct-answer');
                }
            }
        }

        // تمييز الأخطاء في أسئلة الاختيار
        const choices = document.querySelectorAll('input[type="radio"]');
        choices.forEach(radio => {
            radio.parentElement.style.backgroundColor = 'transparent';
        });
        if (!q1 || q1.value !== questions[0].correct) {
            const wrongRadios = document.querySelectorAll('input[name="q0"]');
            wrongRadios.forEach(r => r.parentElement.style.backgroundColor = '#fee2e2');
        }
        if (!q2 || q2.value !== questions[1].correct) {
            const wrongRadios = document.querySelectorAll('input[name="q1"]');
            wrongRadios.forEach(r => r.parentElement.style.backgroundColor = '#fee2e2');
        }

        const resultDiv = document.getElementById('result');
        if (score === total) {
            resultDiv.innerHTML = `🎉 Perfect! You got ${score}/${total} correct. You are a Farm Detective! 🏆🐓`;
        } else {
            resultDiv.innerHTML = `📊 Your score: ${score}/${total}. Try again, review the grammar (this/that, a/an, verb to be).`;
        }
    });
</script>
</body>
</html>
