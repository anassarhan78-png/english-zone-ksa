<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Unit 5: At School</title>
    <style>
        body{font-family:Arial;background:#eef2ff;padding:20px}
        .container{max-width:700px;margin:auto;background:white;border-radius:40px;padding:25px}
        h1{color:#d45a1e}
        .question{background:#fef9c3;padding:15px;border-radius:24px;margin:15px 0}
        button{background:#10b981;color:white;border:none;padding:10px 20px;border-radius:30px;cursor:pointer}
        .result{background:#e0e7ff;padding:15px;border-radius:24px;margin-top:20px}
    </style>
</head>
<body>
<div class="container">
    <h1>❓ Quiz - Unit 5: At School</h1>
    <div class="question">1. What number comes after two? <br> <input type='radio' name='q1' value='one'> one 
<input type='radio' name='q1' value='three'> three 
<input type='radio' name='q1' value='four'> four </div>
    <div class="question">2. Complete: "What is your _______ name? (first / last)" <br><input type="text" id="q2" placeholder="Your answer"></div>
    <div class="question">3. Choose: "How many fingers on one hand?" <br> <input type='radio' name='q3' value='five'> five 
<input type='radio' name='q3' value='ten'> ten 
<input type='radio' name='q3' value='seven'> seven </div>
    <button onclick="checkQuiz()">Submit</button>
    <div id="result" class="result"></div>
</div>
<script>
    function checkQuiz() {
        let score = 0;
        let q1 = document.querySelector('input[name="q1"]:checked');
        if(q1 && q1.value === "three") score++;
        let q2 = document.getElementById('q2').value.trim().toLowerCase();
        if(q2 === "first") score++;
        let q3 = document.querySelector('input[name="q3"]:checked');
        if(q3 && q3.value === "five") score++;
        document.getElementById('result').innerHTML = `You got ${score}/3 correct. ${score===3 ? "Perfect!" : "Try again."}`;
    }
</script>
</body>
</html>
