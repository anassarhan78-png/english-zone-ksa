<!DOCTYPE html>
<html>
<head><title>Quiz Unit 4</title>
<style>
body{font-family:Arial;background:#eef2ff;padding:20px}
.container{max-width:600px;margin:auto;background:white;border-radius:40px;padding:25px}
h1{color:#d45a1e}
.question{background:#fef9c3;padding:15px;border-radius:24px;margin:15px 0}
button{background:#10b981;color:white;border:none;padding:10px 20px;border-radius:30px;cursor:pointer}
.result{background:#e0e7ff;padding:15px;border-radius:24px;margin-top:20px}
</style>
</head>
<body>
<div class="container">
<h1>❓ Quiz - Unit 4</h1>
<div class="question">1. What is the correct greeting in the morning?<br><input type="radio" name="q1" value="Good night"> Good night <input type="radio" name="q1" value="Good morning"> Good morning <input type="radio" name="q1" value="Good bye"> Good bye</div>
<div class="question">2. Complete: "I _______ a student."<br><input type="text" id="q2" placeholder="Your answer"></div>
<div class="question">3. Choose: "You _______ my friend."<br><input type="radio" name="q3" value="am"> am <input type="radio" name="q3" value="is"> is <input type="radio" name="q3" value="are"> are</div>
<button onclick="checkQuiz()">Submit</button>
<div id="result" class="result"></div>
</div>
<script>
function checkQuiz(){
 let score=0;
 let q1=document.querySelector('input[name="q1"]:checked');
 if(q1 && q1.value==='Good morning') score++;
 let q2=document.getElementById('q2').value.trim().toLowerCase();
 if(q2==='am') score++;
 let q3=document.querySelector('input[name="q3"]:checked');
 if(q3 && q3.value==='are') score++;
 document.getElementById('result').innerHTML='You got '+score+'/3 correct. '+(score===3?'Perfect!':'Try again.');
}
</script>
</body>
</html>
