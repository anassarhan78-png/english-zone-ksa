<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>❓ اختبار تفاعلي - الوحدة '</unit>'</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e0f2fe; margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 48px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #0284c7; }
        .question { background: #fef9c3; border-radius: 28px; padding: 15px; margin: 20px 0; }
        .options label { display: block; margin: 5px 0; }
        input[type="text"] { width: 100%; padding: 8px; border-radius: 20px; border: 1px solid #ccc; }
        button { background: #0284c7; color: white; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; margin-top: 20px; }
        .result { background: #d9f99d; padding: 15px; border-radius: 28px; margin-top: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>❓ اختبار الوحدة ${unit}</h1>
    <div id="quiz"></div>
    <button id="submitBtn">✅ تصحيح الاختبار</button>
    <div id="result" class="result"></div>
</div>
<script>
    // أسئلة نموذجية (يمكن تعديلها لاحقاً حسب محتوى الوحدة)
    const questions = [
        { type: 'yesno', text: 'Is the sun big?', correct: 'yes' },
        { type: 'fill', text: 'I ___ a student. (am/are)', correct: 'am' },
        { type: 'choice', text: 'What is the opposite of "big"?', options: ['small', 'tall', 'wide'], correct: 'small' }
    ];
    const quizDiv = document.getElementById('quiz');
    questions.forEach((q, idx) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        qDiv.innerHTML = `<p><strong>${idx+1}. ${q.text}</strong></p>`;
        if(q.type === 'yesno') {
            qDiv.innerHTML += `<label><input type="radio" name="q${idx}" value="yes"> نعم</label>
                               <label><input type="radio" name="q${idx}" value="no"> لا</label>`;
        } else if(q.type === 'fill') {
            qDiv.innerHTML += `<input type="text" id="fill${idx}" placeholder="اكتب إجابتك">`;
        } else if(q.type === 'choice') {
            q.options.forEach(opt => {
                qDiv.innerHTML += `<label><input type="radio" name="q${idx}" value="${opt}"> ${opt}</label>`;
            });
        }
        quizDiv.appendChild(qDiv);
    });
    document.getElementById('submitBtn').onclick = () => {
        let score = 0;
        // تصحيح بسيط
        // السؤال الأول yesno
        const selected = document.querySelector('input[name="q0"]:checked');
        if(selected && selected.value === 'yes') score++;
        // السؤال الثاني fill
        const fillAns = document.getElementById('fill0').value.trim().toLowerCase();
        if(fillAns === 'am') score++;
        // السؤال الثالث choice
        const selectedChoice = document.querySelector('input[name="q2"]:checked');
        if(selectedChoice && selectedChoice.value === 'small') score++;
        document.getElementById('result').innerHTML = `✅ إجابات صحيحة: ${score} من ${questions.length} ${score===questions.length ? '🎉 ممتاز!' : '📖 راجع الودة ثم حاول مرة أخرى'}`;
    };
</script>
</body>
</html>
