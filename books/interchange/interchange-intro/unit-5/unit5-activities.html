<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Interchange Intro - Unit 5 Extra Activities</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', 'OpenDyslexic', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #2c3e50, #1a2632); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: #fef9e8; border-radius: 45px; padding: 20px 30px; }
        h1 { color: #d35400; text-align: center; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .card { background: #fff5e6; border-radius: 35px; padding: 20px; border: 1px solid #f0c0a0; }
        .card h2 { background: #d35400; display: inline-block; padding: 5px 20px; border-radius: 40px; color: white; font-size: 1.3rem; }
        button { background: #d35400; border: none; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; margin: 5px; }
        input, select { padding: 8px; border-radius: 30px; border: 1px solid #ccc; margin: 5px; }
        .correct-feedback { background: #c8e6d9; border-left: 6px solid #2e7d64; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .wrong-feedback { background: #ffe0e0; border-left: 6px solid #d9534f; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .drag-word { background: #2c7da0; color: white; padding: 10px 20px; border-radius: 40px; cursor: grab; display: inline-block; margin: 5px; }
        .drop-zone { border: 2px dashed #d35400; border-radius: 20px; padding: 12px; min-width: 120px; text-align: center; background: #fff0e0; display: inline-block; margin: 6px; }
        .crossword-grid { display: grid; grid-template-columns: repeat(6, 45px); gap: 4px; justify-content: center; background: #f0f0f0; padding: 15px; border-radius: 20px; }
        .crossword-grid input { width: 45px; height: 45px; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
        /* Analog clock styles */
        .clock-container {
            text-align: center;
            margin: 20px 0;
        }
        canvas {
            background: #f0f0f0;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            touch-action: manipulation;
        }
        .time-display {
            font-size: 1.5rem;
            margin: 15px 0;
            font-weight: bold;
            background: #fff0d6;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
        }
        .half-labels {
            font-size: 0.8rem;
            margin-top: 5px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📖 Interchange Intro - Unit 5 🎲 Extra Activities</h1>
    <div class="activity-grid">
        <!-- Interactive Analog Clock (NEW) -->
        <div class="card">
            <h2>⏰ Interactive Analog Clock</h2>
            <div class="clock-container">
                <canvas id="analogClock" width="300" height="300" style="width:100%; max-width:300px; height:auto;"></canvas>
                <div class="time-display" id="clockTimeDisplay">12:00</div>
                <div class="half-labels">⬅️ after (past) &nbsp;&nbsp;&nbsp;&nbsp; to ➡️</div>
                <div>
                    <button id="randomTimeBtn">🎲 Random Time</button>
                    <button id="checkClockTime">✅ Check Time in Words</button>
                </div>
                <input type="text" id="clockWordsInput" placeholder="Write time in English (e.g., ten after two)">
                <div id="clockResult"></div>
                <p><small>Click/tap on the clock to set the time. The left half is "after", the right half is "to".</small></p>
            </div>
        </div>

        <!-- Drag & Drop: Time to words -->
        <div class="card">
            <h2>🕒 Drag & Drop: Match time</h2>
            <div id="dragDropArea"></div>
            <button id="checkDragDrop">Check All</button>
            <div id="dragDropResult"></div>
        </div>

        <!-- Crossword Puzzle (daily activities) -->
        <div class="card">
            <h2>🔠 Crossword</h2>
            <div id="crosswordGrid"></div>
            <div id="crosswordClues" style="margin-top:10px; font-size:0.8rem;"></div>
            <button id="checkCrossword">Check Crossword</button>
            <div id="crosswordResult"></div>
        </div>

        <!-- Unscramble (daily routine verbs) -->
        <div class="card">
            <h2>🔀 Unscramble</h2>
            <div id="scrambleWord" style="font-size:1.8rem; background:#fff0d6; padding:12px; border-radius:30px;"></div>
            <input type="text" id="scrambleInput"><button id="checkScramble">Check</button><button id="newScramble">New</button>
            <div id="scrambleResult"></div><button id="speakScramble">🔊 Speak</button>
        </div>
    </div>
</div>

<script>
    // ---------------------- ANALOG CLOCK ----------------------
    const canvas = document.getElementById('analogClock');
    const ctx = canvas.getContext('2d');
    let clockHours = 12;
    let clockMinutes = 0;
    let isSettingHour = false; // not used, we set both hour and minute from click

    function drawClock() {
        const w = canvas.width, h = canvas.height;
        const radius = w / 2;
        ctx.clearRect(0, 0, w, h);
        
        // Draw clock face
        ctx.beginPath();
        ctx.arc(w/2, h/2, radius - 5, 0, 2 * Math.PI);
        ctx.fillStyle = '#fef9e8';
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Draw numbers and tick marks
        ctx.font = `${radius * 0.12}px Arial`;
        ctx.fillStyle = '#333';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (let i = 1; i <= 12; i++) {
            let angle = i * Math.PI * 2 / 12 - Math.PI/2;
            let numX = w/2 + Math.cos(angle) * (radius * 0.8);
            let numY = h/2 + Math.sin(angle) * (radius * 0.8);
            ctx.fillText(i.toString(), numX, numY);
        }
        
        // Draw ghost text "after" on left half, "to" on right half
        ctx.font = `${radius * 0.08}px Arial`;
        ctx.fillStyle = '#ccc';
        ctx.shadowBlur = 0;
        // Left half (after)
        ctx.save();
        ctx.translate(w/2, h/2);
        ctx.rotate(-Math.PI/2);
        ctx.fillText("after", -radius*0.6, -10);
        ctx.restore();
        // Right half (to)
        ctx.save();
        ctx.translate(w/2, h/2);
        ctx.rotate(Math.PI/2);
        ctx.fillText("to", radius*0.6, -10);
        ctx.restore();
        
        // Draw minute ticks
        for (let i = 0; i < 60; i++) {
            let angle = i * Math.PI * 2 / 60 - Math.PI/2;
            let startX = w/2 + Math.cos(angle) * (radius - 10);
            let startY = h/2 + Math.sin(angle) * (radius - 10);
            let endX = w/2 + Math.cos(angle) * (radius - 20);
            let endY = h/2 + Math.sin(angle) * (radius - 20);
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1;
            ctx.stroke();
        }
        
        // Draw hour hand
        let hourAngle = (clockHours % 12) * Math.PI * 2 / 12 + (clockMinutes / 60) * (Math.PI * 2 / 12) - Math.PI/2;
        ctx.beginPath();
        ctx.moveTo(w/2, h/2);
        ctx.lineTo(w/2 + Math.cos(hourAngle) * (radius * 0.5), h/2 + Math.sin(hourAngle) * (radius * 0.5));
        ctx.lineWidth = 6;
        ctx.strokeStyle = '#333';
        ctx.stroke();
        
        // Draw minute hand
        let minuteAngle = clockMinutes * Math.PI * 2 / 60 - Math.PI/2;
        ctx.beginPath();
        ctx.moveTo(w/2, h/2);
        ctx.lineTo(w/2 + Math.cos(minuteAngle) * (radius * 0.7), h/2 + Math.sin(minuteAngle) * (radius * 0.7));
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#d35400';
        ctx.stroke();
        
        // Draw center dot
        ctx.beginPath();
        ctx.arc(w/2, h/2, 6, 0, 2*Math.PI);
        ctx.fillStyle = '#d35400';
        ctx.fill();
    }
    
    function updateClockDisplay() {
        let hour12 = clockHours % 12;
        if (hour12 === 0) hour12 = 12;
        let minuteStr = clockMinutes < 10 ? '0' + clockMinutes : clockMinutes;
        document.getElementById('clockTimeDisplay').innerText = `${hour12}:${minuteStr}`;
    }
    
    function getTimeWords(hours, minutes) {
        let hour12 = hours % 12;
        if (hour12 === 0) hour12 = 12;
        let nextHour = (hours % 12) + 1;
        if (nextHour === 13) nextHour = 1;
        if (minutes === 0) return `${hour12} o'clock`;
        else if (minutes === 15) return `a quarter after ${hour12}`;
        else if (minutes === 30) return `half past ${hour12}`;
        else if (minutes === 45) return `a quarter to ${nextHour}`;
        else if (minutes < 30) return `${minutes} after ${hour12}`;
        else return `${60 - minutes} to ${nextHour}`;
    }
    
    function setTimeFromClick(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let x = (clientX - rect.left) * scaleX;
        let y = (clientY - rect.top) * scaleY;
        const centerX = canvas.width/2, centerY = canvas.height/2;
        let dx = x - centerX;
        let dy = y - centerY;
        let angle = Math.atan2(dy, dx) + Math.PI/2; // 12 o'clock is -PI/2, adjust
        if (angle < 0) angle += 2*Math.PI;
        // Determine if click is near center? We'll set minute based on angle.
        let minuteValue = Math.round(angle * 60 / (2*Math.PI)) % 60;
        let hourValue = (Math.floor(angle * 12 / (2*Math.PI)) + 12) % 12;
        if (hourValue === 0) hourValue = 12;
        clockMinutes = minuteValue;
        clockHours = hourValue;
        drawClock();
        updateClockDisplay();
        document.getElementById('clockWordsInput').value = '';
        document.getElementById('clockResult').innerHTML = '';
    }
    
    canvas.addEventListener('click', (e) => {
        setTimeFromClick(e.clientX, e.clientY);
    });
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        setTimeFromClick(touch.clientX, touch.clientY);
    });
    
    document.getElementById('randomTimeBtn').onclick = () => {
        clockHours = Math.floor(Math.random() * 12) + 1;
        clockMinutes = Math.floor(Math.random() * 60);
        drawClock();
        updateClockDisplay();
        document.getElementById('clockWordsInput').value = '';
        document.getElementById('clockResult').innerHTML = '';
    };
    document.getElementById('checkClockTime').onclick = () => {
        let userAnswer = document.getElementById('clockWordsInput').value.trim().toLowerCase();
        let correctAnswer = getTimeWords(clockHours, clockMinutes).toLowerCase();
        if (userAnswer === correctAnswer) {
            document.getElementById('clockResult').innerHTML = "<div class='correct-feedback'>✅ Correct! Great job.</div>";
        } else {
            document.getElementById('clockResult').innerHTML = `<div class='wrong-feedback'>❌ Wrong. Correct: ${correctAnswer}</div>`;
        }
    };
    
    // Initialize clock
    drawClock();
    updateClockDisplay();
    
    // ---------------------- Drag & Drop (time matching) ----------------------
    const timePairs = [
        { digital: "1:00", word: "one o'clock" },
        { digital: "2:15", word: "two fifteen" },
        { digital: "3:30", word: "three thirty" },
        { digital: "4:45", word: "four forty-five" },
        { digital: "12:00", word: "noon" }
    ];
    
    let selectedDigital = null;
    function initDragDrop() {
        let container = document.getElementById('dragDropArea');
        container.innerHTML = '<div><strong>Click a digital time, then click the matching words</strong></div><div style="display:flex; flex-wrap:wrap; gap:15px; margin:10px 0;">';
        timePairs.forEach(pair => {
            let btn = document.createElement('button');
            btn.innerText = pair.digital;
            btn.classList.add('drag-word');
            btn.onclick = () => { selectedDigital = pair.digital; };
            container.appendChild(btn);
        });
        container.innerHTML += '</div><div style="display:flex; flex-wrap:wrap; gap:20px; margin-top:20px;">';
        timePairs.forEach(pair => {
            let zone = document.createElement('div');
            zone.classList.add('drop-zone');
            zone.setAttribute('data-word', pair.word);
            zone.innerHTML = `${pair.word}<br><span class="drop-label">???</span>`;
            zone.onclick = () => {
                if (selectedDigital) {
                    let match = timePairs.find(p => p.digital === selectedDigital && p.word === zone.getAttribute('data-word'));
                    if (match) {
                        zone.querySelector('.drop-label').innerText = selectedDigital;
                        zone.style.background = "#c8e6d9";
                        selectedDigital = null;
                    } else {
                        alert(`Wrong! "${selectedDigital}" does not match "${zone.getAttribute('data-word')}"`);
                    }
                } else {
                    alert("Click a digital time first.");
                }
            };
            container.appendChild(zone);
        });
        container.innerHTML += '</div>';
    }
    document.getElementById('checkDragDrop').onclick = () => {
        let allOk = true;
        document.querySelectorAll('#dragDropArea .drop-zone').forEach(zone => {
            let label = zone.querySelector('.drop-label').innerText;
            let expectedDigital = timePairs.find(p => p.word === zone.getAttribute('data-word'))?.digital;
            if (label !== expectedDigital) allOk = false;
        });
        document.getElementById('dragDropResult').innerHTML = allOk ? "<div class='correct-feedback'>🎉 Perfect! All times matched.</div>" : "<div class='wrong-feedback'>⚠️ Some matches are missing or wrong.</div>";
    };
    initDragDrop();
    
    // ---------------------- Crossword ----------------------
    function buildCrossword() {
        let gridHtml = '<div class="crossword-grid">';
        let predefined = [
            ['B','R','E','A','K','F'],
            ['','','','','','A'],
            ['L','U','N','C','H','S'],
            ['','','','','','T'],
            ['D','I','N','N','E','R'],
            ['','','','','','']
        ];
        for(let i=0;i<6;i++){
            for(let j=0;j<6;j++){
                let val = predefined[i][j] ? predefined[i][j] : '';
                let readonly = val ? 'readonly' : '';
                gridHtml += `<input type="text" maxlength="1" id="cell_${i}_${j}" value="${val}" style="text-transform:uppercase" ${readonly}>`;
            }
            gridHtml += `<div style="width:100%"></div>`;
        }
        gridHtml += '</div>';
        document.getElementById('crosswordGrid').innerHTML = gridHtml;
        let clues = `<strong>Clues:</strong> Across: Row0: morning meal (BREAKFAST), Row2: midday meal (LUNCH), Row4: evening meal (DINNER).`;
        document.getElementById('crosswordClues').innerHTML = clues;
    }
    document.getElementById('checkCrossword').onclick = () => {
        document.getElementById('crosswordResult').innerHTML = "<div class='correct-feedback'>✅ Check your answers with the clues.</div>";
    };
    buildCrossword();
    
    // ---------------------- Unscramble ----------------------
    const verbs = ["cook", "eat", "sleep", "work", "study", "swim"];
    let currentScramble = "";
    function getScrambled(w) { let arr = w.split(''); for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr.join(''); }
    function updateScramble() { currentScramble = verbs[Math.floor(Math.random()*verbs.length)]; document.getElementById("scrambleWord").innerText = getScrambled(currentScramble); document.getElementById("scrambleInput").value=""; document.getElementById("scrambleResult").innerHTML=""; }
    document.getElementById("checkScramble").onclick = () => { let ans = document.getElementById("scrambleInput").value.trim().toLowerCase(); if(ans === currentScramble) document.getElementById("scrambleResult").innerHTML="<div class='correct-feedback'>✅ Correct</div>"; else document.getElementById("scrambleResult").innerHTML=`<div class='wrong-feedback'>❌ Wrong: ${currentScramble}</div>`; };
    document.getElementById("newScramble").onclick = updateScramble;
    document.getElementById("speakScramble").onclick = () => { let u = new SpeechSynthesisUtterance(currentScramble); u.lang="en-US"; speechSynthesis.cancel(); speechSynthesis.speak(u); };
    updateScramble();
</script>
</body>
</html>
