<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Interchange Intro - Unit 5 Extra Activities</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', 'OpenDyslexic', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #2c3e50, #1a2632); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: #fef9e8; border-radius: 45px; padding: 20px 30px; }
        h1 { color: #d35400; text-align: center; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .card { background: #fff5e6; border-radius: 35px; padding: 20px; border: 1px solid #f0c0a0; }
        .card h2 { background: #d35400; display: inline-block; padding: 5px 20px; border-radius: 40px; color: white; font-size: 1.3rem; }
        button { background: #d35400; border: none; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; margin: 5px; }
        input, select { padding: 8px; border-radius: 30px; border: 1px solid #ccc; margin: 5px; }
        .correct-feedback { background: #c8e6d9; border-left: 6px solid #2e7d64; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .wrong-feedback { background: #ffe0e0; border-left: 6px solid #d9534f; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .drag-word { background: #2c7da0; color: white; padding: 10px 20px; border-radius: 40px; cursor: grab; display: inline-block; margin: 5px; }
        .drop-zone { border: 2px dashed #d35400; border-radius: 20px; padding: 12px; min-width: 120px; text-align: center; background: #fff0e0; display: inline-block; margin: 6px; }
        .crossword-grid { display: grid; grid-template-columns: repeat(6, 45px); gap: 4px; justify-content: center; background: #f0f0f0; padding: 15px; border-radius: 20px; }
        .crossword-grid input { width: 45px; height: 45px; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <h1>📖 Interchange Intro - Unit 5 🎲 Extra Activities</h1>
    <div class="activity-grid">
        <div class="card"><h2>🕒 Drag & Drop: Time → Digital</h2><div id="dragDropArea"></div><button id="checkDragDrop">Check</button><div id="dragDropResult"></div></div>
        <div class="card"><h2>🔠 Crossword</h2><div id="crosswordGrid"></div><div id="crosswordClues"></div><button id="checkCrossword">Check</button><div id="crosswordResult"></div></div>
        <div class="card"><h2>🔀 Unscramble (Daily routines)</h2><div id="scrambleWord" style="font-size:1.8rem; background:#fff0d6; padding:12px; border-radius:30px;"></div><input id="scrambleInput"><button id="checkScramble">Check</button><button id="newScramble">New</button><div id="scrambleResult"></div><button id="speakScramble">🔊 Speak</button></div>
        <div class="card"><h2>⏰ What time is it? (Interactive clock)</h2><div id="clockDisplay" style="font-size:2rem; text-align:center;">12:00</div><button id="randomTime">Random Time</button><input id="timeInput" placeholder="Write time in words"><button id="checkTime">Check</button><div id="timeResult"></div></div>
    </div>
</div>
<script>
    const times = ["1:00","2:15","3:30","4:45","5:10","6:20","7:55","8:00","9:30","10:40","11:15","12:00"];
    const words = ["one o'clock","two fifteen","three thirty","four forty-five","five ten","six twenty","seven fifty-five","eight o'clock","nine thirty","ten forty","eleven fifteen","noon"];
    function imgTag(time) { let name=time.replace(':','-'); return `<img src="../images/time-${name}.jpg" style="width:50px;" onerror="this.onerror=null;this.parentElement.innerHTML+='🕐';">`; }
    function speak(t){ let u=new SpeechSynthesisUtterance(t); u.lang="en-US"; speechSynthesis.cancel(); speechSynthesis.speak(u); }
    // Drag & Drop
    let selected=null;
    function initDragDrop(){
        let c=document.getElementById('dragDropArea');
        c.innerHTML='<div><strong>Click a time (digital), then its word</strong></div><div style="display:flex;flex-wrap:wrap;gap:15px;margin:10px 0;">';
        times.forEach(t=>{ let btn=document.createElement('button'); btn.innerText=t; btn.classList.add('drag-word'); btn.onclick=()=>{ selected=t; }; c.appendChild(btn); });
        c.innerHTML+='</div><div style="display:flex;flex-wrap:wrap;gap:20px;margin-top:20px;">';
        words.forEach(w=>{ let zone=document.createElement('div'); zone.classList.add('drop-zone'); zone.setAttribute('data-word',w); zone.innerHTML=`${w}<br><span class="drop-label">???</span>`; zone.onclick=()=>{ if(selected && words[times.indexOf(selected)]===w){ zone.querySelector('.drop-label').innerText=selected; zone.style.background="#c8e6d9"; selected=null; } else if(selected) alert(`Wrong! ${selected} does not match ${w}.`); else alert("Click a time first."); }; c.appendChild(zone); });
        c.innerHTML+='</div>';
    }
    document.getElementById('checkDragDrop').onclick=()=>{ let ok=true; document.querySelectorAll('#dragDropArea .drop-zone').forEach(z=>{ let label=z.querySelector('.drop-label').innerText; let expected=times[words.indexOf(z.getAttribute('data-word'))]; if(label!==expected) ok=false; }); document.getElementById('dragDropResult').innerHTML=ok?"<div class='correct-feedback'>Perfect!</div>":"<div class='wrong-feedback'>Some wrong.</div>"; };
    initDragDrop();
    // Crossword
    function buildCrossword(){
        let gridHtml='<div class="crossword-grid">';
        let pre=[['B','R','E','A','K','F'],['','','','','','A'],['L','U','N','C','H','S'],['','','','','','T'],['D','I','N','N','E','R'],['','','','','','']];
        for(let i=0;i<6;i++){ for(let j=0;j<6;j++){ let val=pre[i][j]||''; gridHtml+=`<input type="text" maxlength="1" id="cell_${i}_${j}" value="${val}" ${val?'readonly':''}>`; } gridHtml+='<div style="width:100%"></div>'; }
        gridHtml+='</div>'; document.getElementById('crosswordGrid').innerHTML=gridHtml;
        document.getElementById('crosswordClues').innerHTML='<strong>Clues:</strong> Row0: morning meal (BREAKFAST), Row2: midday meal (LUNCH), Row4: evening meal (DINNER).';
    }
    document.getElementById('checkCrossword').onclick=()=>{ document.getElementById('crosswordResult').innerHTML="<div class='correct-feedback'>✅ Check answers with clues.</div>"; };
    buildCrossword();
    // Unscramble (daily routines)
    const routines = ["get up","have breakfast","go to work","eat lunch","finish work","go home","watch tv","have dinner","go to bed"];
    let cur="";
    function getScrambled(w){ let a=w.replace(/ /g,'').split(''); for(let i=a.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a.join(''); }
    function updateScramble(){ cur=routines[Math.floor(Math.random()*routines.length)]; document.getElementById("scrambleWord").innerText=getScrambled(cur); document.getElementById("scrambleInput").value=""; document.getElementById("scrambleResult").innerHTML=""; }
    document.getElementById("checkScramble").onclick=()=>{ let ans=document.getElementById("scrambleInput").value.trim().toLowerCase(); if(ans===cur) document.getElementById("scrambleResult").innerHTML="<div class='correct-feedback'>✅ Correct</div>"; else document.getElementById("scrambleResult").innerHTML=`<div class='wrong-feedback'>❌ Wrong: ${cur}</div>`; };
    document.getElementById("newScramble").onclick=updateScramble; document.getElementById("speakScramble").onclick=()=>speak(cur); updateScramble();
    // Interactive clock
    let currentTime="12:00";
    function randomTime(){ let idx=Math.floor(Math.random()*times.length); currentTime=times[idx]; document.getElementById("clockDisplay").innerHTML=currentTime; document.getElementById("timeInput").value=""; document.getElementById("timeResult").innerHTML=""; }
    document.getElementById("randomTime").onclick=randomTime;
    document.getElementById("checkTime").onclick=()=>{ let ans=document.getElementById("timeInput").value.trim().toLowerCase(); let correct=words[times.indexOf(currentTime)]; if(ans===correct) document.getElementById("timeResult").innerHTML="<div class='correct-feedback'>✅ Correct!</div>"; else document.getElementById("timeResult").innerHTML=`<div class='wrong-feedback'>❌ Correct: ${correct}</div>`; };
    randomTime();
</script>
</body>
</html>
