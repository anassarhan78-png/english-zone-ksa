<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Interchange Intro - Unit 10 Quiz</title>
    <style>
        body { background: linear-gradient(135deg, #2c3e50, #1a2632); margin: 0; padding: 20px; font-family: 'Segoe UI', 'OpenDyslexic', Arial, sans-serif; }
        .container { max-width: 1000px; margin: auto; background: #fef9e8; border-radius: 40px; padding: 30px; }
        h1 { color: #d35400; text-align: center; }
        .question { background: #fff5e6; padding: 15px; border-radius: 25px; margin: 15px 0; }
        button { background: #d35400; border: none; color: white; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-size: 1rem; margin-top: 20px; }
        .result { background: #e9ecef; padding: 20px; border-radius: 25px; margin-top: 20px; font-size: 1.2rem; }
        input, select { margin: 5px; padding: 8px; border-radius: 20px; border: 1px solid #ccc; }
        .img-quiz { max-width: 80px; display: block; margin-bottom: 10px; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Unit 10 Quiz - What sports do you play? (50+ questions)</h1>
    <div id="quizContainer"></div>
    <button id="submitQuiz">Submit Quiz</button>
    <div id="quizResult" class="result"></div>
</div>
<script>
    const imageBase = "../images/";
    const questions = [];
    // Part 1: Sports vocabulary (10 questions)
    const sports = ["soccer","baseball","basketball","volleyball","tennis","golf","hockey","swimming","running","cycling"];
    for (let i=0;i<10;i++) questions.push({ type:"short", text:`What sport uses a ${sports[i]==="soccer"?"ball":sports[i]==="baseball"?"bat and ball":sports[i]==="basketball"?"hoop":sports[i]==="tennis"?"racket":sports[i]==="golf"?"club":sports[i]==="hockey"?"stick":"body"}?`, answer:sports[i] });
    // Part 2: Can/Can't (10 questions)
    const canQ = [
        {text:"I ___ play the piano. (ability)",ans:"can"},
        {text:"She ___ sing at all. (no ability)",ans:"can't"},
        {text:"___ you swim?",ans:"Can"},
        {text:"He ___ fix cars.",ans:"can"},
        {text:"We ___ speak French. (we only know English)",ans:"can't"},
        {text:"___ he play hockey?",ans:"Can"},
        {text:"They ___ bake a cake.",ans:"can"},
        {text:"My sister ___ ride a horse. (scared)",ans:"can't"},
        {text:"I ___ download videos.",ans:"can"},
        {text:"___ you do yoga?",ans:"Can"}
    ];
    for (let i=0;i<10;i++) questions.push({ type:"short", text:canQ[i].text, answer:canQ[i].ans });
    // Part 3: Wh-questions (5 questions)
    const wh = [
        {text:"___ sports do you like?",ans:"What"},
        {text:"___ do you play with?",ans:"Who"},
        {text:"___ do you play?",ans:"Where"},
        {text:"___ often do you practice?",ans:"How"},
        {text:"___ time do you start?",ans:"What"}
    ];
    for (let i=0;i<5;i++) questions.push({ type:"short", text:wh[i].text, answer:wh[i].ans });
    // Part 4: Adverbs of frequency (5 questions)
    const freq = [
        {text:"100% of the time",ans:"always"},
        {text:"0% of the time",ans:"never"},
        {text:"50% of the time",ans:"sometimes"},
        {text:"90% of the time",ans:"usually"},
        {text:"10% of the time",ans:"hardly ever"}
    ];
    for (let i=0;i<5;i++) questions.push({ type:"short", text:freq[i].text, answer:freq[i].ans });
    // Part 5: Conversation comprehension (5 questions based on p.??)
    const conv = [
        {text:"What sports does Justin like?",ans:"soccer, hockey, baseball, volleyball"},
        {text:"Does Justin play these sports?",ans:"no"},
        {text:"What does Lauren think about Justin?",ans:"good athlete"},
        {text:"What does Justin actually do?",ans:"watches them on TV"},
        {text:"What is Justin's real talent?",ans:"watching sports"}
    ];
    for (let i=0;i<5;i++) questions.push({ type:"short", text:conv[i].text, answer:conv[i].ans.toLowerCase() });
    // Part 6: Image-based (5 images)
    const imgNames = ["soccer","basketball","tennis","swimming","baseball"];
    for (let i=0;i<5;i++) questions.push({ type:"img", img:imgNames[i]+".jpg", text:"What sport is this?", answer:imgNames[i] });
    // Part 7: True/False (5 questions)
    const tf = [["Golf is played on ice.",false],["You need a racket for tennis.",true],["Swimming is a water sport.",true],["Basketball uses a bat.",false],["'Can' expresses ability.",true]];
    for (let i=0;i<5;i++) questions.push({ type:"tf", text:tf[i][0], answer:tf[i][1]?"true":"false" });
    // Part 8: Short answer (5 questions)
    const short = [
        {text:"Name a sport played on ice.",ans:"hockey"},
        {text:"What do you use to hit a baseball?",ans:"bat"},
        {text:"Where do you play tennis?",ans:"court"},
        {text:"What activity uses a piano?",ans:"music"},
        {text:"Name a water sport.",ans:"swimming"}
    ];
    for (let i=0;i<5;i++) questions.push({ type:"short", text:short[i].text, answer:short[i].ans });
    // Build HTML
    function buildQuiz() {
        let html='';
        questions.forEach((q,idx)=>{
            html+=`<div class="question"><strong>${idx+1}. `;
            if(q.type==='img') html+=`<img src="${imageBase+q.img}" class="img-quiz" onerror="this.onerror=null;this.parentElement.innerHTML+='⚽';">${q.text}`;
            else html+=q.text;
            html+=`</strong><br>`;
            if(q.type==='mc'){
                q.options.forEach(opt=>{ html+=`<label><input type="radio" name="q${idx}" value="${opt}"> ${opt}</label> `; });
            } else if(q.type==='tf'){
                html+=`<label><input type="radio" name="q${idx}" value="true"> True</label> <label><input type="radio" name="q${idx}" value="false"> False</label>`;
            } else {
                html+=`<input type="text" name="q${idx}" placeholder="Type answer">`;
            }
            html+=`</div>`;
        });
        document.getElementById('quizContainer').innerHTML=html;
    }
    function submitQuiz(){
        let score=0;
        for(let i=0;i<questions.length;i++){
            let q=questions[i], ans=null;
            if(q.type==='mc'||q.type==='tf'){
                let radios=document.querySelectorAll(`input[name="q${i}"]`);
                for(let r of radios) if(r.checked){ ans=r.value; break; }
            } else {
                let inp=document.querySelector(`input[name="q${i}"]`);
                if(inp) ans=inp.value.trim().toLowerCase();
            }
            if(ans===q.answer.toLowerCase()) score++;
        }
        let percent=(score/questions.length)*100;
        let msg=`You got ${score}/${questions.length} (${percent}%). `;
        if(percent>=90) msg+="Excellent!";
        else if(percent>=75) msg+="Very good!";
        else if(percent>=60) msg+="Good. Review some points.";
        else msg+="Need more practice.";
        document.getElementById('quizResult').innerHTML=msg;
    }
    buildQuiz();
    document.getElementById('submitQuiz').onclick=submitQuiz;
</script>
</body>
</html>
