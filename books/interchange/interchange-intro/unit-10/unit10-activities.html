<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Interchange Intro - Unit 10 Extra Activities</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', 'OpenDyslexic', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #2c3e50, #1a2632); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: #fef9e8; border-radius: 45px; padding: 20px 30px; }
        h1 { color: #d35400; text-align: center; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .card { background: #fff5e6; border-radius: 35px; padding: 20px; border: 1px solid #f0c0a0; }
        .card h2 { background: #d35400; display: inline-block; padding: 5px 20px; border-radius: 40px; color: white; font-size: 1.3rem; }
        button { background: #d35400; border: none; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; margin: 5px; }
        input, select { padding: 8px; border-radius: 30px; border: 1px solid #ccc; margin: 5px; }
        .correct-feedback { background: #c8e6d9; border-left: 6px solid #2e7d64; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .wrong-feedback { background: #ffe0e0; border-left: 6px solid #d9534f; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .drag-word { background: #2c7da0; color: white; padding: 10px 20px; border-radius: 40px; cursor: grab; display: inline-block; margin: 5px; }
        .drop-zone { border: 2px dashed #d35400; border-radius: 20px; padding: 12px; min-width: 120px; text-align: center; background: #fff0e0; display: inline-block; margin: 6px; }
        .crossword-grid { display: grid; grid-template-columns: repeat(6, 45px); gap: 4px; justify-content: center; background: #f0f0f0; padding: 15px; border-radius: 20px; }
        .crossword-grid input { width: 45px; height: 45px; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <h1>📖 Interchange Intro - Unit 10 🎲 Extra Activities</h1>
    <div class="activity-grid">
        <div class="card"><h2>⚽ Drag & Drop: Sport → Season</h2><div id="dragDropArea"></div><button id="checkDragDrop">Check</button><div id="dragDropResult"></div></div>
        <div class="card"><h2>🔠 Crossword (Sports)</h2><div id="crosswordGrid"></div><div id="crosswordClues"></div><button id="checkCrossword">Check</button><div id="crosswordResult"></div></div>
        <div class="card"><h2>🔀 Unscramble (Sports)</h2><div id="scrambleWord" style="font-size:1.8rem; background:#fff0d6; padding:12px; border-radius:30px;"></div><input id="scrambleInput"><button id="checkScramble">Check</button><button id="newScramble">New</button><div id="scrambleResult"></div><button id="speakScramble">🔊 Speak</button></div>
        <div class="card"><h2>💪 Can/Can't Practice</h2><div id="canQuestion">___ you play the piano? (Can / Do)</div><input id="canInput"><button id="checkCan">Check</button><button id="newCan">Next</button><div id="canResult"></div></div>
    </div>
</div>
<script>
    const sportSeason = [["soccer","spring"],["baseball","summer"],["football","fall"],["hockey","winter"],["golf","spring"],["swimming","summer"],["skiing","winter"]];
    function imgTag(word) { let name=word.toLowerCase().replace(/ /g,'-'); return `<img src="../images/${name}.jpg" style="width:50px; border-radius:10px;" onerror="this.onerror=null;this.parentElement.innerHTML+='⚽';">`; }
    function speak(t){ let u=new SpeechSynthesisUtterance(t); u.lang="en-US"; speechSynthesis.cancel(); speechSynthesis.speak(u); }
    // Drag & Drop
    let selected=null;
    function initDragDrop(){
        let c=document.getElementById('dragDropArea');
        c.innerHTML='<div><strong>Click a sport, then its season</strong></div><div style="display:flex;flex-wrap:wrap;gap:15px;margin:10px 0;">';
        sportSeason.forEach(ss=>{ let btn=document.createElement('button'); btn.innerText=ss[0]; btn.classList.add('drag-word'); btn.onclick=()=>{ selected=ss[0]; }; c.appendChild(btn); });
        c.innerHTML+='</div><div style="display:flex;flex-wrap:wrap;gap:20px;margin-top:20px;">';
        const seasons = ["spring","summer","fall","winter"];
        seasons.forEach(season=>{ let zone=document.createElement('div'); zone.classList.add('drop-zone'); zone.setAttribute('data-season',season); zone.innerHTML=`${season}<br><span class="drop-label">???</span>`; zone.onclick=()=>{ if(selected){ let match=sportSeason.find(ss=>ss[0]===selected && ss[1]===season); if(match){ zone.querySelector('.drop-label').innerText=selected; zone.style.background="#c8e6d9"; selected=null; } else alert(`Wrong! ${selected} is not played in ${season}.`); } else alert("Click a sport first."); }; c.appendChild(zone); });
        c.innerHTML+='</div>';
    }
    document.getElementById('checkDragDrop').onclick=()=>{ let ok=true; document.querySelectorAll('#dragDropArea .drop-zone').forEach(z=>{ let label=z.querySelector('.drop-label').innerText; let expected=sportSeason.find(ss=>ss[1]===z.getAttribute('data-season'))[0]; if(label!==expected) ok=false; }); document.getElementById('dragDropResult').innerHTML=ok?"<div class='correct-feedback'>Perfect!</div>":"<div class='wrong-feedback'>Some wrong.</div>"; };
    initDragDrop();
    // Crossword
    function buildCrossword(){
        let gridHtml='<div class="crossword-grid">';
        let pre=[['S','O','C','C','E','R'],['','','','','','B'],['T','E','N','N','I','S'],['','','','','','K'],['G','O','L','F','','T'],['','','','','','B']];
        for(let i=0;i<6;i++){ for(let j=0;j<6;j++){ let val=pre[i][j]||''; gridHtml+=`<input type="text" maxlength="1" id="cell_${i}_${j}" value="${val}" ${val?'readonly':''}>`; } gridHtml+='<div style="width:100%"></div>'; }
        gridHtml+='</div>'; document.getElementById('crosswordGrid').innerHTML=gridHtml;
        document.getElementById('crosswordClues').innerHTML='<strong>Clues:</strong> Row0: popular world sport (SOCCER), Row2: racket sport (TENNIS), Row4: club sport (GOLF). Down: Col5: ice sport (HOCKEY).';
    }
    document.getElementById('checkCrossword').onclick=()=>{ document.getElementById('crosswordResult').innerHTML="<div class='correct-feedback'>✅ Check answers with clues.</div>"; };
    buildCrossword();
    // Unscramble sports
    const sportList = ["soccer","tennis","baseball","hockey","golf","swimming"];
    let cur="";
    function getScrambled(w){ let a=w.split(''); for(let i=a.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a.join(''); }
    function updateScramble(){ cur=sportList[Math.floor(Math.random()*sportList.length)]; document.getElementById("scrambleWord").innerText=getScrambled(cur); document.getElementById("scrambleInput").value=""; document.getElementById("scrambleResult").innerHTML=""; }
    document.getElementById("checkScramble").onclick=()=>{ let ans=document.getElementById("scrambleInput").value.trim().toLowerCase(); if(ans===cur) document.getElementById("scrambleResult").innerHTML="<div class='correct-feedback'>✅ Correct</div>"; else document.getElementById("scrambleResult").innerHTML=`<div class='wrong-feedback'>❌ Wrong: ${cur}</div>`; };
    document.getElementById("newScramble").onclick=updateScramble; document.getElementById("speakScramble").onclick=()=>speak(cur); updateScramble();
    // Can/Can't
    const canQ = [
        {s:"___ you play the piano? (Can / Do)",a:"Can"},
        {s:"She ___ sing very well. (can / can't)",a:"can"},
        {s:"He ___ swim. (can / can't)",a:"can't"},
        {s:"___ he fix cars? (Can / Does)",a:"Can"}
    ];
    let canIdx=0;
    function updateCan(){ canIdx=Math.floor(Math.random()*canQ.length); document.getElementById("canQuestion").innerHTML=canQ[canIdx].s; document.getElementById("canInput").value=""; document.getElementById("canResult").innerHTML=""; }
    document.getElementById("checkCan").onclick=()=>{ let ans=document.getElementById("canInput").value.trim().toLowerCase(); if(ans===canQ[canIdx].a.toLowerCase()) document.getElementById("canResult").innerHTML="<div class='correct-feedback'>✅ Correct!</div>"; else document.getElementById("canResult").innerHTML=`<div class='wrong-feedback'>❌ Correct: ${canQ[canIdx].a}</div>`; };
    document.getElementById("newCan").onclick=updateCan; updateCan();
</script>
</body>
</html>
