<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Interchange Intro - Unit 10 Extra Activities</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', 'OpenDyslexic', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #2c3e50, #1a2632); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: #fef9e8; border-radius: 45px; padding: 20px 30px; }
        h1 { color: #d35400; text-align: center; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .card { background: #fff5e6; border-radius: 35px; padding: 20px; border: 1px solid #f0c0a0; }
        .card h2 { background: #d35400; display: inline-block; padding: 5px 20px; border-radius: 40px; color: white; font-size: 1.3rem; }
        button { background: #d35400; border: none; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; margin: 5px; }
        input, select { padding: 8px; border-radius: 30px; border: 1px solid #ccc; margin: 5px; }
        .correct-feedback { background: #c8e6d9; border-left: 6px solid #2e7d64; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .wrong-feedback { background: #ffe0e0; border-left: 6px solid #d9534f; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .drag-word { background: #2c7da0; color: white; padding: 10px 20px; border-radius: 40px; cursor: grab; display: inline-block; margin: 5px; }
        .drop-zone { border: 2px dashed #d35400; border-radius: 20px; padding: 12px; min-width: 120px; text-align: center; background: #fff0e0; display: inline-block; margin: 6px; }
        .crossword-grid { display: grid; grid-template-columns: repeat(6, 45px); gap: 4px; justify-content: center; background: #f0f0f0; padding: 15px; border-radius: 20px; }
        .crossword-grid input { width: 45px; height: 45px; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <h1>📖 Interchange Intro - Unit 10 🎲 Extra Activities</h1>
    <div class="activity-grid">
        <!-- Drag & Drop: Sport to season -->
        <div class="card">
            <h2>🏆 Drag & Drop: Sport → Season</h2>
            <div id="dragDropArea"></div>
            <button id="checkDragDrop">Check All</button>
            <div id="dragDropResult"></div>
        </div>

        <!-- Crossword Puzzle (sports) -->
        <div class="card">
            <h2>🔠 Crossword</h2>
            <div id="crosswordGrid"></div>
            <div id="crosswordClues" style="margin-top:10px; font-size:0.8rem;"></div>
            <button id="checkCrossword">Check Crossword</button>
            <div id="crosswordResult"></div>
        </div>

        <!-- Unscramble (sports names) -->
        <div class="card">
            <h2>🔀 Unscramble</h2>
            <div id="scrambleWord" style="font-size:1.8rem; background:#fff0d6; padding:12px; border-radius:30px;"></div>
            <input type="text" id="scrambleInput"><button id="checkScramble">Check</button><button id="newScramble">New</button>
            <div id="scrambleResult"></div><button id="speakScramble">🔊 Speak</button>
        </div>

        <!-- Can/Can't practice -->
        <div class="card">
            <h2>💪 Can / Can't Quiz</h2>
            <div id="canQuestion">______ you play the piano? (Can / Do)</div>
            <input type="text" id="canInput" placeholder="Can / Do">
            <button id="checkCan">Check</button>
            <button id="newCan">Next</button>
            <div id="canResult"></div>
        </div>
    </div>
</div>

<script>
    const sportSeason = [
        { sport: "soccer", season: "spring" },
        { sport: "baseball", season: "summer" },
        { sport: "football", season: "fall" },
        { sport: "hockey", season: "winter" },
        { sport: "golf", season: "spring" },
        { sport: "swimming", season: "summer" },
        { sport: "skiing", season: "winter" }
    ];
    
    function speak(t) { let u = new SpeechSynthesisUtterance(t); u.lang="en-US"; speechSynthesis.cancel(); speechSynthesis.speak(u); }

    // Drag & Drop
    let selectedSport = null;
    function initDragDrop() {
        let container = document.getElementById('dragDropArea');
        container.innerHTML = '<div><strong>Click a sport, then click its season</strong></div><div style="display:flex; flex-wrap:wrap; gap:15px; margin:10px 0;">';
        sportSeason.forEach(item => {
            let btn = document.createElement('button');
            btn.innerText = item.sport;
            btn.classList.add('drag-word');
            btn.onclick = () => { selectedSport = item.sport; };
            container.appendChild(btn);
        });
        container.innerHTML += '</div><div style="display:flex; flex-wrap:wrap; gap:20px; margin-top:20px;">';
        const seasons = ["spring", "summer", "fall", "winter"];
        seasons.forEach(season => {
            let zone = document.createElement('div');
            zone.classList.add('drop-zone');
            zone.setAttribute('data-season', season);
            zone.innerHTML = `${season}<br><span class="drop-label">???</span>`;
            zone.onclick = () => {
                if (selectedSport) {
                    let match = sportSeason.find(ss => ss.sport === selectedSport && ss.season === season);
                    if (match) {
                        zone.querySelector('.drop-label').innerText = selectedSport;
                        zone.style.background = "#c8e6d9";
                        selectedSport = null;
                    } else {
                        alert(`Wrong! "${selectedSport}" is not played in ${season}.`);
                    }
                } else {
                    alert("Click a sport first.");
                }
            };
            container.appendChild(zone);
        });
        container.innerHTML += '</div>';
    }
    document.getElementById('checkDragDrop').onclick = () => {
        let allOk = true;
        document.querySelectorAll('#dragDropArea .drop-zone').forEach(zone => {
            let label = zone.querySelector('.drop-label').innerText;
            let season = zone.getAttribute('data-season');
            let expectedSport = sportSeason.find(ss => ss.season === season)?.sport;
            if (label !== expectedSport) allOk = false;
        });
        document.getElementById('dragDropResult').innerHTML = allOk ? "<div class='correct-feedback'>🎉 Perfect! All sports matched to seasons.</div>" : "<div class='wrong-feedback'>⚠️ Some matches are missing or wrong.</div>";
    };
    initDragDrop();

    // Crossword (sports)
    function buildCrossword() {
        let gridHtml = '<div class="crossword-grid">';
        let predefined = [
            ['S','O','C','C','E','R'],
            ['','','','','','B'],
            ['T','E','N','N','I','S'],
            ['','','','','','K'],
            ['G','O','L','F','','T'],
            ['','','','','','B']
        ];
        for(let i=0;i<6;i++){
            for(let j=0;j<6;j++){
                let val = predefined[i][j] ? predefined[i][j] : '';
                let readonly = val ? 'readonly' : '';
                gridHtml += `<input type="text" maxlength="1" id="cell_${i}_${j}" value="${val}" style="text-transform:uppercase" ${readonly}>`;
            }
            gridHtml += `<div style="width:100%"></div>`;
        }
        gridHtml += '</div>';
        document.getElementById('crosswordGrid').innerHTML = gridHtml;
        let clues = `<strong>Clues:</strong> Across: Row0: popular sport with a round ball (SOCCER), Row2: sport played with a racket (TENNIS), Row4: sport with clubs and a small ball (GOLF). Down: Col5: sport played on ice (HOCKEY).`;
        document.getElementById('crosswordClues').innerHTML = clues;
    }
    document.getElementById('checkCrossword').onclick = () => {
        document.getElementById('crosswordResult').innerHTML = "<div class='correct-feedback'>✅ Check your answers with the clues.</div>";
    };
    buildCrossword();

    // Unscramble (sports)
    const sportsList = ["soccer", "tennis", "baseball", "hockey", "golf", "swimming"];
    let currentScramble = "";
    function getScrambled(w) { let arr = w.split(''); for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr.join(''); }
    function updateScramble() { currentScramble = sportsList[Math.floor(Math.random()*sportsList.length)]; document.getElementById("scrambleWord").innerText = getScrambled(currentScramble); document.getElementById("scrambleInput").value=""; document.getElementById("scrambleResult").innerHTML=""; }
    document.getElementById("checkScramble").onclick = () => { let ans = document.getElementById("scrambleInput").value.trim().toLowerCase(); if(ans === currentScramble) document.getElementById("scrambleResult").innerHTML="<div class='correct-feedback'>✅ Correct</div>"; else document.getElementById("scrambleResult").innerHTML=`<div class='wrong-feedback'>❌ Wrong: ${currentScramble}</div>`; };
    document.getElementById("newScramble").onclick = updateScramble;
    document.getElementById("speakScramble").onclick = () => speak(currentScramble);
    updateScramble();

    // Can/Can't practice
    const canQuestions = [
        { sentence: "______ you play the piano? (Can / Do)", answer: "Can" },
        { sentence: "She ______ sing very well. (can / can't)", answer: "can" },
        { sentence: "He ______ swim. He's scared of water. (can / can't)", answer: "can't" },
        { sentence: "______ he fix cars? (Can / Does)", answer: "Can" }
    ];
    let currentCan = 0;
    function updateCan() {
        currentCan = Math.floor(Math.random() * canQuestions.length);
        document.getElementById("canQuestion").innerHTML = canQuestions[currentCan].sentence;
        document.getElementById("canInput").value = "";
        document.getElementById("canResult").innerHTML = "";
    }
    document.getElementById("checkCan").onclick = () => {
        let ans = document.getElementById("canInput").value.trim().toLowerCase();
        if (ans === canQuestions[currentCan].answer.toLowerCase()) {
            document.getElementById("canResult").innerHTML = "<div class='correct-feedback'>✅ Correct!</div>";
        } else {
            document.getElementById("canResult").innerHTML = `<div class='wrong-feedback'>❌ Wrong. Correct: ${canQuestions[currentCan].answer}</div>`;
        }
    };
    document.getElementById("newCan").onclick = updateCan;
    updateCan();
</script>
</body>
</html>
