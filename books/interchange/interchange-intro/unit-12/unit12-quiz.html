<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Interchange Intro - Unit 12 Quiz</title>
    <style>
        body { background: linear-gradient(135deg, #2c3e50, #1a2632); margin: 0; padding: 20px; font-family: 'Segoe UI', 'OpenDyslexic', Arial, sans-serif; }
        .container { max-width: 1000px; margin: auto; background: #fef9e8; border-radius: 40px; padding: 30px; }
        h1 { color: #d35400; text-align: center; }
        .question { background: #fff5e6; padding: 15px; border-radius: 25px; margin: 15px 0; }
        button { background: #d35400; border: none; color: white; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-size: 1rem; margin-top: 20px; }
        .result { background: #e9ecef; padding: 20px; border-radius: 25px; margin-top: 20px; font-size: 1.2rem; }
        input, select { margin: 5px; padding: 8px; border-radius: 20px; border: 1px solid #ccc; }
        .img-quiz { max-width: 80px; display: block; margin-bottom: 10px; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Unit 12 Quiz - What's the matter? (50+ questions)</h1>
    <div id="quizContainer"></div>
    <button id="submitQuiz">Submit Quiz</button>
    <div id="quizResult" class="result"></div>
</div>
<script>
    const imageBase = "../images/";
    const questions = [];
    // Part 1: Body parts (10 questions)
    const body = ["head","eye","ear","nose","mouth","neck","arm","hand","leg","foot"];
    for (let i=0;i<10;i++) questions.push({ type:"short", text:`What body part do you use to ${body[i]==="head"?"think":body[i]==="eye"?"see":body[i]==="ear"?"hear":body[i]==="nose"?"smell":body[i]==="mouth"?"eat":body[i]==="neck"?"turn":body[i]==="arm"?"lift":body[i]==="hand"?"hold":body[i]==="leg"?"walk":"stand"}?`, answer:body[i] });
    // Part 2: Health problems (10 questions)
    const ailments = ["headache","stomachache","toothache","earache","cold","cough","fever","flu","sore throat","backache"];
    for (let i=0;i<10;i++) questions.push({ type:"short", text:`What do you have if your ${ailments[i]==="headache"?"head hurts":ailments[i]==="stomachache"?"stomach hurts":ailments[i]==="toothache"?"tooth hurts":ailments[i]==="earache"?"ear hurts":ailments[i]==="cold"?"nose is runny":ailments[i]==="cough"?"throat is itchy":ailments[i]==="fever"?"temperature is high":ailments[i]==="flu"?"body aches":ailments[i]==="sore throat"?"throat hurts":"back hurts"}?`, answer:ailments[i] });
    // Part 3: Have + noun / Feel + adjective (10 questions)
    const hf = [
        {text:"I ___ a headache.",ans:"have"},
        {text:"She ___ a fever.",ans:"has"},
        {text:"How do you ___?",ans:"feel"},
        {text:"I ___ terrible today.",ans:"feel"},
        {text:"He ___ the flu.",ans:"has"},
        {text:"They ___ a cold.",ans:"have"},
        {text:"I ___ sick.",ans:"feel"},
        {text:"She doesn't ___ well.",ans:"feel"},
        {text:"What's the ___?",ans:"matter"},
        {text:"What's ___?",ans:"wrong"}
    ];
    for (let i=0;i<10;i++) questions.push({ type:"short", text:hf[i].text, answer:hf[i].ans });
    // Part 4: Imperatives for advice (5 questions)
    const imp = [
        {text:"___ some rest.",ans:"Get"},
        {text:"___ lots of water.",ans:"Drink"},
        {text:"___ a doctor.",ans:"See"},
        {text:"___ any coffee.",ans:"Don't drink"},
        {text:"___ two aspirin.",ans:"Take"}
    ];
    for (let i=0;i<5;i++) questions.push({ type:"short", text:imp[i].text, answer:imp[i].ans });
    // Part 5: Conversation comprehension (5 questions)
    const conv = [
        {text:"What problem does Kyle have?",ans:"feels sick"},
        {text:"What does Steve offer Kyle?",ans:"soda"},
        {text:"Does Kyle want anything to drink?",ans:"no"},
        {text:"What is Steve going to eat?",ans:"pizza"},
        {text:"How does Kyle feel?",ans:"sick"}
    ];
    for (let i=0;i<5;i++) questions.push({ type:"short", text:conv[i].text, answer:conv[i].ans.toLowerCase() });
    // Part 6: Image-based (5 images)
    const imgNames = ["head","stomach","fever","doctor","medicine"];
    for (let i=0;i<5;i++) questions.push({ type:"img", img:imgNames[i]+".jpg", text:"What is this?", answer:imgNames[i] });
    // Part 7: True/False (5 questions)
    const tf = [["You should drink coffee when you have a cold.",false],["A headache means your head hurts.",true],["You can take aspirin for a toothache.",true],["Rest is good when you are sick.",true],["You should exercise a lot when you have the flu.",false]];
    for (let i=0;i<5;i++) questions.push({ type:"tf", text:tf[i][0], answer:tf[i][1]?"true":"false" });
    // Part 8: Short answer (5 questions)
    const short = [
        {text:"What do you say when someone is sick? (I hope you feel ___)",ans:"better"},
        {text:"Name a medication for a headache.",ans:"aspirin"},
        {text:"What body part is in your mouth?",ans:"tongue"},
        {text:"What does a dentist treat?",ans:"toothache"},
        {text:"What does a thermometer measure?",ans:"fever"}
    ];
    for (let i=0;i<5;i++) questions.push({ type:"short", text:short[i].text, answer:short[i].ans });
    // Build HTML
    function buildQuiz() {
        let html='';
        questions.forEach((q,idx)=>{
            html+=`<div class="question"><strong>${idx+1}. `;
            if(q.type==='img') html+=`<img src="${imageBase+q.img}" class="img-quiz" onerror="this.onerror=null;this.parentElement.innerHTML+='🩺';">${q.text}`;
            else html+=q.text;
            html+=`</strong><br>`;
            if(q.type==='mc'){
                q.options.forEach(opt=>{ html+=`<label><input type="radio" name="q${idx}" value="${opt}"> ${opt}</label> `; });
            } else if(q.type==='tf'){
                html+=`<label><input type="radio" name="q${idx}" value="true"> True</label> <label><input type="radio" name="q${idx}" value="false"> False</label>`;
            } else {
                html+=`<input type="text" name="q${idx}" placeholder="Type answer">`;
            }
            html+=`</div>`;
        });
        document.getElementById('quizContainer').innerHTML=html;
    }
    function submitQuiz(){
        let score=0;
        for(let i=0;i<questions.length;i++){
            let q=questions[i], ans=null;
            if(q.type==='mc'||q.type==='tf'){
                let radios=document.querySelectorAll(`input[name="q${i}"]`);
                for(let r of radios) if(r.checked){ ans=r.value; break; }
            } else {
                let inp=document.querySelector(`input[name="q${i}"]`);
                if(inp) ans=inp.value.trim().toLowerCase();
            }
            if(ans===q.answer.toLowerCase()) score++;
        }
        let percent=(score/questions.length)*100;
        let msg=`You got ${score}/${questions.length} (${percent}%). `;
        if(percent>=90) msg+="Excellent!";
        else if(percent>=75) msg+="Very good!";
        else if(percent>=60) msg+="Good. Review some points.";
        else msg+="Need more practice.";
        document.getElementById('quizResult').innerHTML=msg;
    }
    buildQuiz();
    document.getElementById('submitQuiz').onclick=submitQuiz;
</script>
</body>
</html>
