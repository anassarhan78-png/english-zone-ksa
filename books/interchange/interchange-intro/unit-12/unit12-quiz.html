<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Interchange Intro - Unit 12 Quiz (50 Questions)</title>
    <style>
        body { background: linear-gradient(135deg, #2c3e50, #1a2632); margin: 0; padding: 20px; font-family: 'Segoe UI', 'OpenDyslexic', Arial, sans-serif; }
        .container { max-width: 1000px; margin: auto; background: #fef9e8; border-radius: 40px; padding: 30px; }
        h1 { color: #d35400; text-align: center; }
        .question { background: #fff5e6; padding: 15px; border-radius: 25px; margin: 15px 0; }
        button { background: #d35400; border: none; color: white; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-size: 1rem; margin-top: 20px; }
        .result { background: #e9ecef; padding: 20px; border-radius: 25px; margin-top: 20px; font-size: 1.2rem; }
        input, select { margin: 5px; padding: 8px; border-radius: 20px; border: 1px solid #ccc; }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Unit 12 Quiz - What's the matter? (50 questions)</h1>
    <div id="quizContainer"></div>
    <button id="submitQuiz">Submit Quiz</button>
    <div id="quizResult" class="result"></div>
</div>
<script>
    const questions = [];

    // Part 1: Body parts (10 questions)
    const bodyParts = ["head", "eye", "ear", "nose", "mouth", "neck", "arm", "hand", "leg", "foot"];
    for (let i = 0; i < 10; i++) {
        questions.push({
            type: "mc",
            text: `What body part do you use to ${bodyParts[i] === "eye" ? "see" : bodyParts[i] === "ear" ? "hear" : bodyParts[i] === "nose" ? "smell" : bodyParts[i] === "mouth" ? "eat" : bodyParts[i] === "neck" ? "turn your head" : bodyParts[i] === "arm" ? "lift things" : bodyParts[i] === "hand" ? "hold things" : bodyParts[i] === "leg" ? "walk" : bodyParts[i] === "foot" ? "stand" : "think"}?`,
            options: [bodyParts[i], "stomach", "back"],
            answer: bodyParts[i]
        });
    }

    // Part 2: Health problems (10 questions)
    const healthProblems = ["headache", "stomachache", "toothache", "earache", "cold", "cough", "fever", "flu", "sore throat", "backache"];
    for (let i = 0; i < 10; i++) {
        questions.push({
            type: "mc",
            text: `What do you have if your ${healthProblems[i] === "headache" ? "head hurts" : healthProblems[i] === "stomachache" ? "stomach hurts" : healthProblems[i] === "toothache" ? "tooth hurts" : healthProblems[i] === "earache" ? "ear hurts" : healthProblems[i] === "cold" ? "nose is runny" : healthProblems[i] === "cough" ? "throat is itchy" : healthProblems[i] === "fever" ? "temperature is high" : healthProblems[i] === "flu" ? "body aches" : healthProblems[i] === "sore throat" ? "throat hurts" : "back hurts"}?`,
            options: [healthProblems[i], "a cold", "a rash"],
            answer: healthProblems[i]
        });
    }

    // Part 3: Have + noun / Feel + adjective (10 questions)
    const symptomQuestions = [
        { text: "I ______ a headache.", options: ["have", "has", "am"], answer: "have" },
        { text: "She ______ a fever.", options: ["have", "has", "is"], answer: "has" },
        { text: "How do you ______?", options: ["have", "feel", "are"], answer: "feel" },
        { text: "I ______ terrible today.", options: ["have", "feel", "am"], answer: "feel" },
        { text: "He ______ the flu.", options: ["have", "has", "is"], answer: "has" },
        { text: "They ______ a cold.", options: ["have", "has", "are"], answer: "have" },
        { text: "I ______ sick.", options: ["have", "feel", "am"], answer: "feel" },
        { text: "She doesn't ______ well.", options: ["have", "feel", "be"], answer: "feel" },
        { text: "What's the ______?", options: ["problem", "matter", "wrong"], answer: "matter" },
        { text: "What's ______?", options: ["matter", "wrong", "problem"], answer: "wrong" }
    ];
    for (let i = 0; i < 10; i++) {
        questions.push({
            type: "mc",
            text: symptomQuestions[i].text,
            options: symptomQuestions[i].options,
            answer: symptomQuestions[i].answer
        });
    }

    // Part 4: Imperatives for advice (10 questions)
    const adviceQuestions = [
        { text: "______ some rest.", options: ["Get", "Take", "Do"], answer: "Get" },
        { text: "______ lots of water.", options: ["Drink", "Eat", "Take"], answer: "Drink" },
        { text: "______ a doctor.", options: ["See", "Look", "Watch"], answer: "See" },
        { text: "______ to bed early.", options: ["Go", "Come", "Walk"], answer: "Go" },
        { text: "______ any coffee.", options: ["Don't drink", "Not drink", "No drink"], answer: "Don't drink" },
        { text: "______ two aspirin.", options: ["Take", "Eat", "Drink"], answer: "Take" },
        { text: "______ work too hard.", options: ["Don't", "Not", "No"], answer: "Don't" },
        { text: "______ your hands often.", options: ["Wash", "Clean", "Dry"], answer: "Wash" },
        { text: "______ a dentist.", options: ["Call", "Go", "Look"], answer: "Call" },
        { text: "______ up late.", options: ["Don't stay", "Not stay", "No stay"], answer: "Don't stay" }
    ];
    for (let i = 0; i < 10; i++) {
        questions.push({
            type: "mc",
            text: adviceQuestions[i].text,
            options: adviceQuestions[i].options,
            answer: adviceQuestions[i].answer
        });
    }

    // Part 5: Reading comprehension (5 questions based on conversation)
    for (let i = 0; i < 5; i++) {
        questions.push({
            type: "mc",
            text: `(Reading) ${i===0?"What problem does Kyle have?":i===1?"What does Steve offer Kyle?":i===2?"Does Kyle want anything to drink?":i===3?"What is Steve going to eat?":i===4?"How does Kyle feel?"}`,
            options: i===0?["A headache","The flu","He feels sick"]:i===1?["Pizza","Soda","Medicine"]:i===2?["Yes","No","Maybe"]:i===3?["Pizza","Salad","Sandwich"]:i===4?["Great","Sick","Happy"],
            answer: i===0?"He feels sick":i===1?"Soda":i===2?"No":i===3?"Pizza":i===4?"Sick"
        });
    }

    // Part 6: True/False (5 questions)
    const tfQuestions = [
        { text: "You should drink coffee when you have a cold.", answer: "false" },
        { text: "A headache means your head hurts.", answer: "true" },
        { text: "You can take aspirin for a toothache.", answer: "true" },
        { text: "Rest is good when you are sick.", answer: "true" },
        { text: "You should exercise a lot when you have the flu.", answer: "false" }
    ];
    for (let i = 0; i < 5; i++) {
        questions.push({
            type: "tf",
            text: tfQuestions[i].text,
            answer: tfQuestions[i].answer
        });
    }

    // Build HTML
    function buildQuiz() {
        const container = document.getElementById('quizContainer');
        let html = '';
        questions.forEach((q, idx) => {
            html += `<div class="question"><strong>${idx+1}. ${q.text}</strong><br>`;
            if (q.type === 'mc') {
                q.options.forEach(opt => {
                    html += `<label><input type="radio" name="q${idx}" value="${opt}"> ${opt}</label> `;
                });
            } else if (q.type === 'tf') {
                html += `<label><input type="radio" name="q${idx}" value="true"> True</label> `;
                html += `<label><input type="radio" name="q${idx}" value="false"> False</label>`;
            }
            html += `</div>`;
        });
        container.innerHTML = html;
    }

    function submitQuiz() {
        let score = 0;
        for (let i = 0; i < questions.length; i++) {
            const q = questions[i];
            let userAnswer = null;
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            for (let r of radios) {
                if (r.checked) { userAnswer = r.value; break; }
            }
            if (userAnswer === q.answer) score++;
        }
        const percent = (score / questions.length) * 100;
        let message = `You got ${score} out of ${questions.length} (${percent}%). `;
        if (percent >= 90) message += "Excellent! You are a master of health vocabulary and giving advice.";
        else if (percent >= 75) message += "Very good! Review a few points and you'll be perfect.";
        else if (percent >= 60) message += "Good. Study the unit again, especially imperatives and 'have/feel'.";
        else message += "You need more practice. Go through the activities and try again.";
        document.getElementById('quizResult').innerHTML = message;
    }

    buildQuiz();
    document.getElementById('submitQuiz').onclick = submitQuiz;
</script>
</body>
</html>
