<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Interchange Intro - Unit 1 Quiz (Extended)</title>
    <style>
        body { background: linear-gradient(135deg, #2c3e50, #1a2632); margin: 0; padding: 20px; font-family: 'Segoe UI', 'OpenDyslexic', Arial, sans-serif; }
        .container { max-width: 1000px; margin: auto; background: #fef9e8; border-radius: 40px; padding: 30px; }
        h1 { color: #d35400; text-align: center; }
        .question { background: #fff5e6; padding: 15px; border-radius: 25px; margin: 15px 0; }
        button { background: #d35400; border: none; color: white; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-size: 1rem; margin-top: 20px; }
        .result { background: #e9ecef; padding: 20px; border-radius: 25px; margin-top: 20px; font-size: 1.2rem; }
        input, select { margin: 5px; padding: 8px; border-radius: 20px; border: 1px solid #ccc; }
        .img-quiz { max-width: 80px; vertical-align: middle; margin-left: 10px; border-radius: 10px; display: block; margin-bottom: 10px; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Unit 1 Quiz - It's nice to meet you (50+ questions)</h1>
    <div id="quizContainer"></div>
    <button id="submitQuiz">Submit Quiz</button>
    <div id="quizResult" class="result"></div>
</div>
<script>
    const imageBase = "../images/";
    const questions = [];

    // Part 1: Vocabulary (10 questions)
    const vocab = ["name", "first", "last", "teacher", "student", "book", "class", "phone number", "Miss", "Mr."];
    for (let i = 0; i < 10; i++) {
        questions.push({
            type: "mc",
            text: `What is the English word for "${vocab[i] === "name" ? "اسم" : vocab[i] === "first" ? "أول" : vocab[i] === "last" ? "أخير" : vocab[i] === "teacher" ? "معلم" : vocab[i] === "student" ? "طالب" : vocab[i] === "book" ? "كتاب" : vocab[i] === "class" ? "صف" : vocab[i] === "phone number" ? "رقم هاتف" : vocab[i] === "Miss" ? "آنسة" : "سيد"}?`,
            options: [vocab[i], "hello", "goodbye"],
            answer: vocab[i]
        });
    }

    // Part 2: Titles (5 questions)
    const titles = ["Miss", "Mr.", "Mrs.", "Ms."];
    const titleDesc = ["unmarried woman", "man (any)", "married woman", "woman (any)"];
    for (let i = 0; i < 4; i++) {
        questions.push({
            type: "mc",
            text: `Which title is used for a ${titleDesc[i]}?`,
            options: titles,
            answer: titles[i]
        });
    }

    // Part 3: Verb "be" (10 questions)
    const beQuestions = [
        { text: "I ______ a student.", options: ["am", "is", "are"], answer: "am" },
        { text: "She ______ a teacher.", options: ["am", "is", "are"], answer: "is" },
        { text: "They ______ in class.", options: ["am", "is", "are"], answer: "are" },
        { text: "He ______ over there.", options: ["am", "is", "are"], answer: "is" },
        { text: "We ______ friends.", options: ["am", "is", "are"], answer: "are" },
        { text: "What ______ your name?", options: ["am", "is", "are"], answer: "is" },
        { text: "Where ______ you from?", options: ["am", "is", "are"], answer: "are" },
        { text: "It ______ a book.", options: ["am", "is", "are"], answer: "is" },
        { text: "______ you Jennifer?", options: ["Am", "Is", "Are"], answer: "Are" },
        { text: "______ he a teacher?", options: ["Am", "Is", "Are"], answer: "Is" }
    ];
    for (let i = 0; i < 10; i++) {
        questions.push({
            type: "mc",
            text: beQuestions[i].text,
            options: beQuestions[i].options,
            answer: beQuestions[i].answer
        });
    }

    // Part 4: Possessives (my, your, his, her) – 5 questions
    const possQuestions = [
        { text: "This is ______ book. (I)", options: ["my", "your", "his"], answer: "my" },
        { text: "What's ______ name? (you)", options: ["my", "your", "her"], answer: "your" },
        { text: "______ name is Michael. (he)", options: ["His", "Her", "My"], answer: "His" },
        { text: "______ name is Jennifer. (she)", options: ["His", "Her", "Your"], answer: "Her" },
        { text: "This is ______ class. (we)", options: ["our", "their", "my"], answer: "our" }
    ];
    for (let i = 0; i < 5; i++) {
        questions.push({
            type: "mc",
            text: possQuestions[i].text,
            options: possQuestions[i].options,
            answer: possQuestions[i].answer
        });
    }

    // Part 5: Numbers (5 questions)
    const numbers = ["one", "two", "three", "four", "five"];
    for (let i = 0; i < 5; i++) {
        questions.push({
            type: "short",
            text: `Write the number: ${i+1} →`,
            answer: numbers[i]
        });
    }

    // Part 6: Conversation comprehension (5 questions based on page 2)
    const convQuestions = [
        { text: "What is Michael's last name?", options: ["Ota", "Miller", "Jennifer"], answer: "Ota" },
        { text: "What is Jennifer's last name?", options: ["Ota", "Miller", "Michael"], answer: "Miller" },
        { text: "How does Michael apologize?", options: ["I'm sorry", "Excuse me", "Thank you"], answer: "I'm sorry" },
        { text: "What does Michael ask to repeat?", options: ["first name", "last name", "phone number"], answer: "last name" },
        { text: "What do they say to each other?", options: ["Nice to meet you", "Goodbye", "Hello"], answer: "Nice to meet you" }
    ];
    for (let i = 0; i < 5; i++) {
        questions.push({
            type: "mc",
            text: convQuestions[i].text,
            options: convQuestions[i].options,
            answer: convQuestions[i].answer
        });
    }

    // Part 7: Short answer (5 questions)
    const shortAnswers = [
        { text: "How do you say 'معلم' in English?", answer: "teacher" },
        { text: "What is the title for a married woman?", answer: "Mrs." },
        { text: "Write the contraction of 'I am'.", answer: "I'm" },
        { text: "What is the opposite of 'first'?", answer: "last" },
        { text: "What do you say when you meet someone for the first time?", answer: "nice to meet you" }
    ];
    for (let i = 0; i < 5; i++) {
        questions.push({
            type: "short",
            text: shortAnswers[i].text,
            answer: shortAnswers[i].answer
        });
    }

    // Part 8: True/False (5 questions)
    const tf = [
        { text: "Ms. is used only for married women.", answer: "false" },
        { text: "The contraction of 'you are' is 'you're'.", answer: "true" },
        { text: "'Phone number' is two words.", answer: "true" },
        { text: "'Classmate' means a person who teaches.", answer: "false" },
        { text: "In the U.S., it's polite to say 'Nice to meet you'.", answer: "true" }
    ];
    for (let i = 0; i < 5; i++) {
        questions.push({
            type: "tf",
            text: tf[i].text,
            answer: tf[i].answer
        });
    }

    // Part 9: Image-based (5 images – use existing files)
    const imgNames = ["jennifer", "michael", "teacher", "book", "classroom"];
    const imgAnswers = ["Jennifer", "Michael", "teacher", "book", "class"];
    for (let i = 0; i < 5; i++) {
        questions.push({
            type: "img",
            img: imgNames[i] + ".jpg",
            text: "What is this? (write one word)",
            answer: imgAnswers[i].toLowerCase()
        });
    }

    // Build HTML
    function buildQuiz() {
        const container = document.getElementById('quizContainer');
        let html = '';
        questions.forEach((q, idx) => {
            html += `<div class="question"><strong>${idx+1}. `;
            if (q.type === 'img') {
                html += `<img src="${imageBase + q.img}" class="img-quiz" onerror="this.src='https://placehold.co/100x100?text=No+Image'"><br>${q.text}`;
            } else {
                html += q.text;
            }
            html += `</strong><br>`;
            if (q.type === 'mc') {
                q.options.forEach(opt => {
                    html += `<label><input type="radio" name="q${idx}" value="${opt}"> ${opt}</label> `;
                });
            } else if (q.type === 'tf') {
                html += `<label><input type="radio" name="q${idx}" value="true"> True</label> `;
                html += `<label><input type="radio" name="q${idx}" value="false"> False</label>`;
            } else if (q.type === 'short' || q.type === 'img') {
                html += `<input type="text" name="q${idx}" placeholder="Type your answer">`;
            }
            html += `</div>`;
        });
        container.innerHTML = html;
    }

    function submitQuiz() {
        let score = 0;
        for (let i = 0; i < questions.length; i++) {
            const q = questions[i];
            let userAnswer = null;
            if (q.type === 'mc' || q.type === 'tf') {
                const radios = document.querySelectorAll(`input[name="q${i}"]`);
                for (let r of radios) {
                    if (r.checked) { userAnswer = r.value; break; }
                }
            } else {
                const input = document.querySelector(`input[name="q${i}"]`);
                if (input) userAnswer = input.value.trim().toLowerCase();
            }
            if (userAnswer === q.answer.toLowerCase()) score++;
        }
        const percent = (score / questions.length) * 100;
        let message = `You got ${score} out of ${questions.length} (${percent}%). `;
        if (percent >= 90) message += "Excellent! You're ready for Unit 2.";
        else if (percent >= 75) message += "Very good! Review a few points and try again.";
        else if (percent >= 60) message += "Good. Study the vocabulary and grammar again.";
        else message += "You need more practice. Go through the unit again.";
        document.getElementById('quizResult').innerHTML = message;
    }

    buildQuiz();
    document.getElementById('submitQuiz').onclick = submitQuiz;
</script>
</body>
</html>
