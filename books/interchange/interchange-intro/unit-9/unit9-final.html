<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interchange Intro - Unit 9 Dictation Games</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #2c3e50, #1a2632); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: #fef9e8; border-radius: 40px; padding: 20px; }
        h1 { color: #d35400; text-align: center; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 25px; }
        .game-card { background: #fff5e6; border-radius: 35px; padding: 20px; border: 1px solid #f0c0a0; }
        .game-card h2 { background: #d35400; display: inline-block; padding: 5px 18px; border-radius: 40px; color: white; }
        button { background: #d35400; border: none; color: white; padding: 8px 16px; border-radius: 50px; cursor: pointer; margin: 5px; }
        input, select { padding: 8px; border-radius: 30px; border: 1px solid #ccc; margin: 5px; width: 200px; }
        .correct { background: #c8e6d9; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .wrong { background: #ffe0e0; padding: 8px; border-radius: 20px; margin-top: 10px; }
        canvas { background: #f0f0f0; border-radius: 20px; margin: 10px auto; display: block; }
        .word-list { background: #e9ecef; padding: 12px; border-radius: 28px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .word-list span { background: white; padding: 4px 12px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>Unit 9: Do we need any eggs? - Dictation Games</h1>
    <div class="word-list">
        <span>apple</span> <span>banana</span> <span>bread</span> <span>rice</span> <span>chicken</span> <span>fish</span> <span>milk</span> <span>cheese</span>
        <span>egg</span> <span>tomato</span> <span>carrot</span> <span>lettuce</span> <span>coffee</span> <span>tea</span> <span>cake</span> <span>cookie</span>
    </div>
    <div class="games-grid">
        <div class="game-card"><h2>Hangman</h2><canvas id="hangmanCanvas" width="250" height="180"></canvas><div id="hangmanWord" style="font-size:28px; letter-spacing:8px;"></div><div id="hangmanMessage"></div><div id="hangmanLetters"></div><button id="newHangmanGame">New Word</button></div>
        <div class="game-card"><h2>Missing Letter</h2><div id="missingQuestion"></div><input id="missingInput" maxlength="1"><button id="checkMissing">Check</button><div id="missingResult"></div><button id="newMissing">New</button></div>
        <div class="game-card"><h2>Match</h2><div id="matchQuestion"></div><select id="matchSelect"></select><button id="checkMatch">Check</button><div id="matchResult"></div><button id="newMatch">New</button></div>
        <div class="game-card"><h2>Fill Gap</h2><div id="fillSentence"></div><input id="fillInput"><button id="checkFill">Check</button><div id="fillResult"></div><button id="newFill">New</button></div>
        <div class="game-card"><h2>Classic Dictation</h2><div id="dictIcon">🍎</div><button id="speakDict">Speak</button><input id="dictInput"><button id="checkDict">Check</button><div id="dictResult"></div><button id="newDict">New</button></div>
    </div>
</div>
<script>
const words = ["apple","banana","bread","rice","chicken","fish","milk","cheese","egg","tomato","carrot","lettuce","coffee","tea","cake","cookie"];
const sentences = { apple:"I eat an apple.", banana:"She likes bananas.", bread:"We need bread.", rice:"Rice is a grain.", chicken:"Chicken is protein.", fish:"Fish is healthy.", milk:"Do you have milk?", cheese:"Cheese from milk.", egg:"I have an egg.", tomato:"Tomatoes are fruits.", carrot:"Carrots are vegetables.", lettuce:"Lettuce in salad.", coffee:"I drink coffee.", tea:"Green tea is popular.", cake:"Let's eat cake!", cookie:"I love cookies." };
function speak(t){let u=new SpeechSynthesisUtterance(t);u.lang="en-US";speechSynthesis.cancel();speechSynthesis.speak(u);}
let hangmanWord="",guessedLetters=[],wrongGuesses=0;
const canvas=document.getElementById("hangmanCanvas"),ctx=canvas.getContext("2d");
function drawHangman(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.lineWidth=3;ctx.strokeStyle="#333";ctx.beginPath();ctx.moveTo(30,160);ctx.lineTo(220,160);ctx.stroke();ctx.moveTo(60,160);ctx.lineTo(60,20);ctx.stroke();ctx.moveTo(60,20);ctx.lineTo(150,20);ctx.stroke();ctx.moveTo(150,20);ctx.lineTo(150,40);ctx.stroke();if(wrongGuesses>0){ctx.beginPath();ctx.arc(150,55,15,0,Math.PI*2);ctx.stroke();}if(wrongGuesses>1){ctx.beginPath();ctx.moveTo(150,70);ctx.lineTo(150,110);ctx.stroke();}if(wrongGuesses>2){ctx.beginPath();ctx.moveTo(150,80);ctx.lineTo(130,100);ctx.stroke();}if(wrongGuesses>3){ctx.beginPath();ctx.moveTo(150,80);ctx.lineTo(170,100);ctx.stroke();}if(wrongGuesses>4){ctx.beginPath();ctx.moveTo(150,110);ctx.lineTo(130,140);ctx.stroke();}if(wrongGuesses>5){ctx.beginPath();ctx.moveTo(150,110);ctx.lineTo(170,140);ctx.stroke();}}
function updateHangmanDisplay(){let display=hangmanWord.split('').map(l=>guessedLetters.includes(l)?l:'_').join(' ');document.getElementById("hangmanWord").innerText=display;drawHangman();let msg=document.getElementById("hangmanMessage");if(display.replace(/ /g,'')===hangmanWord){msg.innerHTML="<span style='color:green'>You won!</span>";disableHangmanLetters(true);}else if(wrongGuesses>=6){msg.innerHTML=`<span style='color:red'>Game over! Word: ${hangmanWord}</span>`;disableHangmanLetters(true);}else{msg.innerHTML="";disableHangmanLetters(false);}}
function disableHangmanLetters(disabled){document.querySelectorAll("#hangmanLetters button").forEach(btn=>btn.disabled=disabled);}
function newHangmanGame(){hangmanWord=words[Math.floor(Math.random()*words.length)];guessedLetters=[];wrongGuesses=0;updateHangmanDisplay();generateHangmanLetters();}
function generateHangmanLetters(){const div=document.getElementById("hangmanLetters");div.innerHTML="";"abcdefghijklmnopqrstuvwxyz".split('').forEach(l=>{let btn=document.createElement("button");btn.innerText=l;btn.onclick=()=>{if(guessedLetters.includes(l))return;guessedLetters.push(l);if(hangmanWord.includes(l))updateHangmanDisplay();else{wrongGuesses++;updateHangmanDisplay();}btn.disabled=true;};div.appendChild(btn);});}
document.getElementById("newHangmanGame").onclick=newHangmanGame;newHangmanGame();
let missingWord="",missingIndex=0;
function updateMissing(){missingWord=words[Math.floor(Math.random()*words.length)];missingIndex=Math.floor(Math.random()*missingWord.length);let display=missingWord.split('').map((c,i)=>i===missingIndex?'___':c).join('');document.getElementById("missingQuestion").innerHTML=`<div style="font-size:1.8rem;">${display}</div>`;document.getElementById("missingInput").value="";document.getElementById("missingResult").innerHTML="";}
document.getElementById("checkMissing").onclick=()=>{let ans=document.getElementById("missingInput").value.trim().toLowerCase();if(ans===missingWord[missingIndex])document.getElementById("missingResult").innerHTML="<div class='correct'>Correct!</div>";else document.getElementById("missingResult").innerHTML=`<div class='wrong'>Wrong! Letter: ${missingWord[missingIndex]}</div>`;};
document.getElementById("newMissing").onclick=updateMissing;updateMissing();
let matchWord="";
function updateMatch(){matchWord=words[Math.floor(Math.random()*words.length)];document.getElementById("matchQuestion").innerHTML=`<div style="font-size:1.5rem;">Match: ______</div>`;let select=document.getElementById("matchSelect");select.innerHTML="";let opts=[...words].sort(()=>Math.random()-0.5);opts.forEach(w=>{let opt=document.createElement("option");opt.value=w;opt.innerText=w;select.appendChild(opt);});document.getElementById("matchResult").innerHTML="";}
document.getElementById("checkMatch").onclick=()=>{let selected=document.getElementById("matchSelect").value;if(selected===matchWord)document.getElementById("matchResult").innerHTML="<div class='correct'>Correct match!</div>";else document.getElementById("matchResult").innerHTML=`<div class='wrong'>Wrong! Correct: ${matchWord}</div>`;};
document.getElementById("newMatch").onclick=updateMatch;updateMatch();
let fillWord="";
function updateFill(){fillWord=words[Math.floor(Math.random()*words.length)];let sentence=sentences[fillWord];let blank=sentence.replace(fillWord,'______');document.getElementById("fillSentence").innerHTML=`<div style="font-size:1.2rem;">${blank}</div>`;document.getElementById("fillInput").value="";document.getElementById("fillResult").innerHTML="";}
document.getElementById("checkFill").onclick=()=>{let ans=document.getElementById("fillInput").value.trim().toLowerCase();if(ans===fillWord)document.getElementById("fillResult").innerHTML="<div class='correct'>Correct!</div>";else document.getElementById("fillResult").innerHTML=`<div class='wrong'>Wrong! Correct: ${fillWord}</div>`;};
document.getElementById("newFill").onclick=updateFill;updateFill();
let dictWord="";
function updateDict(){dictWord=words[Math.floor(Math.random()*words.length)];document.getElementById("dictIcon").innerHTML=`🍽️ ${dictWord}`;document.getElementById("dictInput").value="";document.getElementById("dictResult").innerHTML="";}
document.getElementById("speakDict").onclick=()=>speak(dictWord);
document.getElementById("checkDict").onclick=()=>{let ans=document.getElementById("dictInput").value.trim().toLowerCase();if(ans===dictWord)document.getElementById("dictResult").innerHTML="<div class='correct'>Correct!</div>";else document.getElementById("dictResult").innerHTML=`<div class='wrong'>Wrong! Correct: ${dictWord}</div>`;};
document.getElementById("newDict").onclick=updateDict;updateDict();
</script>
</body>
</html>
