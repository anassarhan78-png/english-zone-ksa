<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 9 Rubric</title>
    <style>
        body { background: linear-gradient(135deg, #2c3e50, #1a2632); margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 800px; margin: auto; background: #fef9e8; border-radius: 40px; padding: 30px; }
        h1 { color: #d35400; text-align: center; }
        .criteria { margin: 20px 0; padding: 15px; background: #fff5e6; border-radius: 25px; }
        .slider { width: 100%; }
        button { background: #d35400; border: none; color: white; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
        .result { background: #e9ecef; padding: 20px; border-radius: 25px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Self Assessment Rubric - Unit 9</h1>
    <div><div class="criteria"><strong>Vocabulary (Foods)</strong><br><input type="range" min="1" max="5" value="3" id="v1"></div>
    <div class="criteria"><strong>Count/Noncount Nouns</strong><br><input type="range" min="1" max="5" value="3" id="v2"></div>
    <div class="criteria"><strong>Some / Any</strong><br><input type="range" min="1" max="5" value="3" id="v3"></div>
    <div class="criteria"><strong>Adverbs of Frequency</strong><br><input type="range" min="1" max="5" value="3" id="v4"></div>
    <div class="criteria"><strong>Speaking Fluency</strong><br><input type="range" min="1" max="5" value="3" id="v5"></div>
    <div class="criteria"><strong>Writing Clarity</strong><br><input type="range" min="1" max="5" value="3" id="v6"></div>
    <div class="criteria"><strong>Listening Comprehension</strong><br><input type="range" min="1" max="5" value="3" id="v7"></div>
    <div class="criteria"><strong>Effort & Participation</strong><br><input type="range" min="1" max="5" value="3" id="v8"></div></div>
    <button id="calculate">Calculate My Score</button>
    <div id="result" class="result"></div>
</div>
<script>
document.getElementById('calculate').onclick=()=>{let total=0;for(let i=1;i<=8;i++)total+=parseInt(document.getElementById('v'+i).value);let percent=(total/40)*100;let level="";if(percent>=90)level="Advanced";else if(percent>=75)level="Intermediate High";else if(percent>=60)level="Intermediate";else if(percent>=40)level="Beginner";else level="Needs Improvement";document.getElementById('result').innerHTML=`Total: ${total}/40 (${percent}%)<br>Level: ${level}`;};
</script>
</body>
</html>
