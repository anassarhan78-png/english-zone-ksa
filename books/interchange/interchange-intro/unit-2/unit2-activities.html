<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Interchange Intro - Unit 2 Extra Activities</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', 'OpenDyslexic', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #2c3e50, #1a2632); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: #fef9e8; border-radius: 45px; padding: 20px 30px; }
        h1 { color: #d35400; text-align: center; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .card { background: #fff5e6; border-radius: 35px; padding: 20px; border: 1px solid #f0c0a0; }
        .card h2 { background: #d35400; display: inline-block; padding: 5px 20px; border-radius: 40px; color: white; font-size: 1.3rem; }
        button { background: #d35400; border: none; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; margin: 5px; }
        input, select { padding: 8px; border-radius: 30px; border: 1px solid #ccc; margin: 5px; }
        .correct-feedback { background: #c8e6d9; border-left: 6px solid #2e7d64; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .wrong-feedback { background: #ffe0e0; border-left: 6px solid #d9534f; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .drag-word { background: #2c7da0; color: white; padding: 10px 20px; border-radius: 40px; cursor: grab; display: inline-block; margin: 5px; }
        .drop-zone { border: 2px dashed #d35400; border-radius: 20px; padding: 12px; min-width: 120px; text-align: center; background: #fff0e0; display: inline-block; margin: 6px; }
        .crossword-grid { display: grid; grid-template-columns: repeat(6, 45px); gap: 4px; justify-content: center; background: #f0f0f0; padding: 15px; border-radius: 20px; }
        .crossword-grid input { width: 45px; height: 45px; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <h1>📖 Interchange Intro - Unit 2 🎲 Extra Activities</h1>
    <div class="activity-grid">
        <div class="card"><h2>🖱️ Drag & Drop: Match word to image</h2><div id="dragDropArea"></div><button id="checkDragDrop">Check All</button><div id="dragDropResult"></div></div>
        <div class="card"><h2>🔠 Crossword</h2><div id="crosswordGrid"></div><div id="crosswordClues" style="margin-top:10px;"></div><button id="checkCrossword">Check</button><div id="crosswordResult"></div></div>
        <div class="card"><h2>🔀 Unscramble</h2><div id="scrambleWord" style="font-size:1.8rem; background:#fff0d6; padding:12px; border-radius:30px;"></div><input id="scrambleInput"><button id="checkScramble">Check</button><button id="newScramble">New</button><div id="scrambleResult"></div><button id="speakScramble">🔊 Speak</button></div>
        <div class="card"><h2>📍 Prepositions Practice</h2><div id="prepQuestion">The book is ______ the desk.</div><select id="prepSelect"><option value="in">in</option><option value="on">on</option><option value="under">under</option><option value="behind">behind</option><option value="next to">next to</option></select><button id="checkPrep">Check</button><button id="newPrep">Next</button><div id="prepResult"></div></div>
    </div>
</div>
<script>
    const items = ["book","pen","desk","chair","map","clock"];
    function imgTag(word) { let name=word.replace(/ /g,'-').toLowerCase(); return `<img src="../images/${name}.jpg" style="width:50px; border-radius:10px;" onerror="this.onerror=null;this.parentElement.innerHTML+='🔍';">`; }
    function speak(t){ let u=new SpeechSynthesisUtterance(t); u.lang="en-US"; speechSynthesis.cancel(); speechSynthesis.speak(u); }
    // Drag & Drop
    let selected=null;
    function initDragDrop(){
        let c=document.getElementById('dragDropArea');
        c.innerHTML='<div><strong>Click a word, then click its image</strong></div><div style="display:flex;flex-wrap:wrap;gap:15px;margin:10px 0;">';
        items.forEach(it=>{ let btn=document.createElement('button'); btn.innerText=it; btn.classList.add('drag-word'); btn.onclick=()=>{ selected=it; }; c.appendChild(btn); });
        c.innerHTML+='</div><div style="display:flex;flex-wrap:wrap;gap:20px;margin-top:20px;">';
        items.forEach(it=>{ let zone=document.createElement('div'); zone.classList.add('drop-zone'); zone.setAttribute('data-word',it); zone.innerHTML=`${imgTag(it)}<br><span class="drop-label">???</span>`; zone.onclick=()=>{ if(selected && selected===it){ zone.querySelector('.drop-label').innerText=selected; zone.style.background="#c8e6d9"; selected=null; } else if(selected) alert(`Wrong! ${selected} is not this image.`); else alert("Click a word first."); }; c.appendChild(zone); });
        c.innerHTML+='</div>';
    }
    document.getElementById('checkDragDrop').onclick=()=>{ let ok=true; document.querySelectorAll('#dragDropArea .drop-zone').forEach(z=>{ if(z.querySelector('.drop-label').innerText !== z.getAttribute('data-word')) ok=false; }); document.getElementById('dragDropResult').innerHTML=ok?"<div class='correct-feedback'>Perfect!</div>":"<div class='wrong-feedback'>Some wrong.</div>"; };
    initDragDrop();
    // Crossword
    function buildCrossword(){
        let gridHtml='<div class="crossword-grid">';
        let pre=[['B','O','O','K','',''],['','','','','P','E'],['C','H','A','I','R',''],['','','','','N','N'],['D','E','S','K','',''],['','','','','','']];
        for(let i=0;i<6;i++){ for(let j=0;j<6;j++){ let val=pre[i][j]||''; gridHtml+=`<input type="text" maxlength="1" id="cell_${i}_${j}" value="${val}" style="text-transform:uppercase" ${val?'readonly':''}>`; } gridHtml+='<div style="width:100%"></div>'; }
        gridHtml+='</div>'; document.getElementById('crosswordGrid').innerHTML=gridHtml;
        document.getElementById('crosswordClues').innerHTML='<strong>Clues:</strong> Row0: something to read (BOOK), Row2: you sit on it (CHAIR), Row4: you write on it (DESK). Down: Col5: writing tool (PEN).';
    }
    document.getElementById('checkCrossword').onclick=()=>{ document.getElementById('crosswordResult').innerHTML="<div class='correct-feedback'>✅ Check your answers with clues.</div>"; };
    buildCrossword();
    // Unscramble
    const wordList=["book","pen","desk","chair","map","clock"];
    let cur="";
    function getScrambled(w){ let a=w.split(''); for(let i=a.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a.join(''); }
    function updateScramble(){ cur=wordList[Math.floor(Math.random()*wordList.length)]; document.getElementById("scrambleWord").innerText=getScrambled(cur); document.getElementById("scrambleInput").value=""; document.getElementById("scrambleResult").innerHTML=""; }
    document.getElementById("checkScramble").onclick=()=>{ let ans=document.getElementById("scrambleInput").value.trim().toLowerCase(); if(ans===cur) document.getElementById("scrambleResult").innerHTML="<div class='correct-feedback'>✅ Correct</div>"; else document.getElementById("scrambleResult").innerHTML=`<div class='wrong-feedback'>❌ Wrong: ${cur}</div>`; };
    document.getElementById("newScramble").onclick=updateScramble; document.getElementById("speakScramble").onclick=()=>speak(cur); updateScramble();
    // Prepositions
    const prepSentences=[{text:"The book is ______ the desk.",ans:"on"},{text:"The keys are ______ the bag.",ans:"in"},{text:"The chair is ______ the desk.",ans:"behind"},{text:"The wastebasket is ______ the desk.",ans:"under"}];
    let prepIdx=0;
    function updatePrep(){ prepIdx=Math.floor(Math.random()*prepSentences.length); document.getElementById("prepQuestion").innerHTML=prepSentences[prepIdx].text; document.getElementById("prepSelect").value=""; document.getElementById("prepResult").innerHTML=""; }
    document.getElementById("checkPrep").onclick=()=>{ let sel=document.getElementById("prepSelect").value; if(sel===prepSentences[prepIdx].ans) document.getElementById("prepResult").innerHTML="<div class='correct-feedback'>✅ Correct!</div>"; else document.getElementById("prepResult").innerHTML=`<div class='wrong-feedback'>❌ Correct: ${prepSentences[prepIdx].ans}</div>`; };
    document.getElementById("newPrep").onclick=updatePrep; updatePrep();
</script>
</body>
</html>
