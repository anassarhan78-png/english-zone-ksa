<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Interchange Intro - Unit 7 Extra Activities</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', 'OpenDyslexic', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #2c3e50, #1a2632); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: #fef9e8; border-radius: 45px; padding: 20px 30px; }
        h1 { color: #d35400; text-align: center; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .card { background: #fff5e6; border-radius: 35px; padding: 20px; border: 1px solid #f0c0a0; }
        .card h2 { background: #d35400; display: inline-block; padding: 5px 20px; border-radius: 40px; color: white; font-size: 1.3rem; }
        button { background: #d35400; border: none; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; margin: 5px; }
        input, select { padding: 8px; border-radius: 30px; border: 1px solid #ccc; margin: 5px; }
        .correct-feedback { background: #c8e6d9; border-left: 6px solid #2e7d64; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .wrong-feedback { background: #ffe0e0; border-left: 6px solid #d9534f; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .drag-word { background: #2c7da0; color: white; padding: 10px 20px; border-radius: 40px; cursor: grab; display: inline-block; margin: 5px; }
        .drop-zone { border: 2px dashed #d35400; border-radius: 20px; padding: 12px; min-width: 120px; text-align: center; background: #fff0e0; display: inline-block; margin: 6px; }
        .crossword-grid { display: grid; grid-template-columns: repeat(6, 45px); gap: 4px; justify-content: center; background: #f0f0f0; padding: 15px; border-radius: 20px; }
        .crossword-grid input { width: 45px; height: 45px; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <h1>📖 Interchange Intro - Unit 7 🎲 Extra Activities</h1>
    <div class="activity-grid">
        <div class="card"><h2>🏠 Drag & Drop: Room → Furniture</h2><div id="dragDropArea"></div><button id="checkDragDrop">Check</button><div id="dragDropResult"></div></div>
        <div class="card"><h2>🔠 Crossword (Rooms & Furniture)</h2><div id="crosswordGrid"></div><div id="crosswordClues"></div><button id="checkCrossword">Check</button><div id="crosswordResult"></div></div>
        <div class="card"><h2>🔀 Unscramble (Furniture)</h2><div id="scrambleWord" style="font-size:1.8rem; background:#fff0d6; padding:12px; border-radius:30px;"></div><input id="scrambleInput"><button id="checkScramble">Check</button><button id="newScramble">New</button><div id="scrambleResult"></div><button id="speakScramble">🔊 Speak</button></div>
        <div class="card"><h2>📍 There is/There are Practice</h2><div id="thereQuestion">___ a sofa in the living room. (Is there / Are there)</div><input id="thereInput"><button id="checkThere">Check</button><button id="newThere">Next</button><div id="thereResult"></div></div>
    </div>
</div>
<script>
    const roomFurniture = [["living room","sofa"],["bedroom","bed"],["kitchen","stove"],["bathroom","mirror"],["dining room","table"]];
    function imgTag(word) { let name=word.toLowerCase().replace(/ /g,'-'); return `<img src="../images/${name}.jpg" style="width:50px; border-radius:10px;" onerror="this.onerror=null;this.parentElement.innerHTML+='🪑';">`; }
    function speak(t){ let u=new SpeechSynthesisUtterance(t); u.lang="en-US"; speechSynthesis.cancel(); speechSynthesis.speak(u); }
    // Drag & Drop
    let selected=null;
    function initDragDrop(){
        let c=document.getElementById('dragDropArea');
        c.innerHTML='<div><strong>Click a room, then matching furniture</strong></div><div style="display:flex;flex-wrap:wrap;gap:15px;margin:10px 0;">';
        roomFurniture.forEach(rf=>{ let btn=document.createElement('button'); btn.innerText=rf[0]; btn.classList.add('drag-word'); btn.onclick=()=>{ selected=rf[0]; }; c.appendChild(btn); });
        c.innerHTML+='</div><div style="display:flex;flex-wrap:wrap;gap:20px;margin-top:20px;">';
        roomFurniture.forEach(rf=>{ let zone=document.createElement('div'); zone.classList.add('drop-zone'); zone.setAttribute('data-furniture',rf[1]); zone.innerHTML=`${rf[1]}<br><span class="drop-label">???</span>`; zone.onclick=()=>{ if(selected && selected===rf[0]){ zone.querySelector('.drop-label').innerText=selected; zone.style.background="#c8e6d9"; selected=null; } else if(selected) alert(`Wrong! ${selected} doesn't have ${rf[1]}.`); else alert("Click a room first."); }; c.appendChild(zone); });
        c.innerHTML+='</div>';
    }
    document.getElementById('checkDragDrop').onclick=()=>{ let ok=true; document.querySelectorAll('#dragDropArea .drop-zone').forEach(z=>{ let label=z.querySelector('.drop-label').innerText; let expected=roomFurniture.find(rf=>rf[1]===z.getAttribute('data-furniture'))[0]; if(label!==expected) ok=false; }); document.getElementById('dragDropResult').innerHTML=ok?"<div class='correct-feedback'>Perfect!</div>":"<div class='wrong-feedback'>Some wrong.</div>"; };
    initDragDrop();
    // Crossword
    function buildCrossword(){
        let gridHtml='<div class="crossword-grid">';
        let pre=[['S','O','F','A','',''],['','','','','B','E'],['T','A','B','L','E','D'],['','','','','',''],['L','A','M','P','',''],['','','','','','']];
        for(let i=0;i<6;i++){ for(let j=0;j<6;j++){ let val=pre[i][j]||''; gridHtml+=`<input type="text" maxlength="1" id="cell_${i}_${j}" value="${val}" ${val?'readonly':''}>`; } gridHtml+='<div style="width:100%"></div>'; }
        gridHtml+='</div>'; document.getElementById('crosswordGrid').innerHTML=gridHtml;
        document.getElementById('crosswordClues').innerHTML='<strong>Clues:</strong> Row0: comfortable seating (SOFA), Row2: surface for dining (TABLE), Row4: lighting device (LAMP). Down: Col5: sleeping surface (BED).';
    }
    document.getElementById('checkCrossword').onclick=()=>{ document.getElementById('crosswordResult').innerHTML="<div class='correct-feedback'>✅ Check answers with clues.</div>"; };
    buildCrossword();
    // Unscramble furniture
    const furnList = ["sofa","table","chair","bed","lamp","rug","mirror"];
    let cur="";
    function getScrambled(w){ let a=w.split(''); for(let i=a.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a.join(''); }
    function updateScramble(){ cur=furnList[Math.floor(Math.random()*furnList.length)]; document.getElementById("scrambleWord").innerText=getScrambled(cur); document.getElementById("scrambleInput").value=""; document.getElementById("scrambleResult").innerHTML=""; }
    document.getElementById("checkScramble").onclick=()=>{ let ans=document.getElementById("scrambleInput").value.trim().toLowerCase(); if(ans===cur) document.getElementById("scrambleResult").innerHTML="<div class='correct-feedback'>✅ Correct</div>"; else document.getElementById("scrambleResult").innerHTML=`<div class='wrong-feedback'>❌ Wrong: ${cur}</div>`; };
    document.getElementById("newScramble").onclick=updateScramble; document.getElementById("speakScramble").onclick=()=>speak(cur); updateScramble();
    // There is/There are
    const thereQ = [{s:"___ a sofa in the living room.",a:"Is there"},{s:"___ two chairs in the kitchen.",a:"Are there"},{s:"___ a mirror in the bathroom.",a:"Is there"},{s:"___ any curtains?",a:"Are there"}];
    let thereIdx=0;
    function updateThere(){ thereIdx=Math.floor(Math.random()*thereQ.length); document.getElementById("thereQuestion").innerHTML=thereQ[thereIdx].s; document.getElementById("thereInput").value=""; document.getElementById("thereResult").innerHTML=""; }
    document.getElementById("checkThere").onclick=()=>{ let ans=document.getElementById("thereInput").value.trim().toLowerCase(); if(ans===thereQ[thereIdx].a.toLowerCase()) document.getElementById("thereResult").innerHTML="<div class='correct-feedback'>✅ Correct!</div>"; else document.getElementById("thereResult").innerHTML=`<div class='wrong-feedback'>❌ Correct: ${thereQ[thereIdx].a}</div>`; };
    document.getElementById("newThere").onclick=updateThere; updateThere();
</script>
</body>
</html>
