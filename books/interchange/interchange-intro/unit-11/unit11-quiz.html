<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Interchange Intro - Unit 11 Quiz</title>
    <style>
        body { background: linear-gradient(135deg, #2c3e50, #1a2632); margin: 0; padding: 20px; font-family: 'Segoe UI', 'OpenDyslexic', Arial, sans-serif; }
        .container { max-width: 1000px; margin: auto; background: #fef9e8; border-radius: 40px; padding: 30px; }
        h1 { color: #d35400; text-align: center; }
        .question { background: #fff5e6; padding: 15px; border-radius: 25px; margin: 15px 0; }
        button { background: #d35400; border: none; color: white; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-size: 1rem; margin-top: 20px; }
        .result { background: #e9ecef; padding: 20px; border-radius: 25px; margin-top: 20px; font-size: 1.2rem; }
        input, select { margin: 5px; padding: 8px; border-radius: 20px; border: 1px solid #ccc; }
        .img-quiz { max-width: 80px; display: block; margin-bottom: 10px; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Unit 11 Quiz - What are you going to do? (50+ questions)</h1>
    <div id="quizContainer"></div>
    <button id="submitQuiz">Submit Quiz</button>
    <div id="quizResult" class="result"></div>
</div>
<script>
    const imageBase = "../images/";
    const questions = [];
    // Part 1: Months (12 questions - order)
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    for (let i=0;i<12;i++) questions.push({ type:"short", text:`Which month comes after ${months[i]}?`, answer:months[(i+1)%12] });
    // Part 2: Dates (5 questions)
    const dates = [["1st","first"],["2nd","second"],["3rd","third"],["4th","fourth"],["5th","fifth"]];
    for (let i=0;i<5;i++) questions.push({ type:"short", text:`Write the word for ${dates[i][0]}`, answer:dates[i][1] });
    // Part 3: Be going to (10 questions)
    const going = [
        {text:"I ___ going to watch a movie.",ans:"am"},
        {text:"She ___ going to bake a cake.",ans:"is"},
        {text:"They ___ going to travel.",ans:"are"},
        {text:"What ___ you going to do?",ans:"are"},
        {text:"We ___ going to stay home.",ans:"are"},
        {text:"He ___ not going to come.",ans:"is"},
        {text:"Where ___ they going to meet?",ans:"are"},
        {text:"I ___ going to relax.",ans:"am"},
        {text:"The children ___ going to play.",ans:"are"},
        {text:"___ you going to invite her?",ans:"Are"}
    ];
    for (let i=0;i<10;i++) questions.push({ type:"short", text:going[i].text, answer:going[i].ans });
    // Part 4: Holidays (5 questions)
    const holidays = [["Valentine's Day","February 14"],["Independence Day","July 4"],["Halloween","October 31"],["Thanksgiving","November"],["Christmas","December 25"]];
    for (let i=0;i<5;i++) questions.push({ type:"short", text:`When is ${holidays[i][0]}?`, answer:holidays[i][1] });
    // Part 5: Conversation comprehension (5 questions)
    const conv = [
        {text:"What is Philip going to celebrate?",ans:"birthday"},
        {text:"When is Philip's birthday?",ans:"August 9"},
        {text:"Where are they going to spend the day?",ans:"Kayla's house"},
        {text:"What are they going to bake?",ans:"cake"},
        {text:"Is Angie going to help?",ans:"yes"}
    ];
    for (let i=0;i<5;i++) questions.push({ type:"short", text:conv[i].text, answer:conv[i].ans.toLowerCase() });
    // Part 6: Image-based (5 images)
    const imgNames = ["january","july","birthday","cake","fireworks"];
    for (let i=0;i<5;i++) questions.push({ type:"img", img:imgNames[i]+".jpg", text:"What is this?", answer:imgNames[i] });
    // Part 7: True/False (5 questions)
    const tf = [["December is the first month.",false],["'Be going to' is for future plans.",true],["Halloween is on October 31st.",true],["You eat turkey on Valentine's Day.",false],["'Gonna' means 'going to'.",true]];
    for (let i=0;i<5;i++) questions.push({ type:"tf", text:tf[i][0], answer:tf[i][1]?"true":"false" });
    // Part 8: Short answer (5 questions)
    const short = [
        {text:"Name the month of Thanksgiving in the US.",ans:"november"},
        {text:"What is the 25th of December?",ans:"christmas"},
        {text:"What is the 14th of February?",ans:"valentine's day"},
        {text:"Write the contraction of 'going to'.",ans:"gonna"},
        {text:"What are you going to do for a birthday? (one activity)",ans:"eat cake"}
    ];
    for (let i=0;i<5;i++) questions.push({ type:"short", text:short[i].text, answer:short[i].ans });
    // Build HTML
    function buildQuiz() {
        let html='';
        questions.forEach((q,idx)=>{
            html+=`<div class="question"><strong>${idx+1}. `;
            if(q.type==='img') html+=`<img src="${imageBase+q.img}" class="img-quiz" onerror="this.onerror=null;this.parentElement.innerHTML+='📅';">${q.text}`;
            else html+=q.text;
            html+=`</strong><br>`;
            if(q.type==='mc'){
                q.options.forEach(opt=>{ html+=`<label><input type="radio" name="q${idx}" value="${opt}"> ${opt}</label> `; });
            } else if(q.type==='tf'){
                html+=`<label><input type="radio" name="q${idx}" value="true"> True</label> <label><input type="radio" name="q${idx}" value="false"> False</label>`;
            } else {
                html+=`<input type="text" name="q${idx}" placeholder="Type answer">`;
            }
            html+=`</div>`;
        });
        document.getElementById('quizContainer').innerHTML=html;
    }
    function submitQuiz(){
        let score=0;
        for(let i=0;i<questions.length;i++){
            let q=questions[i], ans=null;
            if(q.type==='mc'||q.type==='tf'){
                let radios=document.querySelectorAll(`input[name="q${i}"]`);
                for(let r of radios) if(r.checked){ ans=r.value; break; }
            } else {
                let inp=document.querySelector(`input[name="q${i}"]`);
                if(inp) ans=inp.value.trim().toLowerCase();
            }
            if(ans===q.answer.toLowerCase()) score++;
        }
        let percent=(score/questions.length)*100;
        let msg=`You got ${score}/${questions.length} (${percent}%). `;
        if(percent>=90) msg+="Excellent!";
        else if(percent>=75) msg+="Very good!";
        else if(percent>=60) msg+="Good. Review some points.";
        else msg+="Need more practice.";
        document.getElementById('quizResult').innerHTML=msg;
    }
    buildQuiz();
    document.getElementById('submitQuiz').onclick=submitQuiz;
</script>
</body>
</html>
