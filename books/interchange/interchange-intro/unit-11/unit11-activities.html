<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Interchange Intro - Unit 11 Extra Activities</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', 'OpenDyslexic', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #2c3e50, #1a2632); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: #fef9e8; border-radius: 45px; padding: 20px 30px; }
        h1 { color: #d35400; text-align: center; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .card { background: #fff5e6; border-radius: 35px; padding: 20px; border: 1px solid #f0c0a0; }
        .card h2 { background: #d35400; display: inline-block; padding: 5px 20px; border-radius: 40px; color: white; font-size: 1.3rem; }
        button { background: #d35400; border: none; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; margin: 5px; }
        input, select { padding: 8px; border-radius: 30px; border: 1px solid #ccc; margin: 5px; }
        .correct-feedback { background: #c8e6d9; border-left: 6px solid #2e7d64; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .wrong-feedback { background: #ffe0e0; border-left: 6px solid #d9534f; padding: 8px; border-radius: 20px; margin-top: 10px; }
        .drag-word { background: #2c7da0; color: white; padding: 10px 20px; border-radius: 40px; cursor: grab; display: inline-block; margin: 5px; }
        .drop-zone { border: 2px dashed #d35400; border-radius: 20px; padding: 12px; min-width: 120px; text-align: center; background: #fff0e0; display: inline-block; margin: 6px; }
        .crossword-grid { display: grid; grid-template-columns: repeat(6, 45px); gap: 4px; justify-content: center; background: #f0f0f0; padding: 15px; border-radius: 20px; }
        .crossword-grid input { width: 45px; height: 45px; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <h1>📖 Interchange Intro - Unit 11 🎲 Extra Activities</h1>
    <div class="activity-grid">
        <!-- Drag & Drop: Month to season -->
        <div class="card">
            <h2>📅 Drag & Drop: Month → Season</h2>
            <div id="dragDropArea"></div>
            <button id="checkDragDrop">Check All</button>
            <div id="dragDropResult"></div>
        </div>

        <!-- Crossword Puzzle (months and celebrations) -->
        <div class="card">
            <h2>🔠 Crossword</h2>
            <div id="crosswordGrid"></div>
            <div id="crosswordClues" style="margin-top:10px; font-size:0.8rem;"></div>
            <button id="checkCrossword">Check Crossword</button>
            <div id="crosswordResult"></div>
        </div>

        <!-- Unscramble (months) -->
        <div class="card">
            <h2>🔀 Unscramble</h2>
            <div id="scrambleWord" style="font-size:1.8rem; background:#fff0d6; padding:12px; border-radius:30px;"></div>
            <input type="text" id="scrambleInput"><button id="checkScramble">Check</button><button id="newScramble">New</button>
            <div id="scrambleResult"></div><button id="speakScramble">🔊 Speak</button>
        </div>

        <!-- Be going to sentence builder -->
        <div class="card">
            <h2>🗓️ Future Plans Builder</h2>
            <div id="futureQuestion">I / celebrate / my birthday / next week</div>
            <input type="text" id="futureInput" placeholder="Write the sentence with 'be going to'">
            <button id="checkFuture">Check</button>
            <button id="newFuture">Next</button>
            <div id="futureResult"></div>
        </div>
    </div>
</div>

<script>
    const monthSeason = [
        { month: "January", season: "winter" },
        { month: "February", season: "winter" },
        { month: "March", season: "spring" },
        { month: "April", season: "spring" },
        { month: "May", season: "spring" },
        { month: "June", season: "summer" },
        { month: "July", season: "summer" },
        { month: "August", season: "summer" },
        { month: "September", season: "fall" },
        { month: "October", season: "fall" },
        { month: "November", season: "fall" },
        { month: "December", season: "winter" }
    ];
    
    function speak(t) { let u = new SpeechSynthesisUtterance(t); u.lang="en-US"; speechSynthesis.cancel(); speechSynthesis.speak(u); }

    // Drag & Drop
    let selectedMonth = null;
    function initDragDrop() {
        let container = document.getElementById('dragDropArea');
        container.innerHTML = '<div><strong>Click a month, then click its season</strong></div><div style="display:flex; flex-wrap:wrap; gap:15px; margin:10px 0;">';
        monthSeason.forEach(item => {
            let btn = document.createElement('button');
            btn.innerText = item.month;
            btn.classList.add('drag-word');
            btn.onclick = () => { selectedMonth = item.month; };
            container.appendChild(btn);
        });
        container.innerHTML += '</div><div style="display:flex; flex-wrap:wrap; gap:20px; margin-top:20px;">';
        const seasons = ["winter", "spring", "summer", "fall"];
        seasons.forEach(season => {
            let zone = document.createElement('div');
            zone.classList.add('drop-zone');
            zone.setAttribute('data-season', season);
            zone.innerHTML = `${season}<br><span class="drop-label">???</span>`;
            zone.onclick = () => {
                if (selectedMonth) {
                    let match = monthSeason.find(ms => ms.month === selectedMonth && ms.season === season);
                    if (match) {
                        zone.querySelector('.drop-label').innerText = selectedMonth;
                        zone.style.background = "#c8e6d9";
                        selectedMonth = null;
                    } else {
                        alert(`Wrong! "${selectedMonth}" is not in ${season}.`);
                    }
                } else {
                    alert("Click a month first.");
                }
            };
            container.appendChild(zone);
        });
        container.innerHTML += '</div>';
    }
    document.getElementById('checkDragDrop').onclick = () => {
        let allOk = true;
        document.querySelectorAll('#dragDropArea .drop-zone').forEach(zone => {
            let label = zone.querySelector('.drop-label').innerText;
            let season = zone.getAttribute('data-season');
            let expectedMonth = monthSeason.find(ms => ms.season === season)?.month;
            if (label !== expectedMonth) allOk = false;
        });
        document.getElementById('dragDropResult').innerHTML = allOk ? "<div class='correct-feedback'>🎉 Perfect! All months matched to seasons.</div>" : "<div class='wrong-feedback'>⚠️ Some matches are missing or wrong.</div>";
    };
    initDragDrop();

    // Crossword (months)
    function buildCrossword() {
        let gridHtml = '<div class="crossword-grid">';
        let predefined = [
            ['J','A','N','U','A','R'],
            ['','','','','','Y'],
            ['M','A','R','C','H',''],
            ['','','','','','A'],
            ['M','A','Y','','','Y'],
            ['','','','','','']
        ];
        for(let i=0;i<6;i++){
            for(let j=0;j<6;j++){
                let val = predefined[i][j] ? predefined[i][j] : '';
                let readonly = val ? 'readonly' : '';
                gridHtml += `<input type="text" maxlength="1" id="cell_${i}_${j}" value="${val}" style="text-transform:uppercase" ${readonly}>`;
            }
            gridHtml += `<div style="width:100%"></div>`;
        }
        gridHtml += '</div>';
        document.getElementById('crosswordGrid').innerHTML = gridHtml;
        let clues = `<strong>Clues:</strong> Across: Row0: first month (JANUARY), Row2: third month (MARCH), Row4: fifth month (MAY). Down: Col5: second month (FEBRUARY).`;
        document.getElementById('crosswordClues').innerHTML = clues;
    }
    document.getElementById('checkCrossword').onclick = () => {
        document.getElementById('crosswordResult').innerHTML = "<div class='correct-feedback'>✅ Check your answers with the clues.</div>";
    };
    buildCrossword();

    // Unscramble (months)
    const monthsScramble = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    let currentScramble = "";
    function getScrambled(w) { let arr = w.split(''); for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr.join(''); }
    function updateScramble() { currentScramble = monthsScramble[Math.floor(Math.random()*monthsScramble.length)]; document.getElementById("scrambleWord").innerText = getScrambled(currentScramble); document.getElementById("scrambleInput").value=""; document.getElementById("scrambleResult").innerHTML=""; }
    document.getElementById("checkScramble").onclick = () => { let ans = document.getElementById("scrambleInput").value.trim().toLowerCase(); if(ans === currentScramble.toLowerCase()) document.getElementById("scrambleResult").innerHTML="<div class='correct-feedback'>✅ Correct</div>"; else document.getElementById("scrambleResult").innerHTML=`<div class='wrong-feedback'>❌ Wrong: ${currentScramble}</div>`; };
    document.getElementById("newScramble").onclick = updateScramble;
    document.getElementById("speakScramble").onclick = () => speak(currentScramble);
    updateScramble();

    // Be going to sentence builder
    const futurePrompts = [
        { prompt: "I / celebrate / my birthday / next week", correct: "I am going to celebrate my birthday next week." },
        { prompt: "She / travel / to Paris / next summer", correct: "She is going to travel to Paris next summer." },
        { prompt: "They / watch / fireworks / on New Year's Eve", correct: "They are going to watch fireworks on New Year's Eve." },
        { prompt: "We / bake / a cake / for the party", correct: "We are going to bake a cake for the party." }
    ];
    let currentFuture = 0;
    function updateFuture() {
        currentFuture = Math.floor(Math.random() * futurePrompts.length);
        document.getElementById("futureQuestion").innerHTML = futurePrompts[currentFuture].prompt;
        document.getElementById("futureInput").value = "";
        document.getElementById("futureResult").innerHTML = "";
    }
    document.getElementById("checkFuture").onclick = () => {
        let ans = document.getElementById("futureInput").value.trim().toLowerCase();
        let correct = futurePrompts[currentFuture].correct.toLowerCase();
        if (ans === correct) {
            document.getElementById("futureResult").innerHTML = "<div class='correct-feedback'>✅ Correct!</div>";
        } else {
            document.getElementById("futureResult").innerHTML = `<div class='wrong-feedback'>❌ Wrong. Correct: ${futurePrompts[currentFuture].correct}</div>`;
        }
    };
    document.getElementById("newFuture").onclick = updateFuture;
    updateFuture();
</script>
</body>
</html>
