<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>معهد الريادة للتدريب - English Zone | النظام التفاعلي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #030617);
            min-height: 100vh;
            padding: 25px 20px;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(15, 25, 45, 0.55);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 25px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .hero {
            text-align: center;
            margin-bottom: 35px;
        }
        .hero h1 {
            font-size: 2.4rem;
            background: linear-gradient(135deg, #aaffff, #4c9aff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(0,255,255,0.3);
        }
        .hero p {
            color: #bbd9ff;
            margin-top: 8px;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .back-btn {
            background: rgba(0, 30, 50, 0.7);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        .back-btn:hover {
            background: #0ff;
            color: #010514;
            box-shadow: 0 0 12px #0ff;
        }
        .location-badge {
            background: #0a142e;
            padding: 6px 18px;
            border-radius: 40px;
            color: #7df9ff;
            font-size: 0.85rem;
            border-right: 3px solid #0ff;
        }

        .grid-books, .grid-units, .grid-activities {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 25px;
            margin: 20px 0 30px;
        }
        .neon-btn {
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.5);
            border-radius: 20px;
            padding: 18px 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #c0ffff;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }
        .neon-btn:hover {
            background: rgba(0, 255, 255, 0.15);
            border-color: #0ff;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 0 18px rgba(0, 255, 255, 0.4);
        }
        .grid-activities .neon-btn {
            padding: 14px 5px;
            font-size: 1rem;
        }
        .content-frame {
            margin-top: 30px;
            background: #0a0f1c;
            border-radius: 32px;
            border: 1px solid #2c3e66;
            overflow: hidden;
        }
        .content-frame iframe {
            width: 100%;
            min-height: 65vh;
            border: none;
            background: white;
            border-radius: 28px;
        }
        .footer-note {
            text-align: center;
            margin-top: 30px;
            color: #6a7c9f;
            font-size: 0.75rem;
        }
        .share-btn {
            background: #2c7da0;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 10px;
        }
        .share-btn:hover {
            background: #1a5a7a;
        }
        @media (max-width: 700px) {
            .main-container { padding: 15px; }
            .neon-btn { padding: 14px 5px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="hero">
        <h1>🏫 معهد الريادة للتدريب</h1>
        <p>English Zone | نظام تعليمي تفاعلي متكامل</p>
    </div>

    <div class="nav-bar">
        <button class="back-btn" id="backButton">↩️ رجوع</button>
        <div class="location-badge" id="locationPath">الرئيسية / الكتب</div>
    </div>

    <div id="dynamicArea"></div>
    <div id="iframeContainer" class="content-frame" style="display: none;">
        <iframe id="activityFrame" title="النشاط التفاعلي"></iframe>
    </div>
    <div class="footer-note">
        ✨ اختر الكتاب ← الوحدة ← النشاط | جميع الأنشطة تعمل داخل هذه الصفحة
    </div>
</div>

<script>
    // ---------- تعريف الكتب والوحدات والمسارات ----------
    const books = {
        et1: {
            name: "📘 English Time 1",
            units: 10,
            getActivityPath: (unitNum, activityKey) => {
                const base = "books/english-time/english-time-1/interactive";
                const files = {
                    dictation: `unit${unitNum}-final.html`,
                    writing: `unit${unitNum}-writing-escalating.html`,
                    presentation: `unit${unitNum}-presentation.html`,
                    rubric: `unit${unitNum}-rubric.html`,
                    quiz: `unit${unitNum}-quiz.html`,
                    extra: `unit${unitNum}-activities.html`
                };
                return `${base}/${files[activityKey]}`;
            }
        },
        et2: {
            name: "📙 English Time 2",
            units: 10,
            getActivityPath: (unitNum, activityKey) => {
                const base = "books/english-time/english-time-2/unit-" + unitNum;
                const files = {
                    dictation: `unit${unitNum}-final.html`,
                    writing: `unit${unitNum}-writing-escalating.html`,
                    presentation: `unit${unitNum}-presentation.html`,
                    rubric: `unit${unitNum}-rubric.html`,
                    quiz: `unit${unitNum}-quiz.html`,
                    extra: `unit${unitNum}-activities.html`
                };
                return `${base}/${files[activityKey]}`;
            }
        },
        et3: {
            name: "📕 English Time 3",
            units: 0,
            comingSoon: true,
            getActivityPath: () => "#"
        },
        et4: {
            name: "📗 English Time 4",
            units: 0,
            comingSoon: true,
            getActivityPath: () => "#"
        },
        interchangeIntro: {
            name: "🌟 Interchange Intro",
            units: 16,
            comingSoon: false,
            getActivityPath: (unitNum, activityKey) => {
                const base = "books/interchange/interchange-intro/unit-" + unitNum;
                const files = {
                    dictation: `unit${unitNum}-final.html`,
                    writing: `unit${unitNum}-writing.html`,
                    presentation: `unit${unitNum}-presentation.html`,
                    rubric: `unit${unitNum}-rubric.html`,
                    quiz: `unit${unitNum}-quiz.html`,
                    extra: `unit${unitNum}-activities.html`
                };
                return `${base}/${files[activityKey]}`;
            }
        },
        interchange1: {
            name: "🔥 Interchange 1",
            units: 16,
            comingSoon: true,
            getActivityPath: () => "#"
        },
        interchange2: {
            name: "⚡ Interchange 2",
            units: 16,
            comingSoon: true,
            getActivityPath: () => "#"
        },
        interchange3: {
            name: "💎 Interchange 3",
            units: 16,
            comingSoon: true,
            getActivityPath: () => "#"
        }
    };

    // أسماء الوحدات لـ English Time 2
    const unitNamesET2 = {
        1: "Unit 1: At Home with Annie",
        2: "Unit 2: In the Classroom",
        3: "Unit 3: At a Birthday Party",
        4: "Unit 4: At a Store Window",
        5: "Unit 5: At the Airport",
        6: "Unit 6: At the Flower Shop",
        7: "Unit 7: At the Department Store",
        8: "Unit 8: Let's Clean Up",
        9: "Unit 9: In a Store",
        10: "Unit 10: At the Clinic"
    };

    // أسماء الوحدات لـ Interchange Intro (محدثة)
    const unitNamesInterchange = {
        1: "Unit 1: It's nice to meet you",
        2: "Unit 2: What's this?",
        3: "Unit 3: Where are you from?",
        4: "Unit 4: What's it like?",
        5: "Unit 5: What time is it?",
        6: "Unit 6: Transportation & Family",
        7: "Unit 7: Does it have a view?",
        8: "Unit 8: What do you do?",
        9: "Unit 9: Do we need any eggs?",
        10: "Unit 10: What sports do you play?",
        11: "Unit 11: What are you going to do?",
        12: "Unit 12: What's the matter?",
        13: "Unit 13: (قيد الإعداد)",
        14: "Unit 14: (قيد الإعداد)",
        15: "Unit 15: (قيد الإعداد)",
        16: "Unit 16: (قيد الإعداد)"
    };

    const activitiesList = [
        { key: "dictation", label: "🎙️ Dictation (إملاء)" },
        { key: "writing", label: "✍️ Writing (كتابة)" },
        { key: "presentation", label: "🎤 Presentation (عرض)" },
        { key: "rubric", label: "📊 Rubric (تقييم)" },
        { key: "quiz", label: "📝 Quiz (اختبار)" },
        { key: "extra", label: "🎮 أنشطة إضافية" }
    ];

    let currentView = "books";
    let selectedBookId = null;
    let selectedUnit = null;

    const dynamicArea = document.getElementById("dynamicArea");
    const iframeContainer = document.getElementById("iframeContainer");
    const activityFrame = document.getElementById("activityFrame");
    const backBtn = document.getElementById("backButton");
    const locationSpan = document.getElementById("locationPath");

    function updateLocation() {
        if (currentView === "books") {
            locationSpan.innerText = "🏠 الرئيسية / الكتب";
        } else if (currentView === "units") {
            const book = books[selectedBookId];
            locationSpan.innerText = `📚 ${book.name} / الوحدات`;
        } else if (currentView === "activities") {
            const book = books[selectedBookId];
            locationSpan.innerText = `📖 ${book.name} / الوحدة ${selectedUnit} / الأنشطة`;
        } else if (currentView === "content") {
            const book = books[selectedBookId];
            locationSpan.innerText = `▶️ تشغيل: ${book.name} - الوحدة ${selectedUnit}`;
        }
    }

    function hideIframe() {
        iframeContainer.style.display = "none";
        activityFrame.src = "about:blank";
        dynamicArea.style.display = "block";
    }

    function copyUnitLink() {
        const url = `${window.location.origin}${window.location.pathname}#${selectedBookId}/${selectedUnit}`;
        navigator.clipboard.writeText(url);
        alert("✅ تم نسخ رابط الوحدة: " + url);
    }

    function loadActivity(bookId, unitNum, activityKey) {
        const book = books[bookId];
        if (!book || book.comingSoon) {
            alert("⚠️ هذا الكتاب لم يكتمل بعد (سيتم إضافته قريباً).");
            return;
        }
        if (unitNum > book.units && book.units !== 0) {
            alert(`⚠️ الوحدة ${unitNum} غير متوفرة حالياً. الوحدات المتاحة: 1-${book.units}`);
            return;
        }
        let path = book.getActivityPath(unitNum, activityKey);
        if (!path || path === "#") {
            alert("⚠️ هذا النشاط لم يتم تجهيزه بعد.");
            return;
        }
        dynamicArea.style.display = "none";
        iframeContainer.style.display = "block";
        activityFrame.src = path;
        currentView = "content";
        updateLocation();
    }

    function showActivities(bookId, unitNum) {
        selectedBookId = bookId;
        selectedUnit = unitNum;
        currentView = "activities";
        updateLocation();
        // تحديث رابط الصفحة (hash) ليكون قابلاً للمشاركة
        window.location.hash = `${bookId}/${unitNum}`;
        
        const bookName = books[bookId].name;
        let unitTitle = `Unit ${unitNum}`;
        if (bookId === "et2") unitTitle = unitNamesET2[unitNum] || `Unit ${unitNum}`;
        if (bookId === "interchangeIntro") unitTitle = unitNamesInterchange[unitNum] || `Unit ${unitNum}`;
        
        let html = `<div style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                        <h3 style="color:#aaf0ff;">🎯 أنشطة ${unitTitle} - ${bookName}</h3>
                        <button class="share-btn" id="copyUnitLinkBtn">🔗 نسخ رابط الوحدة</button>
                    </div>`;
        html += `<div class="grid-activities">`;
        activitiesList.forEach(act => {
            html += `<div class="neon-btn" data-activity="${act.key}">${act.label}</div>`;
        });
        html += `</div>`;
        dynamicArea.innerHTML = html;
        hideIframe();
        
        document.getElementById("copyUnitLinkBtn").addEventListener("click", copyUnitLink);
        
        document.querySelectorAll("[data-activity]").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const actKey = btn.getAttribute("data-activity");
                loadActivity(selectedBookId, selectedUnit, actKey);
            });
        });
    }

    function showUnits(bookId) {
        const book = books[bookId];
        if (!book) return;
        if (book.comingSoon) {
            alert(`📢 ${book.name} سيتم إضافته قريباً إن شاء الله.`);
            return;
        }
        selectedBookId = bookId;
        currentView = "units";
        updateLocation();
        // مسح الـ hash عند العودة إلى قائمة الوحدات
        if (window.location.hash) window.location.hash = "";
        
        let totalUnits = book.units;
        let html = `<div style="margin-bottom: 15px;"><h3 style="color:#aaf0ff;">📚 وحدات ${book.name}</h3></div>`;
        html += `<div class="grid-units">`;
        for (let i = 1; i <= totalUnits; i++) {
            let unitTitle = `Unit ${i}`;
            if (bookId === "et2") {
                unitTitle = unitNamesET2[i] || `Unit ${i}`;
            } else if (bookId === "et1") {
                unitTitle = `Unit ${i}`;
            } else if (bookId === "interchangeIntro") {
                unitTitle = unitNamesInterchange[i] || `Unit ${i}`;
            }
            html += `<div class="neon-btn" data-unit="${i}">📖 ${unitTitle}</div>`;
        }
        html += `</div>`;
        dynamicArea.innerHTML = html;
        hideIframe();
        document.querySelectorAll("[data-unit]").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const unitNum = parseInt(btn.getAttribute("data-unit"));
                showActivities(selectedBookId, unitNum);
            });
        });
    }

    function showBooks() {
        currentView = "books";
        updateLocation();
        if (window.location.hash) window.location.hash = "";
        let html = `<div class="grid-books">`;
        for (let [id, book] of Object.entries(books)) {
            let extraStyle = book.comingSoon ? "style='opacity:0.7'" : "";
            html += `<div class="neon-btn" data-book="${id}" ${extraStyle}>${book.name} ${book.comingSoon ? "⏳" : ""}</div>`;
        }
        html += `</div>`;
        dynamicArea.innerHTML = html;
        hideIframe();
        document.querySelectorAll("[data-book]").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const bookId = btn.getAttribute("data-book");
                showUnits(bookId);
            });
        });
    }

    function goBack() {
        if (currentView === "content") {
            if (selectedBookId && selectedUnit) showActivities(selectedBookId, selectedUnit);
            else showBooks();
        } else if (currentView === "activities") {
            if (selectedBookId) showUnits(selectedBookId);
            else showBooks();
        } else if (currentView === "units") {
            showBooks();
        } else {
            showBooks();
        }
    }

    // معالجة الروابط العميقة (deep linking)
    function handleHashChange() {
        const hash = window.location.hash.slice(1); // remove #
        if (hash) {
            const parts = hash.split('/');
            if (parts.length === 2 && books[parts[0]] && !books[parts[0]].comingSoon) {
                const bookId = parts[0];
                const unitNum = parseInt(parts[1]);
                if (unitNum >= 1 && unitNum <= books[bookId].units) {
                    // إظهار الوحدة مباشرة
                    selectedBookId = bookId;
                    selectedUnit = unitNum;
                    showActivities(bookId, unitNum);
                    return;
                }
            }
        }
        // إذا لم يكن هناك رابط صالح، نعرض الكتب
        showBooks();
    }

    function init() {
        window.addEventListener("hashchange", handleHashChange);
        handleHashChange(); // load initial
        backBtn.addEventListener("click", goBack);
        activityFrame.onerror = () => {
            alert("⚠️ تعذر تحميل النشاط. تأكد من وجود الملف في المسار الصحيح.");
        };
    }

    init();
</script>
</body>
</html>
